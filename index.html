      // ── Pending-call intent (sessionStorage) ──
      const PENDING_CALL_KEY = "aira_pending_call";
      const PENDING_CALL_MAX_AGE_MS = 30 * 60 * 1000;

      function markPendingCall({ contactId, contactName, ghl_location_id }) {
        try {
          sessionStorage.setItem(
            PENDING_CALL_KEY,
            JSON.stringify({
              contactId: String(contactId || ""),
              contactName: String(contactName || "this contact"),
              ghl_location_id: String(ghl_location_id || ""),
              calledAt: Date.now(),
            }),
          );
        } catch (e) {
          console.warn("markPendingCall failed:", e);
        }
      }

      function readPendingCall() {
        try {
          const raw = sessionStorage.getItem(PENDING_CALL_KEY);
          if (!raw) return null;
          const data = JSON.parse(raw);
          if (!data || typeof data.calledAt !== "number") return null;
          if (Date.now() - data.calledAt > PENDING_CALL_MAX_AGE_MS) {
            sessionStorage.removeItem(PENDING_CALL_KEY);
            return null;
          }
          return data;
        } catch {
          return null;
        }
      }

      function clearPendingCall() {
        try {
          sessionStorage.removeItem(PENDING_CALL_KEY);
        } catch {}
      }

      // ActionBtn — per-lead/per-contact quick action.
      // `primary` renders Aira Blue (one per card); otherwise secondary.
      function ActionBtn({ icon, label, href, onClick, primary, small }) {
        const className = primary ? "btn-primary" : "btn-secondary";
        const s = {
          display: "inline-flex",
          alignItems: "center",
          gap: 6,
          padding: small ? "8px 14px" : "10px 16px",
          fontSize: small ? 12 : 13,
          textDecoration: "none",

        return href ? (
          <a href={href} onClick={onClick} className={className} style={s}>
            <span style={{ fontSize: small ? 14 : 16 }}>{icon}</span>
            {label}
          </a>
        ) : (
          <button onClick={onClick} className={className} style={s}>
            <span style={{ fontSize: small ? 14 : 16 }}>{icon}</span>
            {label}
          </button>
        );
      }

      // KPI card — Aira light-mode. White surface, hairline border, no shadow.
      // Hero number is always textHi (no decorative color). An optional `status`
      // prop ("good" | "warn" | "bad") renders a tiny colored dot next to the
      // label for genuinely-signaling cases only. The legacy `color` prop is
      // accepted for backwards compatibility — if it matches a semantic color
      // it's translated to a status dot; otherwise it's ignored.
      function KPI({ label, value, sub, status, color, icon }) {
        let dotColor = null;
        if (status === "good") dotColor = T.green;
        else if (status === "warn") dotColor = T.amber;
        else if (status === "bad") dotColor = T.red;
        else if (color === T.red || color === T.amber || color === T.green) {
          dotColor = color;
        }
        return (
          <div
            className="surface-card"
            style={{
              padding: "16px 14px",
              display: "flex",
              flexDirection: "column",
              gap: 10,
              minHeight: 96,
            }}

              style={{

                fontWeight: 500,

                alignItems: "center",
                gap: 6,
              }}

              {dotColor && (
                <span
                  style={{
                    width: 6,
                    height: 6,
                    borderRadius: "50%",
                    background: dotColor,
                    flexShrink: 0,
                  }}
                />
              )}
              {icon && !dotColor && (
                <span style={{ fontSize: 12, opacity: 0.7 }}>{icon}</span>
              )}
              <span
                style={{
                  overflow: "hidden",
                  textOverflow: "ellipsis",
                  whiteSpace: "nowrap",
                }}
              >
                {label}
              </span>
            </div>
            <div
              style={{
                // Responsive step-down for longer numeric strings so
                // values like "$50,300" don't truncate to "$5..." in a
                // 4-up grid on a 390px viewport. Only strings get
                // measured; loading skeletons (React elements) keep 30.
                fontSize: (() => {
                  if (typeof value !== "string") return 30;
                  const n = value.length;
                  if (n <= 3) return 30;
                  if (n <= 5) return 24;
                  if (n <= 7) return 20;
                  return 17;
                })(),
                fontWeight: 500,
                color: T.textHi,
                lineHeight: 1,
                fontFamily: "'Outfit',sans-serif",
                letterSpacing: "-0.02em",
                overflow: "hidden",
                textOverflow: "ellipsis",
                whiteSpace: "nowrap",
              }}
            >
              {value}
            </div>
            {sub && (
              <div
                style={{
                  fontSize: 12,
                  color: T.textMuted,
                  lineHeight: 1.3,
                  overflow: "hidden",
                  textOverflow: "ellipsis",
                  whiteSpace: "nowrap",

              window.supabase.rpc("dashboard_kpis", {
                p_ghl_location_id: selectedLocationId,

              // rep_leaderboard takes text[] now — scoped to this one
              // gym. Returns activity: calls / appts / sales / gross /
              // mrr / trial_to_sale. Sort comes pre-applied (mrr desc).
              window.supabase.rpc("rep_leaderboard", {
                p_ghl_location_ids: [selectedLocationId],

              // Trial-pass counts for the TRIAL PASSES card. given /
              // converted / not_converted; we compute still_active
              // client-side so the math is visible.
              window.supabase.rpc("location_trial_counts", {
                p_ghl_location_id: selectedLocationId,
              }),
            ]);
            if (kpisRes.error) throw kpisRes.error;
            if (lbRes.error) throw lbRes.error;
            if (trialRes.error) throw trialRes.error;

              kpisRes.data && kpisRes.data[0]

                    booked_appts: 0,

                    no_showed: 0,

                    revenue: 0,

                    calls_today_connected: 0,
                    calls_today_no_answer: 0,
                    calls_today_voicemail: 0,
                    missing_sale_value_count: 0,
                    gross_mtd: 0,
                    mrr_mtd: 0,

            );
            setLeaderboard(lbRes.data || []);
            setTrialCounts(
              trialRes.data && trialRes.data[0]
                ? trialRes.data[0]
                : { given: 0, converted: 0, not_converted: 0 },
            );
          } catch (e) {
            console.error("dashboard RPC failed:", e);
            setError(e && e.message ? e.message : "Failed to load dashboard");
          } finally {
            setLoading(false);

        useEffect(() => {

        const k = kpis || {

          no_showed: 0,

          sales: 0,

        const showed = Number(k.showed) || 0;
        const noShowed = Number(k.no_showed) || 0;
        const upcoming = Number(k.upcoming) || 0;
        const awaitingUpdate = Number(k.awaiting_update) || 0;
        const sales = Number(k.sales) || 0;
        const revenue = Number(k.revenue) || 0;
        const missingSaleValue = Number(k.missing_sale_value_count) || 0;
        const grossMtd = Number(k.gross_mtd) || 0;
        const mrrMtd = Number(k.mrr_mtd) || 0;

        const callsConnected = Number(k.calls_today_connected) || 0;

                    >
                      <span style={{ color: T.text, fontWeight: 500 }}>
                        {t.label}
                      </span>
                      {loading ? (
                        <SkelBar w={100} h={14} />
                      ) : (
                        <span
                          style={{
                            fontFamily: "'Outfit',sans-serif",
                            letterSpacing: "-0.01em",
                          }}
                        >
                          <span
                            style={{
                              color: T.textHi,
                              fontWeight: 500,
                            }}
                          >
                            {t.money ? `$${t.cur.toLocaleString()}` : t.cur}
                            {t.suf || ""}
                          </span>
                          <span style={{ color: T.textMuted, fontWeight: 400 }}>
                            {" "}
                            / {t.money ? `$${t.tgt.toLocaleString()}` : t.tgt}
                            {t.suf || ""}
                          </span>
                        </span>
                      )}
                    </div>
                    <div
                      style={{
                        height: 4,
                        background: "rgba(10,14,26,0.06)",
                        borderRadius: 2,
                        overflow: "hidden",
                      }}
                    >
                      <div
                        style={{
                          width: loading ? "0%" : `${pct}%`,
                          height: "100%",
                          borderRadius: 2,
                          background: ok ? T.airaBlue : T.red,
                          transition:
                            "width 0.8s cubic-bezier(0.22, 0.61, 0.36, 1)",
                        }}
                      />
                    </div>
                  </div>
                );
              })}
            </div>

            {!hideLeaderboard && (
              <div className="surface-card" style={{ overflow: "hidden" }}>
                <div
                  style={{
                    padding: "20px 24px 14px",
                    fontSize: 11,
                    fontWeight: 500,
                    letterSpacing: "0.12em",
                    textTransform: "uppercase",
                    color: T.textMuted,
                  }}
                >
                  Rep Leaderboard
                </div>
                {loading &&
                  [0, 1, 2].map((i) => (
                    <div
                      key={`skel-${i}`}
                      style={{
                        display: "flex",
                        alignItems: "center",
                        padding: "14px 24px",
                        borderTop: `0.5px solid ${T.border}`,
                        gap: 14,
                      }}
                    >
                      <SkelBar w={36} h={36} radius={18} />
                      <div
                        style={{
                          flex: 1,
                          display: "flex",
                          flexDirection: "column",
                          gap: 6,
                        }}
                      >
                        <SkelBar w={110} h={12} />
                        <SkelBar w={70} h={10} />
                      </div>
                      <SkelBar w={28} h={16} />
                      <SkelBar w={38} h={16} />
                      <SkelBar w={48} h={14} />
                    </div>
                  ))}
                {!loading && leaderboard.length === 0 && (
                  <div
                    style={{
                      padding: "22px 24px",
                      borderTop: `0.5px solid ${T.border}`,
                      textAlign: "center",
                      color: T.textMuted,
                      fontSize: 13,
                      lineHeight: 1.55,
                    }}
                  >
                    No logged activity yet this period.
                    <br />
                    Reps appear here when they log a call, book an appointment,
                    or close a sale in the portal. Stage changes that aren't
                    Sold or Booked don't count.
                  </div>
                )}
                {!loading &&
                  leaderboard.map((r, i) => {
                    const rcalls = Number(r.calls) || 0;
                    const rappts = Number(r.appts) || 0;
                    const rsales = Number(r.sales) || 0;
                    const rgross = Number(r.gross) || 0;
                    const rmrr = Number(r.mrr) || 0;
                    const rTrialToSale = Number(r.trial_to_sale) || 0;
                    const display = r.full_name || "Unknown";
                    const initial = (display[0] || "?").toUpperCase();
                    const rowKey =
                      r.ghl_user_id ||
                      r.user_id ||
                      `row-${r.ghl_location_id}-${i}`;
                    const statCellStyle = {
                      textAlign: "center",
                      minWidth: 44,
                    };
                    const numCellStyle = {
                      fontSize: 14,
                      fontWeight: 500,
                      color: T.textHi,
                      fontFamily: "'Outfit',sans-serif",
                      letterSpacing: "-0.01em",
                    };
                    const labelCellStyle = {
                      fontSize: 9,
                      color: T.textDim,
                      letterSpacing: "0.1em",
                      marginTop: 2,
                    };
                    const tappable = !!onSelectRep && !!r.user_id;
                    return (
                      <div
                        key={rowKey}
                        onClick={
                          tappable
                            ? () =>
                                onSelectRep({
                                  user_id: r.user_id,
                                  full_name: r.full_name,
                                  ghl_user_id: r.ghl_user_id,
                                  role: r.role,
                                })
                            : undefined
                        }
                        style={{
                          display: "flex",
                          alignItems: "center",
                          padding: "14px 24px",
                          borderTop: `0.5px solid ${T.border}`,
                          gap: 12,
                          cursor: tappable ? "pointer" : "default",
                          transition: "background 160ms ease",
                        }}
                        onMouseEnter={(e) => {
                          if (tappable)
                            e.currentTarget.style.background = T.surfaceHover;
                        }}
                        onMouseLeave={(e) => {
                          e.currentTarget.style.background = "transparent";
                        }}
                      >
                        <div
                          style={{
                            width: 36,
                            height: 36,
                            borderRadius: "50%",
                            background: T.airaBlueDim,
                            display: "flex",
                            alignItems: "center",
                            justifyContent: "center",
                            fontSize: 14,
                            fontWeight: 500,
                            color: T.airaBlue,
                            fontFamily: "'Outfit',sans-serif",
                            flexShrink: 0,
                          }}
                        >
                          {initial}
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div
                            style={{
                              fontSize: 14,
                              fontWeight: 500,
                              color: T.textHi,
                              letterSpacing: "-0.005em",
                              overflow: "hidden",
                              textOverflow: "ellipsis",
                              whiteSpace: "nowrap",
                            }}
                          >
                            {display}
                          </div>
                        </div>
                        <div style={statCellStyle}>
                          <div style={numCellStyle}>{rcalls}</div>
                          <div style={labelCellStyle}>CALLS</div>
                        </div>
                        <div style={statCellStyle}>
                          <div style={numCellStyle}>{rappts}</div>
                          <div style={labelCellStyle}>APPTS</div>
                        </div>
                        <div style={statCellStyle}>
                          <div style={numCellStyle}>{rsales}</div>
                          <div style={labelCellStyle}>SALES</div>
                        </div>
                        <div style={{ ...statCellStyle, minWidth: 56 }}>
                          <div
                            style={{
                              ...numCellStyle,
                              color: rTrialToSale > 0 ? T.textHi : T.textDim,
                            }}
                          >
                            {rTrialToSale}
                          </div>
                          <div style={labelCellStyle}>TRIAL→SALE</div>
                        </div>
                        <div style={{ ...statCellStyle, minWidth: 60 }}>
                          <div
                            style={{
                              ...numCellStyle,
                              color: rgross > 0 ? T.textHi : T.textDim,
                            }}
                          >
                            {rgross > 0 ? `$${rgross.toLocaleString()}` : "—"}
                          </div>
                          <div style={labelCellStyle}>GROSS</div>
                        </div>
                        <div style={{ ...statCellStyle, minWidth: 56 }}>
                          <div
                            style={{
                              ...numCellStyle,
                              color: rmrr > 0 ? T.textHi : T.textDim,
                            }}
                          >
                            {rmrr > 0 ? `$${rmrr.toLocaleString()}` : "—"}
                          </div>
                          <div style={labelCellStyle}>MRR</div>
                        </div>
                      </div>
                    );
                  })}
              </div>
            )}
          </div>
        );
      }

      // ── Leads Screen ──
      // ── Leads Screen (real data from contacts + opportunities) ──
      // One row per opportunity. By default we hide closed leads (stages
      // flagged counts_as_sale OR opportunities.status IN lost/abandoned)
      // so the VP sees the live pipeline first; the "Show closed" toggle
      // flips that.
      //
      // `aggregate` + `accessibleLocations` switches the view to "All
      // Leads" across the VP's territory, with a location column per row.
      function LeadsScreen({
        selectedLocationId,
        accessibleLocations,
        aggregate,
        onSelect,
        onToast,
        onOpenConversation,
      }) {
        const [leads, setLeads] = useState([]);
        const [stages, setStages] = useState([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [search, setSearch] = useState("");
        const [showClosed, setShowClosed] = useState(false);
        const [stageFilter, setStageFilter] = useState("all");
        // "followup" (default) puts oldest-contact / never-contacted at
        // the top so the red/amber tail is the first thing a rep sees.
        // "newest" is the old date_added DESC behaviour.
        const [sortMode, setSortMode] = useState("followup");
        // List-row Text button opens the same in-portal composer as
        // LeadDetail. Native sms: would send from the rep's personal
        // number and bypass GHL (decision 2026-04-20).
        const [composeLead, setComposeLead] = useState(null);
        const [sendingMessage, setSendingMessage] = useState(false);
        // Stage-filter pill row scrolls horizontally on mobile. Track
        // overflow on each edge so we can render fade affordances —
        // without them users don't know there are more stages (like
        // "Follow Up", "7 Day Pass Converted") hiding off-screen.
        const pillScrollRef = useRef(null);
        const [pillEdges, setPillEdges] = useState({
          canLeft: false,
          canRight: false,
        });

        const locIds = useMemo(() => {
          if (aggregate) {
            return (accessibleLocations || []).map((l) => l.ghl_location_id);
          }
          return selectedLocationId ? [selectedLocationId] : [];
        }, [aggregate, accessibleLocations, selectedLocationId]);

        const locNameById = useMemo(() => {
          const m = {};
          (accessibleLocations || []).forEach((l) => {
            m[l.ghl_location_id] = l.name;
          });
          return m;
        }, [accessibleLocations]);

        const load = useCallback(async () => {
          if (locIds.length === 0) {
            setLeads([]);
            setStages([]);
            setLoading(false);
            return;
          }
          setLoading(true);
          setError(null);
          try {
            const [oppsRes, stagesRes] = await Promise.all([
              window.supabase
                .from("opportunities")
                .select(
                  "ghl_opportunity_id, ghl_location_id, ghl_contact_id, pipeline_id, pipeline_stage_id, name, status, monetary_value, gross_sale, mrr, is_pif, sold_at, assigned_to, source, created_at_ghl, updated_at_ghl",
                )
                .in("ghl_location_id", locIds)
                .order("updated_at_ghl", {
                  ascending: false,
                  nullsFirst: false,
                })
                .limit(500),
              window.supabase
                .from("pipeline_stages")
                .select(
                  "ghl_location_id, ghl_stage_id, name, counts_as_show, counts_as_no_show, counts_as_sale",
                )
                .in("ghl_location_id", locIds),
            ]);
            if (oppsRes.error) throw oppsRes.error;
            if (stagesRes.error) throw stagesRes.error;
            const opps = oppsRes.data || [];
            const stageRows = stagesRes.data || [];

            const contactIds = Array.from(
              new Set(opps.map((o) => o.ghl_contact_id).filter(Boolean)),
            );
            let contactsById = {};
            // lastContactByContact[ghl_contact_id] = { t: ms epoch, kind: 'call'|'SMS' }
            const lastContactByContact = {};
            if (contactIds.length > 0) {
              // 3-way batched fetch: contacts for display, call_logs (only
              // rows with a real outcome count as contact), and
              // conversations (last_message_at includes both inbound and
              // outbound — both count per the freshness rule).
              const [cRes, callsRes, convsRes] = await Promise.all([
                window.supabase
                  .from("contacts")
                  .select(
                    "ghl_contact_id, first_name, last_name, full_name, email, phone, source, date_added, assigned_to",
                  )
                  .in("ghl_contact_id", contactIds),
                window.supabase
                  .from("call_logs")
                  .select("ghl_contact_id, ended_at")
                  .in("ghl_contact_id", contactIds)
                  .not("outcome", "is", null)
                  .order("ended_at", {
                    ascending: false,
                    nullsFirst: false,
                  }),
                window.supabase
                  .from("conversations")
                  .select("ghl_contact_id, last_message_at")
                  .in("ghl_contact_id", contactIds)
                  .not("last_message_at", "is", null),
              ]);
              if (cRes.error) throw cRes.error;
              if (callsRes.error) throw callsRes.error;
              if (convsRes.error) throw convsRes.error;
              contactsById = Object.fromEntries(
                (cRes.data || []).map((c) => [c.ghl_contact_id, c]),
              );
              const noteContact = (contactId, ts, kind) => {
                if (!contactId) return;
                const t = ts ? new Date(ts).getTime() : 0;
                if (!t) return;
                const cur = lastContactByContact[contactId];
                if (!cur || t > cur.t) {
                  lastContactByContact[contactId] = { t, kind };
                }
              };
              (callsRes.data || []).forEach((r) =>
                noteContact(r.ghl_contact_id, r.ended_at, "call"),
              );
              (convsRes.data || []).forEach((r) =>
                noteContact(r.ghl_contact_id, r.last_message_at, "SMS"),
              );
            }

            // Stage lookup keyed on (location, ghl_stage_id) — stages are
            // per-location, so the same ghl_stage_id can mean different
            // things in two different gyms.
            const stageKey = (locId, stageId) => `${locId}::${stageId}`;
            const stageByKey = Object.fromEntries(
              stageRows.map((s) => [
                stageKey(s.ghl_location_id, s.ghl_stage_id),
                s,
              ]),
            );

            const composed = opps.map((o) => {
              const c = contactsById[o.ghl_contact_id] || {};
              const stage =
                stageByKey[stageKey(o.ghl_location_id, o.pipeline_stage_id)] ||
                null;
              const name =
                c.full_name ||
                [c.first_name, c.last_name].filter(Boolean).join(" ").trim() ||
                o.name ||
                "(unknown contact)";
              const lc = lastContactByContact[o.ghl_contact_id] || null;
              return {
                opportunity_id: o.ghl_opportunity_id,
                contact_id: o.ghl_contact_id,
                location_id: o.ghl_location_id,
                pipeline_id: o.pipeline_id,
                stage_id: o.pipeline_stage_id,
                stage_name: stage?.name || null,
                stage_is_sale: !!stage?.counts_as_sale,
                stage_is_show: !!stage?.counts_as_show,
                stage_is_noshow: !!stage?.counts_as_no_show,
                opp_name: o.name,
                opp_status: o.status,
                monetary_value:
                  o.monetary_value != null ? Number(o.monetary_value) : null,
                gross_sale: o.gross_sale != null ? Number(o.gross_sale) : null,
                mrr: o.mrr != null ? Number(o.mrr) : null,
                is_pif: !!o.is_pif,
                sold_at: o.sold_at || null,
                contact_source: c.source,
                opp_source: o.source,
                first_name: c.first_name,
                last_name: c.last_name,
                full_name: name,
                email: c.email,
                phone: c.phone,
                contact_date_added: c.date_added,
                contact_assigned: c.assigned_to,
                opp_assigned: o.assigned_to,
                updated_at_ghl: o.updated_at_ghl,
                created_at_ghl: o.created_at_ghl,
                last_contact_at: lc ? lc.t : null,
                last_contact_kind: lc ? lc.kind : null,
              };
            });

            // Default insertion order (newest first) — visible.sort below
            // reshuffles based on the user's toggle.
            composed.sort((a, b) => {
              const ax = new Date(
                a.contact_date_added ||
                  a.updated_at_ghl ||
                  a.created_at_ghl ||
                  0,
              ).getTime();
              const bx = new Date(
                b.contact_date_added ||
                  b.updated_at_ghl ||
                  b.created_at_ghl ||
                  0,
              ).getTime();
              return bx - ax;
            });

            setLeads(composed);
            setStages(stageRows);
          } catch (e) {
            console.error("leads load failed:", e);
            setError(e && e.message ? e.message : "Failed to load leads");
          } finally {
            setLoading(false);
          }
        }, [locIds]);

        useEffect(() => {
          load();
        }, [load]);

        const uniqueStageNames = useMemo(() => {
          const names = new Set();
          leads.forEach((l) => {
            if (l.stage_name) names.add(l.stage_name);
          });
          return Array.from(names).sort();
        }, [leads]);

        // Reset pill-row scroll to the left on mount (and whenever the
        // stage set changes), then track scroll position to drive the
        // fade-edge affordances.
        useEffect(() => {
          const el = pillScrollRef.current;
          if (!el) return;
          el.scrollLeft = 0;
          const update = () => {
            const maxScroll = el.scrollWidth - el.clientWidth;
            setPillEdges({
              canLeft: el.scrollLeft > 2,
              canRight: maxScroll - el.scrollLeft > 2,
            });
          };
          update();
          el.addEventListener("scroll", update, { passive: true });
          let ro;
          if (typeof ResizeObserver !== "undefined") {
            ro = new ResizeObserver(update);
            ro.observe(el);
          }
          return () => {
            el.removeEventListener("scroll", update);
            if (ro) ro.disconnect();
          };
        }, [uniqueStageNames.length]);

        let visible = leads;
        if (!showClosed) {
          visible = visible.filter(
            (l) =>
              !l.stage_is_sale &&
              l.opp_status !== "lost" &&
              l.opp_status !== "abandoned",
          );
        }
        if (stageFilter !== "all") {
          visible = visible.filter((l) => l.stage_name === stageFilter);
        }
        if (search.trim()) {
          const q = search.trim().toLowerCase();
          visible = visible.filter(
            (l) =>
              (l.full_name || "").toLowerCase().includes(q) ||
              (l.email || "").toLowerCase().includes(q) ||
              (l.phone || "").toLowerCase().includes(q),
          );
        }
        // Copy so we don't mutate the state array
        visible = visible.slice();
        if (sortMode === "followup") {
          // Oldest contact first (null treated as oldest); tiebreak on
          // date_added desc so two never-contacted leads still show the
          // freshest as the one to grab first.
          visible.sort((a, b) => {
            const at = a.last_contact_at ?? 0;
            const bt = b.last_contact_at ?? 0;
            if (at !== bt) return at - bt;
            const ad = new Date(
              a.contact_date_added || a.updated_at_ghl || 0,
            ).getTime();
            const bd = new Date(
              b.contact_date_added || b.updated_at_ghl || 0,
            ).getTime();
            return bd - ad;
          });
        }

        const closedCount =
          leads.length -
          leads.filter(
            (l) =>
              !l.stage_is_sale &&
              l.opp_status !== "lost" &&
              l.opp_status !== "abandoned",
          ).length;

        const title = aggregate ? "All Leads" : "Leads";

        const sendMessage = async (message) => {
          if (!composeLead || !composeLead.contact_id) {
            if (onToast) {
              onToast({
                kind: "error",
                text: "Missing contact id — can't send from this lead",
              });
            }
            return;
          }
          setSendingMessage(true);
          try {
            await callEdgeFunction("ghl-send-message", {
              ghl_location_id: composeLead.location_id,
              ghl_contact_id: composeLead.contact_id,
              type: "SMS",
              message,
            });
            if (onToast) {
              onToast({ kind: "success", text: "Message sent." });
            }
            const sentContactId = composeLead.contact_id;
            setComposeLead(null);
            if (onOpenConversation) onOpenConversation(sentContactId);
          } catch (e) {
            if (onToast) {
              onToast({
                kind: "error",
                text: e && e.message ? e.message : "Send failed",
              });
            }
          } finally {
            setSendingMessage(false);
          }
        };

        return (
          <div className="fade-in" style={{ padding: "24px 20px 32px" }}>
            <div
              style={{
                display: "flex",
                justifyContent: "space-between",
                alignItems: "center",
                marginBottom: 4,
                gap: 12,
              }}
            >
              <div
                style={{
                  fontSize: 22,
                  fontWeight: 500,
                  color: T.textHi,
                  fontFamily: "'Outfit',sans-serif",
                  letterSpacing: "-0.01em",
                }}
              >
                {title}
              </div>
              <button
                className="btn-ghost"
                onClick={load}
                style={{ fontSize: 12 }}
              >
                ↻ Refresh
              </button>
            </div>
            <div
              style={{
                fontSize: 12,
                color: T.textMuted,
                marginBottom: 14,
              }}
            >
              {aggregate
                ? `${(accessibleLocations || []).length} locations · ${visible.length} visible`
                : `${visible.length} open`}
              {closedCount > 0 &&
                !showClosed &&
                ` · ${closedCount} closed hidden`}
            </div>

            <div style={{ position: "relative", marginBottom: 12 }}>
              <span
                style={{
                  position: "absolute",
                  left: 14,
                  top: "50%",
                  transform: "translateY(-50%)",
                  fontSize: 14,
                  color: T.textDim,
                }}
              >
                🔍
              </span>
              <input
                value={search}
                onChange={(e) => setSearch(e.target.value)}
                placeholder="Search name, email, or phone…"
                style={{
                  width: "100%",
                  padding: "12px 16px 12px 42px",
                  borderRadius: 12,
                  border: `0.5px solid ${T.border}`,
                  background: T.surface,
                  color: T.text,
                  fontSize: 14,
                  outline: "none",
                  boxSizing: "border-box",
                }}
              />
            </div>

            <div
              style={{
                position: "relative",
                marginBottom: 8,
              }}
            >
              <div
                ref={pillScrollRef}
                style={{
                  display: "flex",
                  gap: 6,
                  overflowX: "auto",
                  paddingBottom: 12,
                  scrollbarWidth: "none",
                }}
              >
                {["all", ...uniqueStageNames].map((f) => {
                  const active = stageFilter === f;
                  const label = f === "all" ? "All" : f;
                  return (
                    <button
                      key={f}
                      onClick={() => setStageFilter(f)}
                      style={{
                        padding: "6px 14px",
                        borderRadius: 999,
                        border: "none",
                        background: active ? T.airaBlue : T.airaBlueSubtle,
                        color: active ? "#ffffff" : T.textMuted,
                        fontSize: 12,
                        fontWeight: 500,
                        whiteSpace: "nowrap",
                        cursor: "pointer",
                        fontFamily: "inherit",
                        transition: "background 160ms ease",
                        flexShrink: 0,
                      }}
                    >
                      {label}
                    </button>
                  );
                })}
              </div>
              {/* Fade affordances — gradient matches page bg so the
                  off-screen pills look like they bleed out the edge.
                  pointerEvents: none so the user can still scroll/tap
                  through the overlay. */}
              {pillEdges.canLeft && (
                <div
                  style={{
                    position: "absolute",
                    left: 0,
                    top: 0,
                    bottom: 12,
                    width: 24,
                    pointerEvents: "none",
                    background: `linear-gradient(to right, ${T.bg}, transparent)`,
                  }}
                />
              )}
              {pillEdges.canRight && (
                <div
                  style={{
                    position: "absolute",
                    right: 0,
                    top: 0,
                    bottom: 12,
                    width: 24,
                    pointerEvents: "none",
                    background: `linear-gradient(to left, ${T.bg}, transparent)`,
                  }}
                />
              )}
            </div>

            <div
              style={{
                display: "flex",
                alignItems: "center",
                flexWrap: "wrap",
                gap: 10,
                marginBottom: 14,
              }}
            >
              {[
                { key: "followup", label: "Needs follow-up" },
                { key: "newest", label: "Newest leads" },
              ].map((opt) => {
                const active = sortMode === opt.key;
                return (
                  <button
                    key={opt.key}
                    onClick={() => setSortMode(opt.key)}
                    style={{
                      padding: "6px 12px",
                      borderRadius: 999,
                      border: "none",
                      background: active ? T.airaBlue : T.airaBlueSubtle,
                      color: active ? "#ffffff" : T.textMuted,
                      fontSize: 12,
                      fontWeight: 500,
                      cursor: "pointer",
                      fontFamily: "inherit",
                      transition: "background 160ms ease",
                    }}
                  >
                    {opt.label}
                  </button>
                );
              })}
              <label
                style={{
                  display: "inline-flex",
                  alignItems: "center",
                  gap: 8,
                  fontSize: 12,
                  color: T.textMuted,
                  cursor: "pointer",
                  marginLeft: 4,
                }}
              >
                <input
                  type="checkbox"
                  checked={showClosed}
                  onChange={(e) => setShowClosed(e.target.checked)}
                  style={{ accentColor: T.airaBlue }}
                />
                Show closed
              </label>
            </div>

            {error && (
              <div
                className="surface-card"
                style={{
                  padding: "14px 16px",
                  marginBottom: 12,
                  borderLeft: `3px solid ${T.red}`,
                  display: "flex",
                  alignItems: "center",
                  gap: 10,
                }}
              >
                <span
                  style={{
                    width: 6,
                    height: 6,
                    borderRadius: "50%",
                    background: T.red,
                    flexShrink: 0,
                  }}
                />
                <span style={{ color: T.text, fontSize: 13, fontWeight: 500 }}>
                  {error}
                </span>
              </div>
            )}

            {loading && (
              <div
                style={{ display: "flex", flexDirection: "column", gap: 10 }}
              >
                {[0, 1, 2].map((i) => (
                  <div
                    key={`skel-${i}`}
                    className="surface-card"
                    style={{
                      padding: "16px 18px",
                      display: "flex",
                      flexDirection: "column",
                      gap: 8,
                    }}
                  >
                    <SkelBar w={160} h={14} />
                    <SkelBar w={220} h={10} />
                    <SkelBar w={120} h={10} />
                  </div>
                ))}
              </div>
            )}

            {!loading &&
              visible.map((lead) => {
                const dateStr = lead.contact_date_added
                  ? new Date(lead.contact_date_added).toLocaleDateString(
                      "en-US",
                      { month: "short", day: "numeric" },
                    )
                  : lead.updated_at_ghl
                    ? new Date(lead.updated_at_ghl).toLocaleDateString(
                        "en-US",
                        { month: "short", day: "numeric" },
                      )
                    : "";
                const sourceLabel = lead.contact_source || lead.opp_source;
                const stageDot = lead.stage_is_sale
                  ? T.green
                  : lead.stage_is_noshow
                    ? T.red
                    : lead.stage_is_show
                      ? T.green
                      : T.airaBlue;
                const stageLabel = (
                  lead.stage_name ||
                  lead.opp_status ||
                  "Stage"
                )
                  .toString()
                  .toUpperCase();
                // Last-contact freshness tier:
                //   <24h  → green, "3h ago — SMS"
                //   1-7d  → neutral dot (airaBlue), "2d ago — call"
                //   8-14d → amber,  "10d ago"
                //   15+d or never → red, "No contact logged"
                const freshness = (() => {
                  const t = lead.last_contact_at;
                  if (!t) {
                    return {
                      dot: T.red,
                      text: "No contact logged",
                      tone: T.red,
                    };
                  }
                  const ageMs = Date.now() - t;
                  const dayMs = 86400000;
                  const hrMs = 3600000;
                  const kindSuffix = lead.last_contact_kind
                    ? ` — ${lead.last_contact_kind}`
                    : "";
                  if (ageMs < dayMs) {
                    const hrs = Math.max(1, Math.floor(ageMs / hrMs));
                    return {
                      dot: T.green,
                      text: `${hrs}h ago${kindSuffix}`,
                      tone: T.textMuted,
                    };
                  }
                  const days = Math.floor(ageMs / dayMs);
                  if (days <= 7) {
                    return {
                      dot: T.airaBlue,
                      text: `${days}d ago${kindSuffix}`,
                      tone: T.textMuted,
                    };
                  }
                  if (days <= 14) {
                    return {
                      dot: T.amber,
                      text: `${days}d ago`,
                      tone: T.textMuted,
                    };
                  }
                  return {
                    dot: T.red,
                    text: "No contact logged",
                    tone: T.red,
                  };
                })();
                return (
                  <div
                    key={lead.opportunity_id}
                    onClick={() => onSelect(lead)}
                    className="surface-card interactive"
                    style={{
                      padding: "16px 18px",
                      marginBottom: 10,
                    }}
                  >
                    <div
                      style={{
                        display: "flex",
                        justifyContent: "space-between",
                        alignItems: "flex-start",
                        marginBottom: 8,
                        gap: 10,
                      }}
                    >
                      <div style={{ minWidth: 0 }}>
                        <div
                          style={{
                            fontSize: 15,
                            fontWeight: 500,
                            color: T.textHi,
                            letterSpacing: "-0.005em",
                            overflow: "hidden",
                            textOverflow: "ellipsis",
                            whiteSpace: "nowrap",
                          }}
                        >
                          {lead.full_name}
                        </div>
                        <div
                          style={{
                            fontSize: 12,
                            color: T.textMuted,
                            marginTop: 2,
                          }}
                        >
                          {sourceLabel ? `${sourceLabel} · ` : ""}
                          {dateStr || "—"}
                        </div>
                      </div>
                      <span
                        style={{
                          display: "inline-flex",
                          alignItems: "center",
                          gap: 6,
                          fontSize: 10,
                          fontWeight: 500,
                          letterSpacing: "0.12em",
                          textTransform: "uppercase",
                          color: T.textMuted,
                          flexShrink: 0,
                        }}
                      >
                        <span
                          style={{
                            width: 6,
                            height: 6,
                            borderRadius: "50%",
                            background: stageDot,
                            flexShrink: 0,
                          }}
                        />
                        {stageLabel}
                      </span>
                    </div>

                    {aggregate && locNameById[lead.location_id] && (
                      <div
                        style={{
                          fontSize: 11,
                          color: T.textMuted,
                          marginBottom: 4,
                        }}
                      >
                        📍{" "}
                        <span style={{ color: T.text, fontWeight: 500 }}>
                          {locNameById[lead.location_id]}
                        </span>
                      </div>
                    )}

                    <div
                      style={{
                        display: "inline-flex",
                        alignItems: "center",
                        gap: 6,
                        fontSize: 11,
                        fontWeight: 500,
                        color: freshness.tone,
                        marginTop: 6,
                      }}
                    >
                      <span
                        style={{
                          width: 6,
                          height: 6,
                          borderRadius: "50%",
                          background: freshness.dot,
                          flexShrink: 0,
                        }}
                      />
                      {freshness.text}
                    </div>

                    <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                      {lead.phone && (
                        <ActionBtn
                          icon="📞"
                          label="Call"
                          href={`tel:${lead.phone}`}
                          primary
                          small
                          onClick={(e) => {
                            e.stopPropagation();
                            markPendingCall({
                              contactId: lead.contact_id,
                              contactName: lead.full_name,
                              ghl_location_id: lead.location_id,
                            });
                          }}
                        />
                      )}
                      {lead.phone && (
                        <ActionBtn
                          icon="💬"
                          label="Text"
                          small
                          onClick={(e) => {
                            e.stopPropagation();
                            setComposeLead(lead);
                          }}
                        />
                      )}
                    </div>
                  </div>
                );
              })}

            {!loading && visible.length === 0 && !error && (
              <div
                className="surface-card"
                style={{
                  padding: 40,
                  textAlign: "center",
                  color: T.textMuted,
                  fontSize: 13,
                }}
              >
                {leads.length === 0
                  ? "No leads synced yet for this location."
                  : "No leads match this filter."}
              </div>
            )}

            {composeLead && (
              <SendMessageComposer
                contactName={composeLead.full_name}
                contactPhone={composeLead.phone}
                submitting={sendingMessage}
                onSend={sendMessage}
                onCancel={() => {
                  if (!sendingMessage) setComposeLead(null);
                }}
              />
            )}
          </div>
        );
      }

      // ── Send Message Composer ──
      // Replaces the browser's native sms: handler on the Text button.
      // sms: would send from the rep's personal number and bypass GHL
      // entirely (decision 2026-04-20). This composer routes through
      // ghl-send-message so the message comes from GHL's location
      // number, shows up in the Conversations thread, and is
      // attributable. Handles both "reply in existing thread" and
      // "start a new thread with a never-messaged lead" — the backend
      // call is the same either way.
      function SendMessageComposer({
        contactName,
        contactPhone,
        submitting,
        onSend,
        onCancel,
      }) {
        const [msg, setMsg] = useState("");
        const trimmed = msg.trim();
        const canSubmit = trimmed.length > 0 && !submitting;
        return (
          <div style={{ ...MODAL_BACKDROP, zIndex: 320 }}>
            <div className="fade-in" style={MODAL_CARD}>
              <div
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "flex-start",
                  gap: 10,
                }}
              >
                <div>
                  <div
                    style={{
                      fontSize: 10,
                      fontWeight: 500,
                      letterSpacing: "0.12em",
                      textTransform: "uppercase",
                      color: T.textMuted,
                    }}
                  >
                    Send SMS
                  </div>
                  <div
                    style={{ ...MODAL_TITLE, marginTop: 4, lineHeight: 1.3 }}
                  >
                    {contactName || "(unknown contact)"}
                  </div>
                  {contactPhone && (
                    <div
                      style={{
                        fontSize: 12,
                        color: T.textMuted,
                        marginTop: 3,
                      }}
                    >
                      {contactPhone}
                    </div>
                  )}
                </div>
                <button
                  onClick={onCancel}
                  disabled={submitting}
                  style={MODAL_CLOSE(submitting)}
                >
                  ×
                </button>
              </div>
              <textarea
                value={msg}
                onChange={(e) => setMsg(e.target.value)}
                placeholder="Type your message…"
                disabled={submitting}
                rows={5}
                autoFocus
                onKeyDown={(e) => {
                  // ⌘/Ctrl + Enter sends. Plain Enter is a newline so
                  // reps can write multi-line texts without accident.
                  if (
                    (e.metaKey || e.ctrlKey) &&
                    e.key === "Enter" &&
                    canSubmit
                  ) {
                    e.preventDefault();
                    onSend(trimmed);
                  }
                }}
                style={{
                  padding: "12px 14px",
                  borderRadius: 10,
                  border: `0.5px solid ${T.border}`,
                  background: T.surface,
                  color: T.text,
                  fontSize: 14,
                  lineHeight: 1.5,
                  outline: "none",
                  fontFamily: "inherit",
                  width: "100%",
                  boxSizing: "border-box",
                  resize: "vertical",
                  minHeight: 100,
                }}
              />
              <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
                <button
                  onClick={onCancel}
                  disabled={submitting}
                  className="btn-secondary"
                  style={{ flex: 1, padding: "12px" }}
                >
                  Cancel
                </button>
                <button
                  onClick={() => onSend(trimmed)}
                  disabled={!canSubmit}
                  className="btn-primary"
                  style={{ flex: 2, padding: "12px" }}
                >
                  {submitting ? "Sending…" : "Send"}
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ── Sale Modal ──
      // Fires when a user moves an opportunity to a counts_as_sale stage
      // (either a fresh close or an "Edit sale" action on an already-sold
      // lead). Captures two distinct dollar values so the business can
      // see heavy-PIF vs discounted-MRR patterns the old single-field
      // model hid: Gross Sale = total cash at close, MRR = monthly
      // recurring membership rate going forward.
      function SaleModal({
        title,
        soldByName,
        initialGross,
        initialMrr,
        initialIsPif,
        submitting,
        onConfirm,
        onCancel,
      }) {
        const [gross, setGross] = useState(
          initialGross != null ? String(initialGross) : "",
        );
        const [mrr, setMrr] = useState(
          initialMrr != null ? String(initialMrr) : "220",
        );
        const [isPif, setIsPif] = useState(!!initialIsPif);
        const numGross = Number(gross);
        const numMrr = Number(mrr);
        const valid =
          Number.isFinite(numGross) &&
          numGross >= 0 &&
          Number.isFinite(numMrr) &&
          numMrr >= 0 &&
          gross.trim().length > 0;

        const inputStyle = {
          padding: "12px 14px",
          borderRadius: 10,
          border: `0.5px solid ${T.border}`,
          background: T.surface,
          color: T.text,
          fontSize: 15,
          outline: "none",
          fontFamily: "inherit",
          width: "100%",
          boxSizing: "border-box",
        };
        const labelStyle = {
          fontSize: 10,
          fontWeight: 500,
          letterSpacing: "0.12em",
          textTransform: "uppercase",
          color: T.textMuted,
        };

        return (
          <div style={{ ...MODAL_BACKDROP, zIndex: 350 }}>
            <div className="fade-in" style={MODAL_CARD}>
              <div
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                }}
              >
                <div style={MODAL_TITLE}>{title}</div>
                <button
                  onClick={onCancel}
                  disabled={submitting}
                  style={MODAL_CLOSE(submitting)}
                >
                  ×
                </button>
              </div>
              <div>
                <label style={labelStyle}>Gross Sale (cash at close)</label>
                <input
                  type="number"
                  inputMode="decimal"
                  min={0}
                  step="1"
                  value={gross}
                  onChange={(e) => setGross(e.target.value)}
                  disabled={submitting}
                  placeholder="1296"
                  style={{ ...inputStyle, marginTop: 6 }}
                />
                <div
                  style={{
                    fontSize: 11,
                    color: T.textMuted,
                    marginTop: 6,
                  }}
                >
                  Total paid today — enrollment fee, first month, and PIF (if
                  any). This is the dollars collected.
                </div>
              </div>
              <div>
                <label style={labelStyle}>MRR (monthly membership rate)</label>
                <input
                  type="number"
                  inputMode="decimal"
                  min={0}
                  step="1"
                  value={mrr}
                  onChange={(e) => setMrr(e.target.value)}
                  disabled={submitting}
                  style={{ ...inputStyle, marginTop: 6 }}
                />
                <div
                  style={{
                    fontSize: 11,
                    color: T.textMuted,
                    marginTop: 6,
                  }}
                >
                  The monthly membership rate going forward. Aira standard is
                  $220.
                </div>
              </div>
              <label
                style={{
                  display: "flex",
                  alignItems: "flex-start",
                  gap: 8,
                  fontSize: 14,
                  color: T.text,
                  cursor: "pointer",
                  padding: "8px 0",
                  lineHeight: 1.4,
                }}
              >
                <input
                  type="checkbox"
                  checked={isPif}
                  onChange={(e) => setIsPif(e.target.checked)}
                  disabled={submitting}
                  style={{ accentColor: T.airaBlue, marginTop: 3 }}
                />
                <span>
                  Was this a PIF?
                  <span
                    style={{
                      display: "block",
                      fontSize: 11,
                      color: T.textMuted,
                      marginTop: 2,
                    }}
                  >
                    Paid in Full — tracks toward the 20% PIF attach benchmark.
                  </span>
                </span>
              </label>
              <div
                style={{
                  padding: "10px 12px",
                  borderRadius: 10,
                  background: T.surfaceAlt,
                  border: `0.5px solid ${T.border}`,
                  display: "flex",
                  alignItems: "center",
                  gap: 8,
                }}
              >
                <span
                  style={{
                    fontSize: 10,
                    color: T.textMuted,
                    letterSpacing: "0.1em",
                    textTransform: "uppercase",
                    fontWeight: 500,
                  }}
                >
                  Sold by
                </span>
                <span
                  style={{ fontSize: 13, color: T.textHi, fontWeight: 500 }}
                >
                  {soldByName || "you"}
                </span>
              </div>
              <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
                <button
                  onClick={onCancel}
                  disabled={submitting}
                  className="btn-secondary"
                  style={{ flex: 1, padding: "12px" }}
                >
                  Cancel
                </button>
                <button
                  onClick={() =>
                    onConfirm({
                      gross_sale: numGross,
                      mrr: numMrr,
                      is_pif: isPif,
                    })
                  }
                  disabled={submitting || !valid}
                  className="btn-primary"
                  style={{ flex: 2, padding: "12px" }}
                >
                  {submitting ? "Saving…" : "Confirm Sale"}
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ── Lead Detail (real data) ──
      // `lead` here is the composed shape that LeadsScreen produced.
      // We load extra context (all opportunities for this contact, recent
      // call logs) and expose a stage picker that writes to GHL via the
      // ghl-update-opportunity Edge Function.
      function LeadDetail({
        lead,
        profile,
        onBack,
        onBook,
        onToast,
        onChanged,
        onOpenConversation,
      }) {
        const [opportunities, setOpportunities] = useState([]);
        const [stages, setStages] = useState([]);
        const [callLogs, setCallLogs] = useState([]);
        const [staff, setStaff] = useState([]);
        const [loading, setLoading] = useState(true);
        const [savingStage, setSavingStage] = useState(false);
        const [currentStageId, setCurrentStageId] = useState(lead.stage_id);
        const [currentStageName, setCurrentStageName] = useState(
          lead.stage_name,
        );
        const [currentAssignedTo, setCurrentAssignedTo] = useState(
          lead.opp_assigned || null,
        );
        const [assignOpen, setAssignOpen] = useState(false);
        const [savingAssign, setSavingAssign] = useState(false);
        // Sale-value state. currentSale reflects the latest sale data we
        // know about for THIS opportunity; seeded from the composed lead
        // row and overwritten on every successful sale/edit. gross_sale
        // + mrr per the 2026-04-20 split; if only legacy monetary_value
        // is present (pre-split rows) we treat it as mrr.
        const [currentSale, setCurrentSale] = useState({
          gross_sale: lead.gross_sale != null ? Number(lead.gross_sale) : null,
          mrr:
            lead.mrr != null
              ? Number(lead.mrr)
              : lead.monetary_value != null
                ? Number(lead.monetary_value)
                : null,
          is_pif: !!lead.is_pif,
          sold_at: lead.sold_at || null,
        });
        // { pendingStage, editMode } → open the SaleModal either for a
        // fresh close (pendingStage is the stage we'll commit on confirm)
        // or for an edit of the already-recorded sale (editMode: true).
        const [saleModal, setSaleModal] = useState(null);
        // LeadDetail's "📞 Log Call" button opens CallOutcomeModal directly,
        // bypassing the sessionStorage pending-call flow that was built
        // for the tap-to-call path.
        const [logCallOpen, setLogCallOpen] = useState(false);
        // Text → in-portal SendMessageComposer → ghl-send-message. The
        // browser's native sms: handler was bypassing GHL entirely.
        const [composeOpen, setComposeOpen] = useState(false);
        const [sendingMessage, setSendingMessage] = useState(false);
        // AI Off toggles the "ai off" tag on this contact via ghl-set-tag.
        // Closebot's workflow watches for the tag and pauses automation
        // when present. Optimistic UI: flip immediately, rollback on
        // edge-function failure.
        const [aiOff, setAiOff] = useState(false);
        const [aiOffSaving, setAiOffSaving] = useState(false);

        const markCall = () =>
          markPendingCall({
            contactId: lead.contact_id,
            contactName: lead.full_name,
            ghl_location_id: lead.location_id,
          });

        const load = useCallback(async () => {
          setLoading(true);
          try {
            const [oppsRes, stagesRes, callsRes, staffRes, contactRes] =
              await Promise.all([
                window.supabase
                  .from("opportunities")
                  .select(
                    "ghl_opportunity_id, pipeline_id, pipeline_stage_id, name, status, monetary_value, gross_sale, mrr, is_pif, sold_at, assigned_to, updated_at_ghl, created_at_ghl",
                  )
                  .eq("ghl_location_id", lead.location_id)
                  .eq("ghl_contact_id", lead.contact_id || "__none__")
                  .order("updated_at_ghl", {
                    ascending: false,
                    nullsFirst: false,
                  }),
                window.supabase
                  .from("pipeline_stages")
                  .select(
                    "ghl_stage_id, name, position, counts_as_show, counts_as_no_show, counts_as_sale, counts_as_trial, pipeline_id",
                  )
                  .eq("ghl_location_id", lead.location_id)
                  .order("position", {
                    ascending: true,
                    nullsFirst: false,
                  }),
                window.supabase
                  .from("call_logs")
                  .select(
                    "id, outcome, notes, called_at, user_id, users:user_id(full_name)",
                  )
                  .eq("ghl_location_id", lead.location_id)
                  .eq("ghl_contact_id", lead.contact_id || "__none__")
                  .order("called_at", { ascending: false })
                  .limit(20),
                window.supabase
                  .from("ghl_staff")
                  .select("ghl_user_id, full_name, email")
                  .eq("ghl_location_id", lead.location_id)
                  .order("full_name", { ascending: true, nullsFirst: false }),
                // Contact row for the "ai off" tag state.
                window.supabase
                  .from("contacts")
                  .select("tags")
                  .eq("ghl_contact_id", lead.contact_id || "__none__")
                  .maybeSingle(),
              ]);
            if (oppsRes.error) throw oppsRes.error;
            if (stagesRes.error) throw stagesRes.error;
            if (callsRes.error) throw callsRes.error;
            if (staffRes.error) throw staffRes.error;
            setOpportunities(oppsRes.data || []);
            setStages(stagesRes.data || []);
            setCallLogs(callsRes.data || []);
            setStaff(staffRes.data || []);
            const tagsArr = Array.isArray(contactRes?.data?.tags)
              ? contactRes.data.tags
              : [];
            setAiOff(tagsArr.some((t) => (t || "").toLowerCase() === "ai off"));
            const thisOpp = (oppsRes.data || []).find(
              (o) => o.ghl_opportunity_id === lead.opportunity_id,
            );
            if (thisOpp) {
              setCurrentStageId(thisOpp.pipeline_stage_id);
              const s = (stagesRes.data || []).find(
                (x) => x.ghl_stage_id === thisOpp.pipeline_stage_id,
              );
              setCurrentStageName(s?.name || null);
              setCurrentAssignedTo(thisOpp.assigned_to || null);
              setCurrentSale({
                gross_sale:
                  thisOpp.gross_sale != null
                    ? Number(thisOpp.gross_sale)
                    : null,
                mrr:
                  thisOpp.mrr != null
                    ? Number(thisOpp.mrr)
                    : thisOpp.monetary_value != null
                      ? Number(thisOpp.monetary_value)
                      : null,
                is_pif: !!thisOpp.is_pif,
                sold_at: thisOpp.sold_at || null,
              });
            }
          } catch (e) {
            console.error("lead detail load failed:", e);
            if (onToast) {
              onToast({
                kind: "error",
                text: e && e.message ? e.message : "Failed to load lead",
              });
            }
          } finally {
            setLoading(false);
          }
        }, [lead.location_id, lead.contact_id, lead.opportunity_id, onToast]);

        useEffect(() => {
          load();
        }, [load]);

        // Commit stage + optional sale fields through the Edge Function.
        // Optimistic on the stage; rollback on failure.
        const commitStageChange = async (stage, sale) => {
          const prevId = currentStageId;
          const prevName = currentStageName;
          const prevSale = currentSale;
          setSavingStage(true);
          setCurrentStageId(stage.ghl_stage_id);
          setCurrentStageName(stage.name);
          if (sale) {
            setCurrentSale({
              gross_sale: sale.gross_sale,
              mrr: sale.mrr,
              is_pif: !!sale.is_pif,
              sold_at: new Date().toISOString(),
            });
          }
          try {
            const statusHint = stage.counts_as_sale
              ? "won"
              : stage.counts_as_no_show
                ? "lost"
                : "open";
            const payload = {
              opportunity_id: lead.opportunity_id,
              pipeline_stage_id: stage.ghl_stage_id,
              status: statusHint,
            };
            if (sale) {
              payload.gross_sale = sale.gross_sale;
              payload.mrr = sale.mrr;
              // monetary_value mirrors mrr so GHL's UI stays in sync.
              payload.monetary_value = sale.mrr;
              payload.is_pif = !!sale.is_pif;
            }
            const resp = await callEdgeFunction(
              "ghl-update-opportunity",
              payload,
            );
            if (resp?.assigned_to_caller && resp?.acting_ghl_user_id) {
              setCurrentAssignedTo(resp.acting_ghl_user_id);
            }
            if (onToast) {
              const assignedSuffix = resp?.assigned_to_caller
                ? ". Assigned to you."
                : "";
              onToast({
                kind: "success",
                text: `Stage updated to ${stage.name}${assignedSuffix}`,
              });
            }
            setSaleModal(null);
            if (onChanged) onChanged();
          } catch (e) {
            setCurrentStageId(prevId);
            setCurrentStageName(prevName);
            setCurrentSale(prevSale);
            if (onToast) {
              onToast({
                kind: "error",
                text: e && e.message ? e.message : "Update failed",
              });
            }
          } finally {
            setSavingStage(false);
          }
        };

        // Stage-picker entry point. If the target stage counts as a sale,
        // we detour through SaleModal BEFORE touching GHL — cancelling
        // the modal keeps the stage unchanged. Non-sale stages commit
        // immediately.
        const changeStage = (stage) => {
          if (savingStage || stage.ghl_stage_id === currentStageId) return;
          if (stage.counts_as_sale) {
            setSaleModal({ mode: "close", stage });
            return;
          }
          commitStageChange(stage, null);
        };

        // Edit an already-recorded sale (gross_sale / mrr / is_pif only
        // — no stage change). Same Edge Function.
        const commitSaleEdit = async (sale) => {
          const prevSale = currentSale;
          setSavingStage(true);
          setCurrentSale({
            gross_sale: sale.gross_sale,
            mrr: sale.mrr,
            is_pif: !!sale.is_pif,
            sold_at: prevSale?.sold_at || new Date().toISOString(),
          });
          try {
            await callEdgeFunction("ghl-update-opportunity", {
              opportunity_id: lead.opportunity_id,
              gross_sale: sale.gross_sale,
              mrr: sale.mrr,
              monetary_value: sale.mrr,
              is_pif: !!sale.is_pif,
            });
            if (onToast) {
              onToast({
                kind: "success",
                text: `Sale updated · $${Number(
                  sale.gross_sale || 0,
                ).toLocaleString()} gross / $${Number(
                  sale.mrr || 0,
                ).toLocaleString()} MRR`,
              });
            }
            setSaleModal(null);
            if (onChanged) onChanged();
          } catch (e) {
            setCurrentSale(prevSale);
            if (onToast) {
              onToast({
                kind: "error",
                text: e && e.message ? e.message : "Sale update failed",
              });
            }
          } finally {
            setSavingStage(false);
          }
        };

        const assignTo = async (targetGhlUserId, targetFullName) => {
          if (savingAssign || targetGhlUserId === currentAssignedTo) {
            setAssignOpen(false);
            return;
          }
          const prev = currentAssignedTo;
          setSavingAssign(true);
          setCurrentAssignedTo(targetGhlUserId);
          try {
            await callEdgeFunction("ghl-assign-opportunity", {
              opportunity_id: lead.opportunity_id,
              ghl_user_id: targetGhlUserId,
            });
            if (onToast) {
              onToast({
                kind: "success",
                text: `Assigned to ${targetFullName || "rep"}`,
              });
            }
            if (onChanged) onChanged();
          } catch (e) {
            setCurrentAssignedTo(prev);
            if (onToast) {
              onToast({
                kind: "error",
                text: e && e.message ? e.message : "Assignment failed",
              });
            }
          } finally {
            setSavingAssign(false);
            setAssignOpen(false);
          }
        };

        const sendMessage = async (message) => {
          if (!lead.contact_id) {
            if (onToast) {
              onToast({
                kind: "error",
                text: "Missing contact id — can't send from this lead",
              });
            }
            return;
          }
          setSendingMessage(true);
          try {
            await callEdgeFunction("ghl-send-message", {
              ghl_location_id: lead.location_id,
              ghl_contact_id: lead.contact_id,
              type: "SMS",
              message,
            });
            if (onToast) {
              onToast({ kind: "success", text: "Message sent." });
            }
            setComposeOpen(false);
            if (onChanged) onChanged();
            // Route to Conversations with this contact pre-selected so
            // the rep sees the thread (or a "syncing" state for a
            // brand-new conversation until the next cache cycle).
            if (onOpenConversation) {
              onOpenConversation(lead.contact_id);
            }
          } catch (e) {
            if (onToast) {
              onToast({
                kind: "error",
                text: e && e.message ? e.message : "Send failed",
              });
            }
          } finally {
            setSendingMessage(false);
          }
        };

        const toggleAiOff = async () => {
          if (!lead.contact_id || aiOffSaving) return;
          const next = !aiOff;
          setAiOff(next); // optimistic
          setAiOffSaving(true);
          try {
            await callEdgeFunction("ghl-set-tag", {
              contact_id: lead.contact_id,
              tag: "ai off",
              action: next ? "add" : "remove",
            });
            if (onToast) {
              onToast({
                kind: next ? "info" : "success",
                text: next ? "AI paused on this contact" : "AI re-enabled",
              });
            }
          } catch (e) {
            // Rollback on failure — don't mislead about GHL state.
            setAiOff(!next);
            if (onToast) {
              onToast({
                kind: "error",
                text: e && e.message ? e.message : "AI Off toggle failed",
              });
            }
          } finally {
            setAiOffSaving(false);
          }
        };

        const canReassignAnyone =
          profile &&
          (profile.role === "admin" ||
            profile.role === "regional_director" ||
            profile.role === "vp" ||
            profile.role === "manager" ||
            profile.role === "franchisee");
        const callerOwnGhlId = (() => {
          if (!profile?.email) return null;
          const match = staff.find(
            (s) =>

        })();
        const assignedStaffName = (() => {

          return match?.full_name || match?.email || null;
        })();

        const dateAddedStr = lead.contact_date_added
          ? new Date(lead.contact_date_added).toLocaleDateString("en-US", {

              day: "numeric",
              year: "numeric",

        const sourceLabel = lead.contact_source || lead.opp_source;

        return (
          <div className="fade-in" style={{ padding: "24px 20px 32px" }}>
            <button
              className="btn-ghost"
              onClick={onBack}
              style={{ fontSize: 13, marginBottom: 14, paddingLeft: 0 }}
            >
              ← Back to Leads
            </button>
            <div
              className="surface-card"
              style={{ padding: 24, marginBottom: 16 }}

                style={{

                  <div
                    style={{
                      fontSize: 22,
                      fontWeight: 500,
                      color: T.textHi,
                      fontFamily: "'Outfit',sans-serif",
                      letterSpacing: "-0.01em",

                  >
                    {lead.full_name}
                  </div>
                  <div
                    style={{

                      color: T.textMuted,
                      marginTop: 4,

                    {sourceLabel ? `${sourceLabel} · ` : ""}
