                }
              />
            </div>

            <div className="surface-card" style={{ overflow: "hidden" }}>
              <div
                style={{
                  padding: "20px 24px 14px",
                  fontSize: 11,
                  fontWeight: 500,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  color: T.textMuted,
                }}
              >
                Locations
              </div>
              {loading &&
                [0, 1].map((i) => (
                  <div
                    key={`skel-${i}`}
                    style={{
                      padding: "18px 24px",
                      borderTop: `0.5px solid ${T.border}`,
                      display: "flex",
                      flexDirection: "column",
                      gap: 10,
                    }}
                  >
                    <div
                      style={{ display: "flex", alignItems: "center", gap: 12 }}
                    >
                      <SkelBar w={36} h={36} radius={10} />
                      <div
                        style={{
                          flex: 1,
                          display: "flex",
                          flexDirection: "column",
                          gap: 5,
                        }}
                      >
                        <SkelBar w={140} h={12} />
                        <SkelBar w={90} h={10} />
                      </div>
                    </div>
                    <SkelBar w={"100%"} h={14} />
                  </div>
                ))}
              {!loading && rows.length === 0 && !error && (
                <div
                  style={{
                    padding: "22px 24px",
                    borderTop: `0.5px solid ${T.border}`,
                    textAlign: "center",
                    color: T.textMuted,

                  No accessible locations returned.
                </div>
              )}
              {!loading &&
                rows.map((r, i) => {
                  const rlds = Number(r.leads) || 0;
                  const rbkd = Number(r.booked_appts) || 0;
                  const rshw = Number(r.showed) || 0;
                  const rs = Number(r.sales) || 0;
                  const rrv = Number(r.revenue) || 0;
                  const lcr = rlds > 0 ? Math.round((rs / rlds) * 100) : 0;
                  const lsr = rbkd > 0 ? Math.round((rshw / rbkd) * 100) : 0;
                  const name = r.location_name || "—";
                  const initial = (name[0] || "?").toUpperCase();
                  return (
                    <button
                      key={r.ghl_location_id || `loc-${i}`}
                      onClick={() => onSelectLocation(r.ghl_location_id)}
                      style={{
                        width: "100%",
                        textAlign: "left",
                        display: "block",
                        padding: "18px 24px",
                        borderTop: `0.5px solid ${T.border}`,
                        border: "none",
                        borderTopWidth: "0.5px",
                        borderTopStyle: "solid",
                        borderTopColor: T.border,
                        background: "transparent",
                        color: T.text,
                        cursor: "pointer",
                        fontFamily: "inherit",
                        transition: "background 160ms ease",
                      }}
                      onMouseEnter={(e) =>
                        (e.currentTarget.style.background = T.surfaceHover)
                      }
                      onMouseLeave={(e) =>
                        (e.currentTarget.style.background = "transparent")
                      }
                    >
                      <div
                        style={{
                          display: "flex",
                          alignItems: "center",
                          gap: 12,
                          marginBottom: 14,
                        }}
                      >
                        <div
                          style={{
                            width: 36,
                            height: 36,
                            borderRadius: 10,
                            background: T.airaBlueDim,
                            display: "flex",
                            alignItems: "center",
                            justifyContent: "center",
                            fontSize: 14,
                            fontWeight: 500,
                            color: T.airaBlue,
                            fontFamily: "'Outfit',sans-serif",
                            flexShrink: 0,
                          }}
                        >
                          {initial}
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div
                            style={{
                              fontSize: 14,
                              fontWeight: 500,
                              color: T.textHi,
                              letterSpacing: "-0.005em",
                              overflow: "hidden",
                              textOverflow: "ellipsis",
                              whiteSpace: "nowrap",
                            }}
                          >
                            {name}
                          </div>
                          <div
                            style={{
                              fontSize: 11,
                              color: T.textMuted,
                              marginTop: 2,
                            }}
                          >
                            Tap to view details →
                          </div>
                        </div>
                      </div>
                      <div
                        style={{
                          display: "grid",
                          gridTemplateColumns: "repeat(6, 1fr)",
                          gap: 6,
                        }}
                      >
                        <LocStat label="Leads" value={rlds} />
                        <LocStat label="Booked" value={rbkd} />
                        <LocStat
                          label="Showed"
                          value={rshw}
                          status={lsr >= 40 ? "good" : "bad"}
                        />
                        <LocStat label="Sales" value={rs} />
                        <LocStat
                          label="Close"
                          value={`${lcr}%`}
                          status={lcr >= 40 ? "good" : "bad"}
                        />
                        <LocStat
                          label="Rev"
                          value={`$${rrv.toLocaleString()}`}
                        />
                      </div>
                    </button>
                  );
                })}
            </div>

            {/* Territory-wide rep activity leaderboard. Folds the
                per-(rep × location) rows the RPC returns into one row
                per rep, with 📍 tags showing where the activity came
                from. */}
            {(() => {
              const locNameById = Object.fromEntries(
                (accessibleLocations || []).map((l) => [
                  l.ghl_location_id,
                  l.name,
                ]),
              );
              const byRep = new Map();
              (leaderboard || []).forEach((r) => {
                const key = r.user_id || r.ghl_user_id;
                if (!key) return;
                const existing = byRep.get(key) || {
                  user_id: r.user_id,
                  ghl_user_id: r.ghl_user_id,
                  full_name: r.full_name,
                  role: r.role,
                  calls: 0,
                  appts: 0,
                  sales: 0,
                  gross: 0,
                  mrr: 0,
                  trial_to_sale: 0,
                  locations: [],
                };
                existing.calls += Number(r.calls) || 0;
                existing.appts += Number(r.appts) || 0;
                existing.sales += Number(r.sales) || 0;
                existing.gross += Number(r.gross) || 0;
                existing.mrr += Number(r.mrr) || 0;
                existing.trial_to_sale += Number(r.trial_to_sale) || 0;
                const locName =
                  locNameById[r.ghl_location_id] || r.location_name;
                if (locName && !existing.locations.includes(locName)) {
                  existing.locations.push(locName);
                }
                byRep.set(key, existing);
              });
              const folded = Array.from(byRep.values()).sort(
                (a, b) =>
                  b.mrr - a.mrr ||
                  b.gross - a.gross ||
                  b.appts - a.appts ||
                  b.calls - a.calls,
              );
              if (loading && folded.length === 0) return null;
              return (
                <div
                  className="surface-card"
                  style={{ overflow: "hidden", marginTop: 18 }}
                >
                  <div
                    style={{
                      padding: "20px 24px 14px",
                      fontSize: 11,
                      fontWeight: 500,
                      letterSpacing: "0.12em",
                      textTransform: "uppercase",
                      color: T.textMuted,
                    }}
                  >
                    Rep Activity — Territory
                  </div>
                  {folded.length === 0 ? (
                    <div
                      style={{
                        padding: "22px 24px",
                        borderTop: `0.5px solid ${T.border}`,
                        textAlign: "center",
                        color: T.textMuted,
                        fontSize: 13,
                        lineHeight: 1.55,
                      }}
                    >
                      No logged activity yet this period.
                      <br />
                      Reps appear here when they log a call, book an
                      appointment, or close a sale in the portal.
                    </div>
                  ) : (
                    folded.map((r, i) => {
                      const initial = (r.full_name || "?")[0].toUpperCase();
                      const statCellStyle = {
                        textAlign: "center",
                        minWidth: 44,
                      };
                      const numCellStyle = {
                        fontSize: 14,
                        fontWeight: 500,
                        color: T.textHi,
                        fontFamily: "'Outfit',sans-serif",
                        letterSpacing: "-0.01em",
                      };
                      const labelCellStyle = {
                        fontSize: 9,
                        color: T.textDim,
                        letterSpacing: "0.1em",
                        marginTop: 2,
                      };
                      return (
                        <div
                          key={r.ghl_user_id || r.user_id || `row-${i}`}
                          style={{
                            display: "flex",
                            alignItems: "center",
                            padding: "14px 24px",
                            borderTop: `0.5px solid ${T.border}`,
                            gap: 12,
                          }}
                        >
                          <div
                            style={{
                              width: 36,
                              height: 36,
                              borderRadius: "50%",
                              background: T.airaBlueDim,
                              display: "flex",
                              alignItems: "center",
                              justifyContent: "center",
                              fontSize: 14,
                              fontWeight: 500,
                              color: T.airaBlue,
                              fontFamily: "'Outfit',sans-serif",
                              flexShrink: 0,
                            }}
                          >
                            {initial}
                          </div>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div
                              style={{
                                fontSize: 14,
                                fontWeight: 500,
                                color: T.textHi,
                                letterSpacing: "-0.005em",
                                overflow: "hidden",
                                textOverflow: "ellipsis",
                                whiteSpace: "nowrap",
                              }}
                            >
                              {r.full_name || "Unknown"}
                            </div>
                            <div
                              style={{
                                fontSize: 11,
                                color: T.textMuted,
                                marginTop: 2,
                              }}
                            >
                              📍 {r.locations.join(" · ")}
                            </div>
                          </div>
                          <div style={statCellStyle}>
                            <div style={numCellStyle}>{r.calls}</div>
                            <div style={labelCellStyle}>CALLS</div>
                          </div>
                          <div style={statCellStyle}>
                            <div style={numCellStyle}>{r.appts}</div>
                            <div style={labelCellStyle}>APPTS</div>
                          </div>
                          <div style={statCellStyle}>
                            <div style={numCellStyle}>{r.sales}</div>
                            <div style={labelCellStyle}>SALES</div>
                          </div>
                          <div style={{ ...statCellStyle, minWidth: 56 }}>
                            <div
                              style={{
                                ...numCellStyle,
                                color:
                                  r.trial_to_sale > 0 ? T.textHi : T.textDim,
                              }}
                            >
                              {r.trial_to_sale}
                            </div>
                            <div style={labelCellStyle}>TRIAL→SALE</div>
                          </div>
                          <div style={{ ...statCellStyle, minWidth: 60 }}>
                            <div
                              style={{
                                ...numCellStyle,
                                color: r.gross > 0 ? T.textHi : T.textDim,
                              }}
                            >
                              {r.gross > 0
                                ? `$${Math.round(r.gross).toLocaleString()}`
                                : "—"}
                            </div>
                            <div style={labelCellStyle}>GROSS</div>
                          </div>
                          <div style={{ ...statCellStyle, minWidth: 56 }}>
                            <div

                                ...numCellStyle,
                                color: r.mrr > 0 ? T.textHi : T.textDim,

                                ? `$${Math.round(r.mrr).toLocaleString()}`

      // ── Call Outcome Modal ──
      // CallOutcomeModal runs in two modes:
      //   (1) Pending-call flow (default): driven by sessionStorage —
      //       user taps a tel: link, markPendingCall() stashes the intent,
      //       they return to the tab, this modal picks up the pending and
      //       asks "how'd it go?". Used for rep-on-personal-phone flows.
      //   (2) Direct (LeadDetail "📞 Log Call" button): `direct` prop
      //       supplies contact info explicitly, `onClose` closes without
      //       a sessionStorage write. Kept <5 seconds end-to-end.
      function CallOutcomeModal({ profile, onLogged, direct, onClose }) {
        const [pending, setPending] = useState(() =>
          direct
            ? {
                ghl_location_id: direct.ghl_location_id,
                contactId: direct.contactId,
                contactName: direct.contactName,
                calledAt: Date.now(),
              }
            : readPendingCall(),
        );
        const [note, setNote] = useState("");
        const [submitting, setSubmitting] = useState(false);
        const [error, setError] = useState(null);

        useEffect(() => {
          // The pending-call flow refreshes on focus / visibility because
          // the intent was stashed in another tab. Direct mode never uses
          // sessionStorage, so those listeners would just be noise.
          if (direct) return;
          const refresh = () => setPending(readPendingCall());
          refresh();
          const onFocus = () => refresh();
          const onVis = () => {
            if (document.visibilityState === "visible") refresh();
          };
          window.addEventListener("focus", onFocus);
          document.addEventListener("visibilitychange", onVis);
          return () => {
            window.removeEventListener("focus", onFocus);
            document.removeEventListener("visibilitychange", onVis);
          };
        }, [direct]);

        if (!pending) return null;

        const submit = async (outcome) => {
          setSubmitting(true);
          setError(null);
          try {
            const nowIso = new Date().toISOString();
            const calledIso = direct
              ? nowIso
              : new Date(pending.calledAt).toISOString();
            const { error: err } = await window.supabase
              .from("call_logs")
              .insert({
                ghl_location_id: pending.ghl_location_id,
                ghl_contact_id: pending.contactId,
                user_id: profile.id,
                outcome,
                notes: note.trim() ? note.trim() : null,
                called_at: calledIso,
                ended_at: nowIso,
              });
            if (err) throw err;
            if (!direct) clearPendingCall();
            setPending(null);
            setNote("");
            setSubmitting(false);
            if (onLogged) onLogged();
            if (direct && onClose) onClose();
          } catch (e) {
            console.error("call_logs insert failed:", e);
            setError(e && e.message ? e.message : "Failed to log call");
            setSubmitting(false);
          }
        };

        const outcomes = [
          {
            key: "connected_booked",
            icon: "📞",
            label: "Connected — booked appointment",
          },
          {
            key: "connected_not_booked",
            icon: "💬",
            label: "Connected — didn't book",
          },
          { key: "no_answer", icon: "📵", label: "No answer (no voicemail)" },
          { key: "left_voicemail", icon: "🎙️", label: "Left voicemail" },
          { key: "wrong_number", icon: "❌", label: "Wrong number" },

        return (
          <div style={{ ...MODAL_BACKDROP, zIndex: 300 }}>
            <div className="fade-in" style={MODAL_CARD}>

                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "flex-start",

              >
                <div>
                  <div
                    style={{
                      fontSize: 10,
                      fontWeight: 500,
                      letterSpacing: "0.12em",

                  <div

              {outcomes.map((o) => (
                <button
                  key={o.key}
                  onClick={() => submit(o.key)}

                  className="btn-secondary"

                    display: "flex",
                    alignItems: "center",
                    gap: 10,

                    cursor: submitting ? "not-allowed" : "pointer",
                    opacity: submitting ? 0.6 : 1,

                  <span style={{ fontSize: 18 }}>{o.icon}</span>
                  <span>{o.label}</span>
                </button>
              ))}
              <input
                value={note}
                onChange={(e) => setNote(e.target.value)}
                placeholder="Add a note (optional)"
                disabled={submitting}
                style={{
                  marginTop: 4,
                  padding: "12px 14px",
                  borderRadius: 10,
                  border: `0.5px solid ${T.border}`,
                  background: T.surface,
                  color: T.text,
                  fontSize: 13,
                  outline: "none",
                }}
              />
              {error && <ModalErrorBanner message={error} />}
            </div>
          </div>
        );
      }

      // ── Book Appointment Modal ──
      function getTzOffsetString(dateStr, timeStr, tz) {
        const safeTz = tz || "America/Chicago";
        try {
          const sample = new Date(`${dateStr}T${timeStr}:00`);
          const dtf = new Intl.DateTimeFormat("en-US", {
            timeZone: safeTz,
            hour12: false,
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          });
          const parts = dtf.formatToParts(sample);
          const get = (t) => parts.find((p) => p.type === t)?.value;
          const naiveMs = Date.UTC(
            parseInt(get("year"), 10),
            parseInt(get("month"), 10) - 1,
            parseInt(get("day"), 10),
            parseInt(get("hour"), 10),
            parseInt(get("minute"), 10),
            parseInt(get("second"), 10),
          );
          const diffMin = Math.round((naiveMs - sample.getTime()) / 60000);
          const sign = diffMin >= 0 ? "+" : "-";
          const a = Math.abs(diffMin);
          return `${sign}${String(Math.floor(a / 60)).padStart(2, "0")}:${String(a % 60).padStart(2, "0")}`;
        } catch {
          return "-05:00";
        }
      }

      function defaultBookingSlot() {
        const d = new Date(Date.now() + 30 * 60 * 1000);
        const m = d.getMinutes();
        if (m !== 0) {
          if (m <= 30) d.setMinutes(30, 0, 0);
          else {
            d.setMinutes(0, 0, 0);
            d.setHours(d.getHours() + 1);
          }
        }
        const pad = (n) => String(n).padStart(2, "0");
        return {
          date: `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`,
          time: `${pad(d.getHours())}:${pad(d.getMinutes())}`,
        };
      }

      function BookAppointmentModal({
        profile,
        selectedLocationId,
        accessibleLocations,
        initialContact,
        initialContactQuery,
        onClose,
        onBooked,
      }) {
        const [contact, setContact] = useState(initialContact || null);
        const [query, setQuery] = useState(
          initialContactQuery || initialContact?.full_name || "",
        );
        const [results, setResults] = useState([]);
        const [searching, setSearching] = useState(false);
        const [dateTime, setDateTime] = useState(() => defaultBookingSlot());
        const [duration, setDuration] = useState(30);
        const [team, setTeam] = useState([]);
        const [assignedUserId, setAssignedUserId] = useState(null);
        const [submitting, setSubmitting] = useState(false);
        const [error, setError] = useState(null);

        const location = accessibleLocations.find(
          (l) => l.ghl_location_id === selectedLocationId,
        );
        const locTz = location?.timezone || "America/Chicago";
        const isSalesRep = profile.role === "sales_rep";

        // Load team for assigned-to dropdown
        useEffect(() => {
          let mounted = true;
          (async () => {
            try {
              const { data } = await window.supabase.rpc("location_team_kpis", {
                p_ghl_location_id: selectedLocationId,
              });
              if (!mounted) return;
              setTeam(data || []);
              // Default assignment
              const myGhl = profile.ghl_user_id;
              if (myGhl) {
                setAssignedUserId(myGhl);
              } else {
                // fallback: first manager at this location with a ghl_user_id
                const mgr = (data || []).find(
                  (t) => t.role === "manager" && t.ghl_user_id,
                );
                if (mgr) setAssignedUserId(mgr.ghl_user_id);
                else {
                  const anyRep = (data || []).find((t) => t.ghl_user_id);
                  if (anyRep) setAssignedUserId(anyRep.ghl_user_id);
                }
              }
            } catch (e) {
              console.error("team fetch failed:", e);
            }
          })();
          return () => {
            mounted = false;
          };
        }, [selectedLocationId, profile.ghl_user_id]);

        // Debounced contact search (skip if already have contact selected)
        useEffect(() => {
          if (contact || !query || query.trim().length < 2) {
            setResults([]);
            return;
          }
          let cancelled = false;
          const t = setTimeout(async () => {
            setSearching(true);
            try {
              const q = query.trim();
              const { data, error: err } = await window.supabase
                .from("contacts")
                .select(
                  "ghl_contact_id, full_name, first_name, last_name, phone",
                )
                .eq("ghl_location_id", selectedLocationId)
                .ilike("full_name", `%${q}%`)
                .order("last_activity", { ascending: false, nullsFirst: false })
                .limit(15);
              if (cancelled) return;
              if (err) throw err;
              setResults(data || []);
            } catch (e) {
              console.error("contact search failed:", e);
              if (!cancelled) setResults([]);
            } finally {
              if (!cancelled) setSearching(false);
            }
          }, 300);
          return () => {
            cancelled = true;
            clearTimeout(t);
          };
        }, [query, selectedLocationId, contact]);

        const canSubmit =
          !!contact &&
          !!dateTime.date &&
          !!dateTime.time &&
          !!assignedUserId &&
          !submitting;

        const submit = async () => {
          setSubmitting(true);
          setError(null);
          try {
            const offset = getTzOffsetString(
              dateTime.date,
              dateTime.time,
              locTz,
            );
            const startIso = `${dateTime.date}T${dateTime.time}:00${offset}`;
            const startMs = new Date(startIso).getTime();
            const endMs = startMs + duration * 60000;
            const endIso = new Date(endMs).toISOString();

            const { data: session } = await window.supabase.auth.getSession();
            const jwt = session?.session?.access_token;
            if (!jwt) throw new Error("Not signed in");

            const res = await fetch(
              "https://rgpfzactcqbvadthzsgx.supabase.co/functions/v1/ghl-book-appointment",
              {
                method: "POST",
                headers: {
                  Authorization: `Bearer ${jwt}`,
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  ghl_location_id: selectedLocationId,
                  ghl_contact_id: contact.ghl_contact_id,
                  start_time: startIso,
                  end_time: endIso,
                  assigned_user_id: assignedUserId,
                }),
              },
            );
            const body = await res.json().catch(() => ({}));
            if (!res.ok || !body.ok) {
              throw new Error(body?.error || `HTTP ${res.status}`);
            }
            if (onBooked) {
              onBooked({
                event: body.event,
                contactName: contact.full_name,
                date: dateTime.date,
                time: dateTime.time,
              });
            }
            onClose();
          } catch (e) {
            setError(e && e.message ? e.message : "Failed to book");
            setSubmitting(false);
          }
        };

        const fieldLabel = {
          fontSize: 10,
          fontWeight: 500,
          letterSpacing: "0.12em",
          textTransform: "uppercase",
          color: T.textMuted,
        };
        const fieldInput = {
          padding: "12px 14px",
          borderRadius: 10,
          border: `0.5px solid ${T.border}`,
          background: T.surface,
          color: T.text,
          fontSize: 14,
          outline: "none",
          fontFamily: "inherit",
          width: "100%",
          boxSizing: "border-box",
        };

        const locationName = location?.name || "";
        const todayStr = (() => {
          const d = new Date();
          const pad = (n) => String(n).padStart(2, "0");
          return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
        })();

        return (
          <div style={{ ...MODAL_BACKDROP, zIndex: 310 }}>
            <div className="fade-in" style={MODAL_CARD}>
              <div
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                }}
              >
                <div style={MODAL_TITLE}>Book Appointment</div>
                <button
                  onClick={onClose}
                  disabled={submitting}
                  style={MODAL_CLOSE(submitting)}
                >
                  ×
                </button>
              </div>
              <div style={{ fontSize: 11, color: T.textMuted, marginTop: -6 }}>
                {locationName}
              </div>

              <div>
                <label style={fieldLabel}>Contact</label>
                {contact ? (
                  <div
                    style={{
                      marginTop: 6,
                      padding: "10px 14px",
                      borderRadius: 10,
                      background: T.airaBlueDim,
                      display: "flex",
                      justifyContent: "space-between",
                      alignItems: "center",
                      gap: 10,
                    }}
                  >
                    <div style={{ minWidth: 0 }}>
                      <div
                        style={{
                          fontSize: 14,
                          fontWeight: 500,
                          color: T.textHi,
                          overflow: "hidden",
                          textOverflow: "ellipsis",
                          whiteSpace: "nowrap",
                        }}
                      >
                        {contact.full_name || "—"}
                      </div>
                      {contact.phone && (
                        <div style={{ fontSize: 11, color: T.textMuted }}>
                          {contact.phone}
                        </div>
                      )}
                    </div>
                    <button
                      onClick={() => {
                        setContact(null);
                        setQuery("");
                        setResults([]);
                      }}
                      disabled={submitting}
                      className="btn-ghost"
                      style={{
                        padding: "4px 8px",
                        fontSize: 12,
                      }}
                    >
                      change
                    </button>
                  </div>
                ) : (
                  <>
                    <input
                      value={query}
                      onChange={(e) => setQuery(e.target.value)}
                      placeholder="Search by name…"
                      autoFocus
                      style={{ ...fieldInput, marginTop: 6 }}
                    />
                    {searching && (
                      <div
                        style={{
                          fontSize: 11,
                          color: T.textMuted,
                          marginTop: 6,
                        }}
                      >
                        Searching…
                      </div>
                    )}
                    {!searching &&
                      query.trim().length >= 2 &&
                      results.length === 0 && (
                        <div
                          style={{
                            fontSize: 11,
                            color: T.textDim,
                            marginTop: 6,
                          }}
                        >
                          No contacts match "{query}".
                        </div>
                      )}
                    {results.length > 0 && (
                      <div
                        style={{
                          marginTop: 6,
                          maxHeight: 200,
                          overflowY: "auto",
                          border: `0.5px solid ${T.border}`,
                          borderRadius: 10,
                          background: T.surface,
                        }}
                      >
                        {results.map((r, i) => (
                          <button
                            key={r.ghl_contact_id}
                            onClick={() => {
                              setContact(r);
                              setResults([]);
                            }}
                            style={{
                              width: "100%",
                              textAlign: "left",
                              padding: "10px 12px",
                              background: "transparent",
                              border: "none",
                              borderBottom:
                                i < results.length - 1
                                  ? `0.5px solid ${T.border}`
                                  : "none",
                              color: T.text,
                              cursor: "pointer",
                              fontFamily: "inherit",
                            }}
                            onMouseEnter={(e) =>
                              (e.currentTarget.style.background =
                                T.surfaceHover)
                            }
                            onMouseLeave={(e) =>
                              (e.currentTarget.style.background = "transparent")
                            }
                          >
                            <div
                              style={{
                                fontSize: 13,
                                fontWeight: 500,
                                color: T.textHi,
                              }}
                            >
                              {r.full_name || "—"}
                            </div>
                            {r.phone && (
                              <div
                                style={{
                                  fontSize: 11,
                                  color: T.textMuted,
                                  marginTop: 2,
                                }}
                              >
                                {r.phone}
                              </div>
                            )}
                          </button>
                        ))}
                      </div>
                    )}
                  </>
                )}
              </div>

              <div style={{ display: "flex", gap: 10 }}>
                <div style={{ flex: 1 }}>
                  <label style={fieldLabel}>Date</label>
                  <input
                    type="date"
                    value={dateTime.date}
                    min={todayStr}
                    onChange={(e) =>
                      setDateTime({ ...dateTime, date: e.target.value })
                    }
                    style={{ ...fieldInput, marginTop: 6 }}
                  />
                </div>
                <div style={{ flex: 1 }}>
                  <label style={fieldLabel}>Time</label>
                  <input
                    type="time"
                    value={dateTime.time}
                    onChange={(e) =>
                      setDateTime({ ...dateTime, time: e.target.value })
                    }
                    style={{ ...fieldInput, marginTop: 6 }}
                  />
                </div>
              </div>

              <div>
                <label style={fieldLabel}>Duration</label>
                <select
                  value={duration}
                  onChange={(e) => setDuration(parseInt(e.target.value, 10))}
                  style={{ ...fieldInput, marginTop: 6 }}
                >
                  <option value={15}>15 minutes</option>
                  <option value={30}>30 minutes</option>
                  <option value={45}>45 minutes</option>
                  <option value={60}>60 minutes</option>
                </select>
              </div>

              {!isSalesRep && (
                <div>
                  <label style={fieldLabel}>Assign to</label>
                  <select
                    value={assignedUserId || ""}
                    onChange={(e) => setAssignedUserId(e.target.value)}
                    style={{ ...fieldInput, marginTop: 6 }}
                  >
                    <option value="" disabled>
                      Select rep…
                    </option>
                    {team
                      .filter((t) => t.ghl_user_id)
                      .map((t) => (
                        <option key={t.user_id} value={t.ghl_user_id}>
                          {t.full_name}
                          {t.user_id === profile.id ? " (you)" : ""}
                        </option>
                      ))}
                  </select>
                </div>
              )}

              {error && (
                <ModalErrorBanner message={`Couldn't book — ${error}`} />
              )}

              <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
                <button
                  onClick={onClose}
                  disabled={submitting}
                  className="btn-secondary"
                  style={{ flex: 1, padding: "12px" }}
                >
                  Cancel
                </button>
                <button
                  onClick={submit}
                  disabled={!canSubmit}
                  className="btn-primary"
                  style={{ flex: 2, padding: "12px" }}
                >
                  {submitting ? "Booking…" : "Book Appointment"}
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ── Rep Personal Dashboard + Team Section ──
      const AIRA_STANDARDS = {
        minShows: 15,
        minSales: 15,
        minShowRate: 60,
        minCloseRate: 70,
      };

      function firstNameOf(fullName) {
        return (fullName || "").split(/\s+/)[0] || fullName || "";
      }

      function RepPersonalDashboard({
        userId,
        userName,
        isSelf,
        selectedLocationId,
        callLogVersion,
        onClose,
        onGoToLeads,
      }) {
        const [kpis, setKpis] = useState(null);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);

        const load = useCallback(async () => {
          if (!userId || !selectedLocationId) return;
          setLoading(true);
          setError(null);
          try {
            const { data, error: err } = await window.supabase.rpc(
              "rep_personal_kpis",
              {
                p_user_id: userId,
                p_ghl_location_id: selectedLocationId,
              },
            );
            if (err) throw err;
            setKpis(
              (data && data[0]) || {
                calls_today: 0,
                calls_today_connected: 0,
                calls_this_month: 0,
                calls_this_month_connected: 0,
                appointments: 0,
                showed: 0,
                no_showed: 0,
                cancelled: 0,
                sales: 0,
                revenue: 0,
                show_rate: 0,
                close_rate: 0,
              },
            );
          } catch (e) {
            console.error("rep_personal_kpis failed:", e);
            setError(e && e.message ? e.message : "Failed to load rep data");
          } finally {
            setLoading(false);
          }
          // eslint-disable-next-line
        }, [userId, selectedLocationId, callLogVersion]);

        useEffect(() => {
          load();
        }, [load]);

        const k = kpis || {};
        const callsToday = Number(k.calls_today) || 0;
        const callsTodayConnected = Number(k.calls_today_connected) || 0;
        const callsMonth = Number(k.calls_this_month) || 0;
        const appts = Number(k.appointments) || 0;
        const showed = Number(k.showed) || 0;
        const noShowed = Number(k.no_showed) || 0;
        const sales = Number(k.sales) || 0;
        const revenue = Number(k.revenue) || 0;
        const showRate = Number(k.show_rate) || 0;
        const closeRate = Number(k.close_rate) || 0;
        const monthLabel = new Date()
          .toLocaleDateString("en-US", { month: "long", year: "numeric" })
          .toUpperCase();
        const showRateStatus =
          showRate >= AIRA_STANDARDS.minShowRate
            ? "good"
            : showRate < 40
              ? "bad"
              : "warn";
        const closeRateStatus =
          closeRate >= AIRA_STANDARDS.minCloseRate
            ? "good"
            : closeRate < 40
              ? "bad"
              : "warn";
        const headingName = isSelf
          ? `${firstNameOf(userName)}'s Performance`
          : `${userName || "—"} · Rep Drill`;
        const isEmpty =
          !loading &&
          !error &&
          callsToday === 0 &&
          callsMonth === 0 &&
          appts === 0 &&
          showed === 0 &&
          sales === 0;

        return (
          <div className="fade-in" style={{ padding: "24px 20px 32px" }}>
            {!isSelf && onClose && (
              <button
                className="btn-ghost"
                onClick={onClose}
                style={{ fontSize: 13, marginBottom: 12, paddingLeft: 0 }}
              >
                ← Back to team
              </button>
            )}
            <div style={{ marginBottom: 20 }}>
              <div
                style={{
                  fontSize: 11,
                  fontWeight: 500,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  color: T.textMuted,
                }}
              >
                {monthLabel}
              </div>
              <div
                style={{
                  fontSize: 22,
                  fontWeight: 500,
                  color: T.textHi,
                  fontFamily: "'Outfit',sans-serif",
                  letterSpacing: "-0.01em",
                  marginTop: 4,
                }}
              >
                {headingName}
              </div>
            </div>

            {error && (
              <div
                className="surface-card"
                style={{
                  padding: "14px 16px",
                  marginBottom: 16,
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                  gap: 12,
                  borderLeft: `3px solid ${T.red}`,
                }}
              >
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span
                    style={{
                      width: 6,
                      height: 6,
                      borderRadius: "50%",
                      background: T.red,
                      flexShrink: 0,
                    }}
                  />
                  <div style={{ color: T.text, fontSize: 13, fontWeight: 500 }}>
                    Couldn't load rep data.
                  </div>
                </div>
                <button className="btn-ghost" onClick={load}>
                  Retry
                </button>
              </div>
            )}

            {isEmpty && isSelf ? (
              <div
                className="surface-card"
                style={{
                  padding: 24,
                  marginBottom: 18,
                  textAlign: "center",
                }}
              >
                <div
                  style={{
                    fontSize: 22,
                    fontWeight: 500,
                    color: T.textHi,
                    fontFamily: "'Outfit',sans-serif",
                    letterSpacing: "-0.01em",
                    marginBottom: 12,
                    lineHeight: 1.3,
                  }}
                >
                  You're just getting started, {firstNameOf(userName)}.
                </div>
                <div
                  style={{
                    fontSize: 14,
                    color: T.text,
                    lineHeight: 1.6,
                    marginBottom: 20,
                  }}
                >
                  Your performance starts tracking the moment you make your
                  first call or book your first appointment. Everything you do
                  in the portal rolls into these numbers. Tap Leads to begin.
                </div>
                <button
                  className="btn-primary pulse-btn"
                  onClick={onGoToLeads}
                  disabled={!onGoToLeads}
                  style={{ padding: "14px 22px" }}
                >
                  Go to Leads →
                </button>
              </div>
            ) : (
              <>
                <div
                  style={{
                    display: "grid",
                    gridTemplateColumns: "repeat(4, minmax(0, 1fr))",
                    gap: 10,
                    marginBottom: 10,
                  }}
                >
                  <KPI
                    label="Calls Today"
                    value={loading ? <SkelBar w={36} h={24} /> : callsToday}
                    sub={
                      loading
                        ? null
                        : callsToday > 0
                          ? `${callsTodayConnected} connected`
                          : "none yet"
                    }
                  />
                  <KPI
                    label="Appts"
                    value={loading ? <SkelBar w={36} h={24} /> : appts}
                  />
                  <KPI
                    label="Showed"
                    value={loading ? <SkelBar w={36} h={24} /> : showed}
                  />
                  <KPI
                    label="Sales"
                    value={loading ? <SkelBar w={36} h={24} /> : sales}
                  />
                </div>

                <div
                  style={{
                    display: "grid",
                    gridTemplateColumns: "repeat(4, minmax(0, 1fr))",
                    gap: 10,
                    marginBottom: 18,
                  }}
                >
                  <KPI
                    label="Show Rate"
                    value={
                      loading ? (
                        <SkelBar w={46} h={24} />
                      ) : (
                        `${Math.round(showRate)}%`
                      )
                    }
                    status={showRateStatus}
                    sub={
                      loading ? null : `target ${AIRA_STANDARDS.minShowRate}%+`
                    }
                  />
                  <KPI
                    label="Close Rate"
                    value={
                      loading ? (

      async function callEdgeFunction(path, body) {
        const { data: session } = await window.supabase.auth.getSession();
        const jwt = session?.session?.access_token;
        if (!jwt) throw new Error("Not signed in");
        const res = await fetch(
          `https://rgpfzactcqbvadthzsgx.supabase.co/functions/v1/${path}`,
          {
            method: "POST",
            headers: {
              Authorization: `Bearer ${jwt}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify(body || {}),
          },
        );
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          const err = new Error(data.error || `HTTP ${res.status}`);
          err.status = res.status;
          err.code = data.code || null;
          err.body = data || null;
          throw err;
        }
        return data;
      }

                ghl_location_id: ghlLocationId.trim(),
                updates,
              });

                ghl_location_id: ghlLocationId.trim(),

                ghl_api_key: ghlApiKey.trim() || undefined,

      function StagesEditorModal({ location, onClose }) {
        const [stages, setStages] = useState([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [saving, setSaving] = useState({});

        const load = useCallback(async () => {
          setLoading(true);
          setError(null);
          try {
            const { data, error: err } = await window.supabase
              .from("pipeline_stages")
              .select(
                "id, ghl_stage_id, name, position, counts_as_show, counts_as_no_show, counts_as_sale, counts_as_trial",
              )
              .eq("ghl_location_id", location.ghl_location_id)
              .order("position", { ascending: true, nullsFirst: false });
            if (err) throw err;
            setStages(data || []);
          } catch (e) {
            setError(e && e.message ? e.message : "Failed to load stages");
          } finally {
            setLoading(false);
          }
        }, [location.ghl_location_id]);

        useEffect(() => {
          load();
        }, [load]);

        const updateFlag = async (stage, field, value) => {
          setSaving((s) => ({ ...s, [stage.id]: true }));
          try {
            const { error: err } = await window.supabase
              .from("pipeline_stages")
              .update({ [field]: value, updated_at: new Date().toISOString() })
              .eq("id", stage.id);
            if (err) throw err;
            setStages((prev) =>
              prev.map((s) =>
                s.id === stage.id ? { ...s, [field]: value } : s,
              ),
            );
          } catch (e) {
            alert(`Save failed: ${e.message || e}`);
          } finally {
            setSaving((s) => ({ ...s, [stage.id]: false }));
          }
        };

        return (
          <div style={MODAL_BACKDROP}>
            <div className="fade-in" style={{ ...MODAL_CARD, maxWidth: 480 }}>
              <div
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                }}
              >
                <div>
                  <div style={MODAL_TITLE}>Pipeline Stages</div>

                      fontSize: 11,
                      color: T.textMuted,
                      marginTop: 3,

                    <SkelBar key={`skel-${i}`} w={"100%"} h={40} />
                  ))}
                </div>
              )}

              {!loading && stages.length === 0 && !error && (
                <div
                  className="surface-card"
                  style={{
                    padding: 18,
                    textAlign: "center",
                    color: T.textMuted,
                    fontSize: 13,
                  }}
                >
                  No pipeline stages cached yet. Sync this location to

                </div>
              )}

              {!loading &&
                stages.map((s) => (
                  <div
                    key={s.id}
                    className="surface-card"
                    style={{
                      padding: "12px 14px",
                      display: "flex",

                    <div
                      style={{
                        display: "flex",
                        justifyContent: "space-between",

                    >
                      <div

                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                      <FlagToggle
                        label="Show"

                        onChange={(v) => updateFlag(s, "counts_as_show", v)}
                      />
                      <FlagToggle

                      />
                      <FlagToggle

                      />

                    </div>
                  </div>

              <button

      function AdminPeopleTab({ profile, onChanged, onToast }) {
        const [users, setUsers] = useState([]);
        const [locations, setLocations] = useState([]);
        const [staff, setStaff] = useState([]);
        const [userLocs, setUserLocs] = useState([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [addOpen, setAddOpen] = useState(false);
        const [editUser, setEditUser] = useState(null);
        const [removingUser, setRemovingUser] = useState(null);
        const [removing, setRemoving] = useState(false);

        const load = useCallback(async () => {
          setLoading(true);
          setError(null);
          try {
            const [uRes, lRes, sRes, ulRes] = await Promise.all([
              window.supabase.from("users").select("*").order("full_name"),
              window.supabase
                .from("locations")
                .select("id, ghl_location_id, name, active")
                .order("name"),
              window.supabase.from("ghl_staff").select("*").order("full_name"),
              window.supabase
                .from("user_locations")
                .select("user_id, location_id, is_primary"),
            ]);
            if (uRes.error) throw uRes.error;
            if (lRes.error) throw lRes.error;
            if (sRes.error) throw sRes.error;
            if (ulRes.error) throw ulRes.error;
            setUsers(uRes.data || []);
            setLocations(lRes.data || []);
            setStaff(sRes.data || []);
            setUserLocs(ulRes.data || []);
          } catch (e) {
            setError(e && e.message ? e.message : "Failed to load people");
          } finally {
            setLoading(false);
          }
        }, []);

        useEffect(() => {
          load();
        }, [load]);

        const locById = {};
        locations.forEach((l) => {
          locById[l.id] = l;
        });
        const userLocMap = {};
        userLocs.forEach((ul) => {
          if (!userLocMap[ul.user_id]) userLocMap[ul.user_id] = [];
          const loc = locById[ul.location_id];
          if (loc) {
            userLocMap[ul.user_id].push({
              ghl_location_id: loc.ghl_location_id,
              name: loc.name,
              is_primary: ul.is_primary,
            });
          }
        });

        const staffByUserId = {};
        staff.forEach((s) => {
          if (!staffByUserId[s.ghl_user_id]) {
            staffByUserId[s.ghl_user_id] = s;
          }
        });

        return (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div
              style={{
                display: "flex",
                justifyContent: "space-between",
                alignItems: "center",
              }}
            >
              <div
                style={{
                  fontSize: 16,
                  fontWeight: 500,
                  color: T.textHi,
                  fontFamily: "'Outfit',sans-serif",
                  letterSpacing: "-0.005em",
                }}
              >
                People
              </div>
              <button
                className="btn-primary"
                onClick={() => setAddOpen(true)}
                style={{ padding: "8px 14px", fontSize: 13 }}
              >
                + Add Person
              </button>
            </div>

            {error && <ModalErrorBanner message={error} />}

            {loading && (
              <div
                style={{ display: "flex", flexDirection: "column", gap: 10 }}
              >
                {[0, 1, 2].map((i) => (
                  <div
                    key={`skel-${i}`}
                    className="surface-card"
                    style={{
                      padding: 14,
                      display: "flex",
                      flexDirection: "column",
                      gap: 8,
                    }}
                  >
                    <SkelBar w={160} h={14} />
                    <SkelBar w={220} h={10} />
                    <SkelBar w={140} h={10} />
                  </div>
                ))}
              </div>
            )}

            {!loading && users.length === 0 && !error && (
              <div
                className="surface-card"
                style={{
                  padding: 24,
                  textAlign: "center",
                  color: T.textMuted,
                  fontSize: 13,
                }}
              >
                No people yet. Tap <strong>+ Add Person</strong> to invite the
                first one.
              </div>
            )}

            {!loading &&
              users.map((u) => (
                <PersonCard
                  key={u.id}
                  user={u}
                  locations={userLocMap[u.id] || []}
                  linkedStaff={
                    u.ghl_user_id ? staffByUserId[u.ghl_user_id] : null
                  }
                  isSelf={u.id === profile.id}
                  onEdit={() => setEditUser(u)}
                  onRemove={() => setRemovingUser(u)}
                />
              ))}

            {addOpen && (
              <AddEditPersonModal
                mode="create"
                locations={locations}
                staff={staff}
                onToast={onToast}
                onClose={() => setAddOpen(false)}
                onSaved={async () => {
                  setAddOpen(false);
                  await load();
                  if (onChanged) onChanged();
                }}
              />
            )}
            {editUser && (
              <AddEditPersonModal
                mode="edit"
                user={editUser}
                initialLocations={userLocMap[editUser.id] || []}
                locations={locations}
                staff={staff}
                onToast={onToast}
                onClose={() => setEditUser(null)}
                onSaved={async () => {
                  setEditUser(null);
                  await load();
                  if (onChanged) onChanged();
                }}
              />
            )}
            {removingUser && (
              <ConfirmRemovePersonModal
                user={removingUser}
                removing={removing}
                onCancel={() => {
                  if (!removing) setRemovingUser(null);
                }}
                onConfirm={async () => {
                  setRemoving(true);
                  try {
                    const resp = await callEdgeFunction("admin-delete-user", {
                      portal_user_id: removingUser.id,
                    });
                    const email = resp?.deleted_email || removingUser.email;
                    setRemoving(false);
                    setRemovingUser(null);
                    await load();
                    if (onChanged) onChanged();
                    if (onToast) {
                      onToast({
                        kind: "success",
                        text: `Removed ${email}`,
                      });
                    }
                  } catch (e) {
                    setRemoving(false);
                    setRemovingUser(null);
                    if (onToast) {
                      onToast({
                        kind: "error",
                        text: e && e.message ? e.message : "Remove failed",
                      });
                    }
                  }
                }}
              />
            )}
          </div>
        );
      }

                  fontSize: 13,
