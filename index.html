                      {firstName}
                    </span>
                  </div>
                  <div style={{ fontSize: 10, color: T.muted }}>{today}</div>
                </button>
              </div>
              {multi &&
                viewMode === "location" &&
                (() => {
                  const target =
                    previousViewMode === "triage" && hasAnyRed
                      ? "triage"
                      : "territory";
                  const label =
                    target === "triage"
                      ? "← Back to triage"
                      : "← Back to territory";
                  return (
                    <button
                      onClick={() => {
                        setViewMode(target);
                        setPickerOpen(false);
                        setSelectedLead(null);
                        setScreen("dashboard");
                      }}
                      style={{
                        marginTop: 10,
                        padding: "6px 12px",
                        borderRadius: 8,
                        border: `1px solid ${T.accent}33`,
                        background: T.accentDim,
                        color: T.accent,
                        fontSize: 11,
                        fontWeight: 700,
                        letterSpacing: "0.04em",
                        cursor: "pointer",
                        alignSelf: "flex-start",
                      }}
                    >
                      {label}
                    </button>
                  );
                })()}
              {pickerOpen && multi && viewMode === "location" && (
                <div
                  style={{
                    marginTop: 10,
                    background: T.card,
                    border: `1px solid ${T.border}`,
                    borderRadius: 10,
                    padding: 6,
                    display: "flex",
                    flexDirection: "column",
                    gap: 2,
                  }}
                >
                  {accessibleLocations.map((loc) => (
                    <button
                      key={loc.id}
                      onClick={() => {
                        setSelectedLocationId(loc.ghl_location_id);
                        setPickerOpen(false);
                      }}
                      style={{
                        textAlign: "left",
                        padding: "10px 12px",
                        borderRadius: 8,
                        border: "none",
                        background:
                          loc.ghl_location_id === selectedLocationId
                            ? T.accentDim
                            : "transparent",
                        color:
                          loc.ghl_location_id === selectedLocationId
                            ? T.accent
                            : T.text,
                        fontSize: 13,
                        fontWeight: 600,
                        cursor: "pointer",
                      }}
                    >
                      {loc.name}
                    </button>
                  ))}
                </div>
              )}
            </div>

            <div style={{ paddingBottom: 72 }}>
              {multi &&
                hasAnyRed &&
                (viewMode === "triage" || viewMode === "territory") &&
                screen === "dashboard" &&
                !selectedLead && (
                  <div
                    style={{
                      display: "flex",
                      gap: 6,
                      padding: "14px 16px 0",
                    }}
                  >
                    {[
                      { key: "triage", label: "Triage" },
                      { key: "territory", label: "Overview" },
                    ].map((t) => {
                      const active = viewMode === t.key;
                      return (
                        <button
                          key={t.key}
                          onClick={() => setViewMode(t.key)}
                          style={{
                            padding: "6px 14px",
                            borderRadius: 999,
                            border: `1px solid ${active ? T.accent : T.border}`,
                            background: active ? T.accentDim : "transparent",
                            color: active ? T.accent : T.dim,
                            fontSize: 12,
                            fontWeight: 700,
                            letterSpacing: "0.04em",
                            cursor: "pointer",
                          }}
                        >
                          {t.label}
                        </button>
                      );
                    })}
                  </div>
                )}
              {renderScreen()}
            </div>

            {/* Bottom Nav */}
            <div
              style={{
                position: "fixed",
                bottom: 0,
                left: "50%",
                transform: "translateX(-50%)",
                width: "100%",
                maxWidth: 480,
                display: "flex",
                justifyContent: "space-around",
                padding: "8px 0 env(safe-area-inset-bottom, 12px)",
                background: `${T.surface}f0`,
                backdropFilter: "blur(20px)",
                WebkitBackdropFilter: "blur(20px)",
                borderTop: `1px solid ${T.border}`,
                zIndex: 100,
              }}
            >
              <NavItem
                icon="📊"
                label="Dashboard"
                active={screen === "dashboard" && !selectedLead}
                onClick={() => {
                  setScreen("dashboard");
                  setSelectedLead(null);
                }}
              />
              <NavItem
                icon="👥"
                label="Leads"
                active={screen === "leads" || !!selectedLead}
                onClick={() => {
                  setScreen("leads");
                  setSelectedLead(null);
                }}
                count={data.leads.filter((l) => l.status === "New Lead").length}
              />
              <NavItem
                icon="💬"
                label="Messages"
                active={screen === "conversations"}
                onClick={() => {
                  setScreen("conversations");
                  setSelectedLead(null);
                }}
                count={unreadCount}
              />
              <NavItem
                icon="📅"
                label="Appts"
                active={screen === "appointments"}
                onClick={() => {
                  setScreen("appointments");
                  setSelectedLead(null);
                }}
                count={
                  data.appointments.filter((a) => a.date === "Today").length
                }
              />
            </div>

            {settingsOpen && (
              <SettingsDrawer
                profile={profile}
                onClose={() => setSettingsOpen(false)}
                onLogout={onLogout}
                onOpenAdmin={() => {
                  setSettingsOpen(false);
                  setAdminOpen(true);
                }}
                onOpenCoaching={() => {
                  setSettingsOpen(false);
                  setCoachingOpen(true);
                }}
              />
            )}

            {adminOpen && profile.role === "admin" && (
              <AdminOnboardingOverlay
                profile={profile}
                onClose={() => setAdminOpen(false)}
                onRefresh={bumpCallLogVersion}
              />
            )}

            {coachingOpen &&
              (profile.role === "vp" || profile.role === "admin") && (
                <MyCoachingOverlay
                  profile={profile}
                  accessibleLocations={accessibleLocations}
                  onClose={() => setCoachingOpen(false)}
                  onOpenLocation={(ghlId) => {
                    setSelectedLocationId(ghlId);
                    setViewMode("location");
                    setScreen("dashboard");
                  }}
                />
              )}

            <CallOutcomeModal profile={profile} onLogged={bumpCallLogVersion} />

            {bookingOpen && (
              <BookAppointmentModal
                profile={profile}
                selectedLocationId={selectedLocationId}
                accessibleLocations={accessibleLocations}
                initialContact={bookingContact}
                initialContactQuery={bookingInitialQuery}
                onClose={() => {
                  setBookingOpen(false);
                  setBookingContact(null);
                  setBookingInitialQuery("");

            {toast && (
              <div

                  position: "fixed",

                  left: "50%",

                  left: "50%",
                  transform: "translateX(-50%)",

                <RepPersonalDashboard
                  userId={drilledRep.user_id}
                  userName={drilledRep.full_name}
                  isSelf={false}

                  callLogVersion={callLogVersion}
                  onClose={() => setDrilledRep(null)}
                />
              </div>
            )}
          </div>
        );
      }

      // ── Root App with auth gate ──
      function App() {
        const [state, setState] = useState({ status: "loading" });

        const loadProfile = useCallback(async (session) => {
          try {
            const [
              { data: userRow, error: uerr },
              { data: ghlIds, error: rerr },
            ] = await Promise.all([
              window.supabase
                .from("users")
                .select("*")
                .eq("auth_user_id", session.user.id)
                .maybeSingle(),
              window.supabase.rpc("current_user_ghl_location_ids"),
            ]);
            if (uerr) console.error("users fetch error:", uerr);
            if (!userRow || !userRow.active) {
              setState({ status: "pending", email: session.user.email });
              return;
            }
            if (rerr) console.error("ghl ids rpc error:", rerr);
            const ids = ghlIds || [];
            if (ids.length === 0) {
              setState({ status: "no-locations", profile: userRow });
              return;
            }
            const { data: locs, error: lerr } = await window.supabase
              .from("locations")
              .select("id, ghl_location_id, name, timezone")
              .in("ghl_location_id", ids)
              .eq("active", true)
              .order("name");
            if (lerr) console.error("locations fetch error:", lerr);
            const locations = locs || [];
            if (locations.length === 0) {
              setState({ status: "no-locations", profile: userRow });
              return;
            }
            const stored = localStorage.getItem("aira_selected_location_id");
            const validStored =
              stored && locations.some((l) => l.ghl_location_id === stored);
            const selectedId = validStored
              ? stored
              : locations[0].ghl_location_id;
            localStorage.setItem("aira_selected_location_id", selectedId);
            setState({
              status: "ready",
              profile: userRow,
              locations,
              selectedLocationId: selectedId,
            });
          } catch (e) {
            console.error("loadProfile failed:", e);
            setState({ status: "login" });
          }
        }, []);

        useEffect(() => {
          let mounted = true;
          let unsub = () => {};
          const start = async () => {
            let tries = 0;
            while (!window.supabase && tries < 150) {
              await new Promise((r) => setTimeout(r, 30));
              tries++;
            }
            if (!mounted) return;
            if (!window.supabase) {
              setState({ status: "login" });
              return;
            }
            const {
              data: { session },
            } = await window.supabase.auth.getSession();
            if (!mounted) return;
            if (!session) setState({ status: "login" });
            else await loadProfile(session);
            const sub = window.supabase.auth.onAuthStateChange(
              (event, sess) => {
                if (!mounted) return;
                if (event === "SIGNED_OUT") {
                  localStorage.removeItem("aira_selected_location_id");
                  setState({ status: "login" });
                  return;
                }
                if (event === "SIGNED_IN" && sess) {
                  setState({ status: "loading" });
                  loadProfile(sess);
                }
              },
            );
            unsub = () => sub.data.subscription.unsubscribe();
          };
          start();
          return () => {
            mounted = false;
            unsub();
          };
        }, [loadProfile]);

        const handleLogout = async () => {
          localStorage.removeItem("aira_selected_location_id");
          try {
            await window.supabase.auth.signOut();
          } catch (e) {
            console.error(e);
          }
          setState({ status: "login" });
        };

        const setSelectedLocationId = (id) => {
          localStorage.setItem("aira_selected_location_id", id);
          setState((s) => ({ ...s, selectedLocationId: id }));
        };

        switch (state.status) {
          case "loading":
            return <Splash />;
          case "login":
            return <LoginScreen />;
          case "pending":
            return (
              <GateScreen
                title="Access Pending"
                body={`Your account (${state.email}) isn't set up yet. Contact your administrator to get access.`}
                onLogout={handleLogout}
              />
            );
          case "no-locations":
            return (
              <GateScreen
                title="No Locations Assigned"
                body="Your account isn't linked to any active locations yet. Contact your administrator."
                onLogout={handleLogout}
              />
            );
          case "ready":
            return (
              <AuthenticatedApp
                profile={state.profile}
                accessibleLocations={state.locations}
                selectedLocationId={state.selectedLocationId}
                setSelectedLocationId={setSelectedLocationId}
                onLogout={handleLogout}
              />
            );
          default:
            return <Splash />;
        }
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
