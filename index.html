                  </div>
                </div>
                <span
                  style={{
                    display: "inline-flex",
                    alignItems: "center",
                    gap: 6,
                    fontSize: 10,
                    fontWeight: 500,
                    letterSpacing: "0.12em",
                    textTransform: "uppercase",
                    color: T.textMuted,
                    flexShrink: 0,
                  }}
                >
                  <span
                    style={{
                      width: 6,
                      height: 6,
                      borderRadius: "50%",
                      background: T.airaBlue,
                      flexShrink: 0,
                    }}
                  />
                  {(currentStageName || lead.opp_status || "Stage")
                    .toString()
                    .toUpperCase()}
                </span>
              </div>
              <div
                style={{
                  marginTop: 20,
                  display: "flex",
                  flexDirection: "column",
                  gap: 10,
                }}
              >
                {lead.phone && (
                  <div
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: 10,
                      fontSize: 14,
                    }}
                  >
                    <span>📱</span>
                    <a
                      href={`tel:${lead.phone}`}
                      onClick={markCall}
                      style={{ color: T.airaBlueDark, fontWeight: 500 }}

                      {lead.phone}
                    </a>
                  </div>
                )}
                {lead.email && (
                  <div
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: 10,
                      fontSize: 14,

                    <span>✉️</span>
                    <span style={{ color: T.text }}>{lead.email}</span>

                    >
                      <span>👤</span>
                      <span>

                        {currentAssignedTo ? (
                          <strong style={{ fontWeight: 500, color: T.textHi }}>

                          </span>

                      </span>
                    </button>

              </div>
              <div

                  marginTop: 24,

                {lead.phone && (

                  label="Text"

                <ActionBtn

                {lead.contact_id && (
                  <button
                    type="button"
                    onClick={toggleAiOff}
                    disabled={aiOffSaving}
                    className={aiOff ? "btn-primary" : "btn-secondary"}
                    style={{
                      display: "inline-flex",
                      alignItems: "center",
                      gap: 6,
                      padding: "10px 16px",
                      fontSize: 13,
                      cursor: aiOffSaving ? "wait" : "pointer",
                      ...(aiOff
                        ? {
                            background: T.green,
                            borderColor: T.green,
                            color: "#ffffff",
                          }
                        : {}),
                    }}
                  >
                    <span style={{ fontSize: 16 }}>{aiOff ? "✓" : "🤖"}</span>
                    AI Off
                  </button>
                )}
              </div>
            </div>

            {(() => {
              // "Sold for $X/mo" summary card. Only renders when the
              // current stage counts_as_sale AND we've captured at least
              // monetary_value (missing = a historical sale we couldn't
              // backfill — the changeStage modal now guarantees capture
              // going forward).
              if (loading) return null;
              const activeStage = stages.find(
                (s) => s.ghl_stage_id === currentStageId,
              );
              if (!activeStage || !activeStage.counts_as_sale) return null;
              const soldByGhlId = currentAssignedTo;
              const soldByName = soldByGhlId
                ? staff.find((s) => s.ghl_user_id === soldByGhlId)?.full_name ||
                  null
                : null;
              const canEdit = (() => {
                if (!profile) return false;
                const managerRoles = new Set([
                  "admin",
                  "regional_director",
                  "vp",
                  "manager",
                  "franchisee",
                ]);
                if (managerRoles.has(profile.role)) return true;
                // Sales rep can only edit their OWN sale
                if (profile.role === "sales_rep") {
                  const myMatch = staff.find(
                    (s) =>
                      (s.email || "").toLowerCase() ===
                      (profile.email || "").toLowerCase(),
                  );
                  return (
                    !!myMatch &&
                    !!soldByGhlId &&
                    myMatch.ghl_user_id === soldByGhlId
                  );
                }
                return false;
              })();
              const hasGross = currentSale.gross_sale != null;
              const hasMrr = currentSale.mrr != null;
              const hasValue = hasGross || hasMrr;
              const soldAt = currentSale.sold_at
                ? new Date(currentSale.sold_at).toLocaleDateString("en-US", {
                    month: "short",
                    day: "numeric",
                    year: "numeric",
                  })
                : null;
              return (
                <div
                  className="surface-card"
                  style={{
                    padding: 20,
                    marginBottom: 16,
                    borderLeft: `4px solid ${T.green}`,
                  }}
                >
                  <div
                    style={{
                      display: "flex",
                      justifyContent: "space-between",
                      alignItems: "flex-start",
                      gap: 10,
                    }}
                  >
                    <div>
                      <div
                        style={{
                          fontSize: 10,
                          fontWeight: 500,
                          letterSpacing: "0.12em",
                          textTransform: "uppercase",
                          color: T.textMuted,
                          marginBottom: 4,
                        }}
                      >
                        Sold
                      </div>
                      {hasValue ? (
                        <div
                          style={{
                            fontSize: 22,
                            fontWeight: 500,
                            color: T.textHi,
                            fontFamily: "'Outfit',sans-serif",
                            letterSpacing: "-0.01em",
                            lineHeight: 1.15,
                          }}
                        >
                          {hasGross
                            ? `$${Number(currentSale.gross_sale).toLocaleString()}`
                            : "—"}{" "}
                          <span
                            style={{
                              fontSize: 13,
                              color: T.textMuted,
                              fontWeight: 400,
                            }}
                          >
                            gross
                          </span>
                          <span
                            style={{
                              fontSize: 15,
                              color: T.textMuted,
                              fontWeight: 400,
                              margin: "0 6px",
                            }}
                          >
                            /
                          </span>
                          {hasMrr
                            ? `$${Number(currentSale.mrr).toLocaleString()}`
                            : "—"}{" "}
                          <span
                            style={{
                              fontSize: 13,
                              color: T.textMuted,
                              fontWeight: 400,
                            }}
                          >
                            MRR
                          </span>
                        </div>
                      ) : (
                        <div
                          style={{
                            fontSize: 14,
                            color: T.textMuted,
                            fontStyle: "italic",
                          }}
                        >
                          Sale amount not captured
                        </div>
                      )}
                      {hasValue && (
                        <div
                          style={{
                            fontSize: 12,
                            color: T.textMuted,
                            marginTop: 6,
                          }}
                        >
                          PIF:{" "}
                          <span style={{ color: T.text, fontWeight: 500 }}>
                            {currentSale.is_pif ? "Yes" : "No"}
                          </span>
                        </div>
                      )}
                      <div
                        style={{
                          fontSize: 12,
                          color: T.textMuted,
                          marginTop: 6,
                        }}
                      >
                        {soldByName
                          ? `Sold by ${soldByName}`
                          : "Rep unassigned"}
                        {soldAt ? ` on ${soldAt}` : ""}
                      </div>
                    </div>
                    {canEdit && (
                      <button
                        className="btn-ghost"
                        onClick={() =>
                          setSaleModal({
                            mode: "edit",
                            stage: activeStage,
                          })
                        }
                        disabled={savingStage}
                        style={{ fontSize: 12 }}
                      >
                        {hasValue ? "Edit" : "Add"}
                      </button>
                    )}
                  </div>
                </div>
              );
            })()}

            <div
              className="surface-card"
              style={{ padding: 20, marginBottom: 16 }}
            >
              <div
                style={{
                  fontSize: 11,
                  fontWeight: 500,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  color: T.textMuted,
                  marginBottom: 14,
                }}
              >
                Change Stage
              </div>
              {loading && <SkelBar w="100%" h={36} />}
              {!loading && stages.length === 0 && (
                <div style={{ fontSize: 13, color: T.textMuted }}>
                  No pipeline stages cached for this location yet. Run a sync.
                </div>
              )}
              {!loading && stages.length > 0 && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {stages.map((s) => {
                    const active = s.ghl_stage_id === currentStageId;
                    return (
                      <button
                        key={s.ghl_stage_id}
                        onClick={() => changeStage(s)}
                        disabled={savingStage}
                        style={{
                          padding: "8px 12px",
                          borderRadius: 8,
                          border: `0.5px solid ${active ? T.airaBlue : T.border}`,
                          background: active ? T.airaBlueDim : T.surface,
                          color: active ? T.airaBlueDark : T.text,
                          fontSize: 12,
                          fontWeight: 500,
                          cursor: savingStage ? "wait" : "pointer",
                          opacity: savingStage && !active ? 0.55 : 1,
                          fontFamily: "inherit",
                          transition: "all 160ms ease",
                        }}
                      >
                        {s.name}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>

            {opportunities.length > 1 && (
              <div
                className="surface-card"
                style={{ padding: 20, marginBottom: 16 }}
              >
                <div
                  style={{
                    fontSize: 11,
                    fontWeight: 500,
                    letterSpacing: "0.12em",
                    textTransform: "uppercase",
                    color: T.textMuted,
                    marginBottom: 10,
                  }}
                >
                  All Opportunities ({opportunities.length})
                </div>
                {opportunities.map((o) => {
                  const s = stages.find(
                    (x) => x.ghl_stage_id === o.pipeline_stage_id,
                  );
                  return (
                    <div
                      key={o.ghl_opportunity_id}
                      style={{
                        padding: "8px 0",
                        borderTop:
                          o === opportunities[0]
                            ? "none"
                            : `0.5px solid ${T.border}`,
                        display: "flex",
                        justifyContent: "space-between",
                        alignItems: "baseline",
                        gap: 10,
                      }}
                    >
                      <div style={{ minWidth: 0 }}>
                        <div
                          style={{
                            fontSize: 13,
                            fontWeight: 500,
                            color: T.textHi,
                            overflow: "hidden",
                            textOverflow: "ellipsis",
                            whiteSpace: "nowrap",
                          }}
                        >
                          {o.name || "(no name)"}
                        </div>
                        <div
                          style={{
                            fontSize: 11,
                            color: T.textMuted,
                            marginTop: 2,
                          }}
                        >
                          {s?.name || "—"} · {o.status || "open"}
                        </div>
                      </div>
                      {o.monetary_value != null && (
                        <div
                          style={{
                            fontSize: 13,
                            color: T.textHi,
                            fontFamily: "'Outfit',sans-serif",
                            letterSpacing: "-0.01em",
                          }}
                        >
                          ${Number(o.monetary_value).toLocaleString()}
                        </div>
                      )}
                    </div>
                  );
                })}

            )}

            <div className="surface-card" style={{ padding: 20 }}>
              <div
                style={{

                  fontWeight: 500,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  color: T.textMuted,
                  marginBottom: 10,
                }}
              >
                Call Log
              </div>
              {callLogs.length === 0 && (
                <div style={{ fontSize: 12, color: T.textMuted }}>

              )}
              {callLogs.map((c) => (
                <div

                    padding: "10px 0",

                      c === callLogs[0] ? "none" : `0.5px solid ${T.border}`,

            {logCallOpen && (
              <CallOutcomeModal
                profile={profile}
                direct={{
                  ghl_location_id: lead.location_id,
                  contactId: lead.contact_id,
                  contactName: lead.full_name,
                }}
                onClose={() => setLogCallOpen(false)}
                onLogged={() => {
                  if (onToast) {
                    onToast({ kind: "success", text: "Call logged." });
                  }
                  if (onChanged) onChanged();
                  load();
                }}
              />
            )}
            {saleModal && (
              <SaleModal
                title={
                  saleModal.mode === "edit"
                    ? "Edit sale"
                    : `Log sale: ${saleModal.stage.name}`
                }
                soldByName={profile?.full_name || profile?.email}
                initialGross={currentSale.gross_sale}
                initialMrr={currentSale.mrr}
                initialIsPif={currentSale.is_pif}
                submitting={savingStage}
                onCancel={() => {
                  if (!savingStage) setSaleModal(null);
                }}
                onConfirm={(sale) => {
                  if (saleModal.mode === "edit") {
                    commitSaleEdit(sale);
                  } else {
                    commitStageChange(saleModal.stage, sale);
                  }
                }}
              />
            )}
            {assignOpen && (
              <div style={MODAL_BACKDROP}>
                <div className="fade-in" style={MODAL_CARD}>
                  <div
                    style={{
                      display: "flex",
                      justifyContent: "space-between",
                      alignItems: "center",
                    }}
                  >
                    <div style={MODAL_TITLE}>Assign opportunity</div>
                    <button
                      onClick={() => setAssignOpen(false)}
                      disabled={savingAssign}
                      style={MODAL_CLOSE(savingAssign)}
                    >
                      ×
                    </button>
                  </div>
                  <div
                    style={{
                      fontSize: 12,
                      color: T.textMuted,
                      lineHeight: 1.5,
                    }}
                  >
                    {canReassignAnyone
                      ? "Pick the rep who owns this lead in GHL."
                      : "You can only assign this lead to yourself."}
                  </div>
                  {canReassignAnyone ? (
                    <div
                      style={{
                        maxHeight: "55vh",
                        overflowY: "auto",
                        display: "flex",
                        flexDirection: "column",
                        gap: 6,
                      }}
                    >
                      {staff.length === 0 && (
                        <div
                          style={{
                            fontSize: 13,
                            color: T.textMuted,
                            padding: 12,
                          }}
                        >
                          No GHL staff cached for this location. Run a sync from
                          Admin → Health.
                        </div>
                      )}
                      {staff.map((s) => {
                        const active = s.ghl_user_id === currentAssignedTo;
                        return (
                          <button
                            key={s.ghl_user_id}
                            onClick={() => assignTo(s.ghl_user_id, s.full_name)}
                            disabled={savingAssign}
                            style={{
                              textAlign: "left",
                              padding: "10px 14px",
                              borderRadius: 10,
                              border: `0.5px solid ${
                                active ? T.airaBlue : T.border
                              }`,
                              background: active ? T.airaBlueDim : T.surface,
                              color: active ? T.airaBlueDark : T.text,
                              fontSize: 14,
                              fontWeight: 500,
                              cursor: savingAssign ? "wait" : "pointer",
                              fontFamily: "inherit",
                              transition: "all 160ms ease",
                            }}
                          >
                            {s.full_name || s.email || s.ghl_user_id}
                            {s.email && s.full_name && (
                              <div
                                style={{
                                  fontSize: 11,
                                  color: T.textMuted,
                                  marginTop: 2,
                                }}
                              >
                                {s.email}
                              </div>
                            )}
                          </button>
                        );
                      })}
                    </div>
                  ) : callerOwnGhlId ? (
                    <button
                      onClick={() =>
                        assignTo(
                          callerOwnGhlId,
                          profile?.full_name || "yourself",
                        )
                      }
                      disabled={savingAssign}
                      className="btn-primary"
                      style={{ padding: "12px" }}
                    >
                      {savingAssign ? "Saving…" : "Assign to me"}
                    </button>
                  ) : (
                    <div
                      style={{
                        fontSize: 13,
                        color: T.textMuted,
                        padding: 12,
                      }}
                    >
                      You have no matching GHL staff record at this location
                      yet. Ask your admin to link your account in Admin →
                      People.
                    </div>
                  )}
                  <button
                    onClick={() => setAssignOpen(false)}
                    disabled={savingAssign}
                    className="btn-secondary"
                    style={{ padding: "12px" }}
                  >
                    Cancel
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ── Conversations Screen (real data) ──
      // Reads from public.conversations (populated by sync-ghl-to-cache).
      // Send-message path calls ghl-send-message (deferred) for now; the
      // input optimistically appends to full_thread so the conversation
      // shows the new outbound message immediately.
      function ConversationsScreen({
        selectedLocationId,
        accessibleLocations,
        aggregate,
        profile,
        onToast,
        initialContactId,
        onInitialConsumed,
      }) {
        const [rows, setRows] = useState([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [selected, setSelected] = useState(null);
        const [reply, setReply] = useState("");
        const [sending, setSending] = useState(false);
        // In-memory filter for the list view. Mishawaka has 478
        // conversations cached — scrolling is not viable.
        const [listSearch, setListSearch] = useState("");

        const locIds = useMemo(() => {
          if (aggregate) {
            return (accessibleLocations || []).map((l) => l.ghl_location_id);
          }
          return selectedLocationId ? [selectedLocationId] : [];
        }, [aggregate, accessibleLocations, selectedLocationId]);

        const locNameById = useMemo(() => {
          const m = {};
          (accessibleLocations || []).forEach((l) => {
            m[l.ghl_location_id] = l.name;
          });
          return m;
        }, [accessibleLocations]);

        const load = useCallback(async () => {
          if (locIds.length === 0) {
            setRows([]);
            setLoading(false);
            return;
          }
          setLoading(true);
          setError(null);
          try {
            const { data, error: err } = await window.supabase
              .from("conversations")
              .select(
                "id, ghl_conversation_id, ghl_location_id, ghl_contact_id, contact_name, last_message_body, last_message_type, last_message_at, unread_count, full_thread, synced_at",
              )
              .in("ghl_location_id", locIds)
              .order("last_message_at", {
                ascending: false,
                nullsFirst: false,
              })
              .limit(200);
            if (err) throw err;
            setRows(data || []);
            if (selected) {
              const fresh = (data || []).find(
                (r) => r.ghl_conversation_id === selected.ghl_conversation_id,
              );
              if (fresh) setSelected(fresh);
            }
          } catch (e) {
            console.error("conversations load failed:", e);
            setError(e && e.message ? e.message : "Failed to load");
          } finally {
            setLoading(false);
          }
          // eslint-disable-next-line
        }, [locIds.join("|")]);

        useEffect(() => {
          load();
        }, [load]);

        // LeadDetail → Text → send → route here: if there's a
        // conversation cached for this contact, open it. If not (brand-
        // new thread, sync hasn't caught up yet), we leave the list
        // visible so the rep isn't staring at a half-broken detail view
        // — the toast already confirmed the send. Either way we consume
        // the hint so a refresh doesn't re-trigger.
        useEffect(() => {
          if (!initialContactId) return;
          if (loading) return;
          const match = rows.find((r) => r.ghl_contact_id === initialContactId);
          if (match) setSelected(match);
          if (onInitialConsumed) onInitialConsumed();
          // eslint-disable-next-line
        }, [initialContactId, loading, rows]);

        const relTime = (iso) => {
          if (!iso) return "";
          const d = new Date(iso);
          const now = new Date();
          const sameDay =
            d.getFullYear() === now.getFullYear() &&
            d.getMonth() === now.getMonth() &&
            d.getDate() === now.getDate();
          if (sameDay)
            return d.toLocaleTimeString("en-US", {
              hour: "numeric",
              minute: "2-digit",
            });
          return d.toLocaleDateString("en-US", {
            month: "short",
            day: "numeric",
          });
        };

        const formatMsgTime = (iso) => {
          if (!iso) return "";
          return new Date(iso).toLocaleString("en-US", {
            month: "short",
            day: "numeric",
            hour: "numeric",
            minute: "2-digit",
          });
        };

        // Optimistic append pattern: the bubble goes into full_thread
        // immediately with _status "sending"; on 2xx we reload, which
        // replaces the optimistic row with the real server-appended
        // message (Fix 1 in ghl-send-message writes to public.conversations
        // before returning). On error we DON'T roll back — the failed
        // bubble stays visible with a retry affordance so the rep isn't
        // left wondering what happened.
        const markStatusOnMessage = (localId, nextStatus) => {
          setSelected((prev) => {
            if (!prev) return prev;
            const thread = Array.isArray(prev.full_thread)
              ? prev.full_thread
              : [];
            return {
              ...prev,
              full_thread: thread.map((m) =>
                m && m._localId === localId ? { ...m, _status: nextStatus } : m,
              ),
            };
          });
        };

        const fireSend = async (localId, msg, convoSnapshot) => {
          try {
            await callEdgeFunction("ghl-send-message", {
              ghl_location_id: convoSnapshot.ghl_location_id,
              ghl_contact_id: convoSnapshot.ghl_contact_id,
              type: "SMS",
              message: msg,
            });
            // Fix 1 has already written to the cache. Reloading pulls
            // the authoritative thread and the optimistic row drops out.
            await load();
          } catch (e) {
            markStatusOnMessage(localId, "failed");
            if (onToast) {
              onToast({
                kind: "error",
                text: e && e.message ? e.message : "Send failed",
              });
            }
            throw e;
          }
        };

        const submitSend = async () => {
          const msg = reply.trim();
          if (!msg || !selected || sending) return;
          if (!selected.ghl_contact_id) {
            if (onToast) {
              onToast({
                kind: "error",
                text: "Missing contact id — can't send from this conversation",
              });
            }
            return;
          }
          setSending(true);
          const localId = `local-${Date.now()}-${Math.random()
            .toString(36)
            .slice(2, 8)}`;
          const nowIso = new Date().toISOString();
          const optimistic = {
            id: localId,
            _localId: localId,
            _status: "sending",
            _optimistic: true,
            direction: "outbound",
            body: msg,
            dateAdded: nowIso,
            type: "SMS",
            messageType: "TYPE_SMS",
          };
          const priorThread = Array.isArray(selected.full_thread)
            ? selected.full_thread
            : [];
          const convoSnapshot = {
            ghl_location_id: selected.ghl_location_id,
            ghl_contact_id: selected.ghl_contact_id,
          };
          setSelected({
            ...selected,
            full_thread: [...priorThread, optimistic],
            last_message_body: msg,
            last_message_at: nowIso,
          });
          setReply("");
          try {
            await fireSend(localId, msg, convoSnapshot);
          } catch {
            /* status already marked; retry lives on the bubble */
          } finally {
            setSending(false);
          }
        };

        const retryFailedMessage = async (m) => {
          if (!m || !m._localId || !selected) return;
          const convoSnapshot = {
            ghl_location_id: selected.ghl_location_id,
            ghl_contact_id: selected.ghl_contact_id,
          };
          if (!convoSnapshot.ghl_contact_id) return;
          markStatusOnMessage(m._localId, "sending");
          setSending(true);
          try {
            await fireSend(m._localId, m.body || "", convoSnapshot);
          } catch {
            /* already marked failed */
          } finally {
            setSending(false);
          }
        };

        // Lazy-load the thread if the cache hasn't populated it yet.
        // Bulk sync only hydrates the most recent N conversations per
        // location; anything older gets its thread on the first tap.
        const [hydratingThread, setHydratingThread] = useState(false);
        useEffect(() => {
          if (
            !selected ||
            !selected.ghl_conversation_id ||
            (Array.isArray(selected.full_thread) &&
              selected.full_thread.length > 0)
          ) {
            return;
          }
          let cancelled = false;
          (async () => {
            setHydratingThread(true);
            try {
              const resp = await callEdgeFunction(
                "ghl-get-conversation-thread",
                { ghl_conversation_id: selected.ghl_conversation_id },
              );
              if (cancelled) return;
              setSelected((prev) =>
                prev &&
                prev.ghl_conversation_id === selected.ghl_conversation_id
                  ? { ...prev, full_thread: resp.thread || [] }
                  : prev,
              );
            } catch (e) {
              if (!cancelled && onToast) {
                onToast({
                  kind: "error",
                  text:
                    e && e.message
                      ? `Couldn't load thread: ${e.message}`
                      : "Couldn't load thread",
                });
              }
            } finally {
              if (!cancelled) setHydratingThread(false);
            }
          })();
          return () => {
            cancelled = true;
          };
        }, [selected?.ghl_conversation_id]);

        if (selected) {
          const thread = Array.isArray(selected.full_thread)
            ? selected.full_thread
            : [];
          const reversedThread = [...thread].sort((a, b) => {
            const ax = new Date(a.dateAdded || a.createdAt || 0).getTime();
            const bx = new Date(b.dateAdded || b.createdAt || 0).getTime();
            return ax - bx;
          });
          return (
            <div className="fade-in" style={{ padding: "24px 20px 32px" }}>
              <button
                className="btn-ghost"
                onClick={() => setSelected(null)}
                style={{ fontSize: 13, marginBottom: 14, paddingLeft: 0 }}
              >
                ← Back
              </button>
              <div
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                  marginBottom: 14,
                  gap: 12,
                }}
              >
                <div style={{ minWidth: 0 }}>
                  <div
                    style={{
                      fontSize: 20,
                      fontWeight: 500,
                      color: T.textHi,
                      fontFamily: "'Outfit',sans-serif",
                      letterSpacing: "-0.01em",
                    }}
                  >
                    {selected.contact_name || "(unknown)"}
                  </div>
                  {aggregate && locNameById[selected.ghl_location_id] && (
                    <div
                      style={{
                        fontSize: 12,
                        color: T.textMuted,
                        marginTop: 2,
                      }}
                    >
                      📍 {locNameById[selected.ghl_location_id]}
                    </div>
                  )}
                </div>
              </div>
              <div
                className="surface-card"
                style={{
                  padding: 16,
                  minHeight: 320,
                  maxHeight: "55vh",
                  overflowY: "auto",
                  display: "flex",
                  flexDirection: "column",
                  gap: 10,
                }}
              >
                {reversedThread.length === 0 && (
                  <div
                    style={{
                      fontSize: 13,
                      color: T.textMuted,
                      textAlign: "center",
                      padding: 20,
                    }}
                  >
                    {hydratingThread
                      ? "Loading thread…"
                      : "No messages in thread yet."}
                  </div>
                )}
                {reversedThread.map((m, i) => {
                  const dirRaw = (m.direction || m.messageType || "")
                    .toString()
                    .toLowerCase();
                  const incoming =
                    dirRaw.includes("inbound") ||
                    dirRaw.includes("in") ||
                    dirRaw === "received";
                  const body = m.body || m.message || m.text || "";
                  const t = m.dateAdded || m.createdAt || m.date || null;
                  const status = m._status || null;
                  const isSending = status === "sending";
                  const isFailed = status === "failed";
                  const bubbleBg = isFailed
                    ? T.red
                    : incoming
                      ? T.surfaceAlt
                      : T.airaBlue;
                  return (
                    <div
                      key={m.id || `m-${i}`}
                      style={{
                        alignSelf: incoming ? "flex-start" : "flex-end",
                        maxWidth: "82%",
                        display: "flex",
                        flexDirection: "column",
                        gap: 3,
                      }}
                    >
                      <div
                        style={{
                          padding: "10px 14px",
                          borderRadius: 14,
                          background: bubbleBg,
                          color: incoming && !isFailed ? T.text : "#ffffff",
                          border:
                            incoming && !isFailed
                              ? `0.5px solid ${T.border}`
                              : "none",
                          fontSize: 14,
                          lineHeight: 1.45,
                          opacity: isSending ? 0.6 : 1,
                          whiteSpace: "pre-wrap",
                          wordBreak: "break-word",
                        }}
                      >
                        {body}
                      </div>
                      {isSending && (
                        <div
                          style={{
                            fontSize: 10,
                            color: T.textDim,
                            alignSelf: "flex-end",
                          }}
                        >
                          Sending…
                        </div>
                      )}
                      {isFailed && (
                        <button
                          type="button"
                          onClick={() => retryFailedMessage(m)}
                          disabled={sending}
                          style={{
                            alignSelf: "flex-end",
                            background: "transparent",
                            border: "none",
                            padding: 0,
                            fontSize: 11,
                            color: T.red,
                            cursor: sending ? "not-allowed" : "pointer",
                            display: "inline-flex",
                            alignItems: "center",
                            gap: 4,
                          }}
                        >
                          <span style={{ fontSize: 12 }}>↻</span> Tap to retry
                        </button>
                      )}
                      {t && !isSending && !isFailed && (
                        <div
                          style={{
                            fontSize: 10,
                            color: T.textDim,
                            alignSelf: incoming ? "flex-start" : "flex-end",
                          }}
                        >
                          {formatMsgTime(t)}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                <input
                  value={reply}
                  onChange={(e) => setReply(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === "Enter" && !e.shiftKey) {
                      e.preventDefault();
                      submitSend();
                    }
                  }}
                  placeholder="Type a message…"
                  disabled={sending}
                  style={{
                    flex: 1,
                    padding: "12px 16px",
                    borderRadius: 12,
                    border: `0.5px solid ${T.border}`,
                    background: T.surface,
                    color: T.text,
                    fontSize: 14,
                    outline: "none",
                  }}
                />
                <button
                  className="btn-primary"
                  onClick={submitSend}
                  disabled={sending || !reply.trim()}
                  style={{ padding: "12px 20px" }}
                >
                  {sending ? "Sending…" : "Send"}
                </button>
              </div>
            </div>
          );
        }

        return (
          <div className="fade-in" style={{ padding: "24px 20px 32px" }}>
            <div
              style={{
                display: "flex",
                justifyContent: "space-between",
                alignItems: "center",
                marginBottom: 6,
              }}
            >
              <div
                style={{
                  fontSize: 22,
                  fontWeight: 500,
                  color: T.textHi,
                  fontFamily: "'Outfit',sans-serif",
                  letterSpacing: "-0.01em",
                }}
              >
                {aggregate ? "All Conversations" : "Conversations"}
              </div>
              <button
                className="btn-ghost"
                onClick={load}
                style={{ fontSize: 12 }}
              >
                ↻ Refresh
              </button>
            </div>
            <div
              style={{
                fontSize: 12,
                color: T.textMuted,
                marginBottom: 12,
              }}
            >
              {aggregate
                ? `${(accessibleLocations || []).length} locations · last 30 days`
                : "Last 30 days"}
            </div>

            <div
              style={{
                position: "sticky",
                top: 0,
                zIndex: 5,
                background: T.bg,
                paddingBottom: 10,
                marginBottom: 4,
              }}
            >
              <div style={{ position: "relative" }}>
                <span
                  style={{
                    position: "absolute",
                    left: 14,
                    top: "50%",
                    transform: "translateY(-50%)",
                    fontSize: 14,
                    color: T.textDim,
                  }}
                >
                  🔍
                </span>
                <input
                  value={listSearch}
                  onChange={(e) => setListSearch(e.target.value)}
                  placeholder="Search conversations by name…"
                  style={{
                    width: "100%",
                    padding: "12px 40px 12px 42px",
                    borderRadius: 12,
                    border: `0.5px solid ${T.border}`,
                    background: T.surface,
                    color: T.text,
                    fontSize: 14,
                    outline: "none",
                    boxSizing: "border-box",
                  }}
                />
                {listSearch && (
                  <button
                    onClick={() => setListSearch("")}
                    style={{
                      position: "absolute",
                      right: 10,
                      top: "50%",
                      transform: "translateY(-50%)",
                      background: "transparent",
                      border: "none",
                      color: T.textMuted,
                      fontSize: 18,
                      cursor: "pointer",
                      padding: "4px 8px",
                      lineHeight: 1,
                    }}
                    aria-label="Clear search"
                  >
                    ×
                  </button>
                )}
              </div>
            </div>

            {error && (
              <div
                className="surface-card"
                style={{
                  padding: "14px 16px",
                  marginBottom: 12,
                  borderLeft: `3px solid ${T.red}`,
                  display: "flex",
                  alignItems: "center",
                  gap: 10,
                }}
              >
                <span
                  style={{
                    width: 6,
                    height: 6,
                    borderRadius: "50%",
                    background: T.red,
                    flexShrink: 0,
                  }}
                />
                <span style={{ color: T.text, fontSize: 13, fontWeight: 500 }}>
                  {error}
                </span>
              </div>
            )}

            {loading && (
              <div
                style={{ display: "flex", flexDirection: "column", gap: 10 }}
              >
                {[0, 1, 2].map((i) => (
                  <div
                    key={`skel-${i}`}
                    className="surface-card"
                    style={{
                      padding: "14px 16px",
                      display: "flex",
                      alignItems: "center",
                      gap: 14,
                    }}
                  >
                    <SkelBar w={42} h={42} radius={21} />
                    <div style={{ flex: 1 }}>
                      <SkelBar w={140} h={12} />
                      <div style={{ height: 8 }} />
                      <SkelBar w={220} h={10} />
                    </div>
                  </div>
                ))}
              </div>
            )}

            {(() => {
              if (loading) return null;
              const q = listSearch.trim().toLowerCase();
              const filtered = q
                ? rows.filter((r) =>
                    (r.contact_name || "").toLowerCase().includes(q),
                  )
                : rows;
              if (rows.length === 0 && !error) {
                return (
                  <div
                    className="surface-card"
                    style={{
                      padding: 40,
                      textAlign: "center",
                      color: T.textMuted,
                      fontSize: 13,
                      lineHeight: 1.5,
                    }}
                  >
                    No conversations in the last 30 days. Run a sync from the
                    Admin → Health tab if this seems wrong.
                  </div>
                );
              }
              if (filtered.length === 0 && q) {
                return (
                  <div
                    className="surface-card"
                    style={{
                      padding: 40,
                      textAlign: "center",
                      color: T.textMuted,
                      fontSize: 13,
                      lineHeight: 1.5,
                    }}
                  >
                    No conversations match "{listSearch}".
                  </div>
                );
              }
              return filtered.map((c) => {
                const initial = (c.contact_name || "?")[0].toUpperCase();
                const unread = Number(c.unread_count) || 0;
                return (
                  <div
                    key={c.ghl_conversation_id}
                    onClick={() => setSelected(c)}
                    className="surface-card interactive"
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: 14,
                      padding: "14px 16px",
                      marginBottom: 8,
                    }}
                  >
                    <div
                      style={{
                        width: 42,
                        height: 42,
                        borderRadius: "50%",
                        background: T.airaBlueDim,
                        display: "flex",

      // ── Appointments Screen (real data) ──
      function dateGroupKey(date) {
        const now = new Date();
        const t0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const t1 = new Date(t0.getTime() + 86400000);
        const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        if (d.getTime() === t0.getTime()) return "Today";
        if (d.getTime() === t1.getTime()) return "Tomorrow";
        return date.toLocaleDateString("en-US", {
          weekday: "short",
          month: "short",
          day: "numeric",
        });
      }

      function formatApptTime(date) {
        return date
          .toLocaleTimeString("en-US", {
            hour: "numeric",
            minute: "2-digit",
          })
          .toLowerCase()
          .replace(" ", "");
      }

        selectedLocationId,
        onBook,
        callLogVersion,

        const [rows, setRows] = useState([]);
        const [contactMap, setContactMap] = useState({});
        const [loading, setLoading] = useState(true);
        const [syncing, setSyncing] = useState(false);
        const [error, setError] = useState(null);
        const [showCancelled, setShowCancelled] = useState(false);

        const fetchAppts = useCallback(async () => {
          if (!selectedLocationId) return;
          const sinceIso = new Date(
            Date.now() - 24 * 60 * 60 * 1000,
          ).toISOString();
          const { data, error: err } = await window.supabase
            .from("appointments")
            .select(
              "ghl_event_id, ghl_contact_id, title, start_time, end_time, appointment_status, assigned_to, portal_assigned_to",
            )
            .eq("ghl_location_id", selectedLocationId)
            .gte("start_time", sinceIso)
            .order("start_time", { ascending: true })
            .limit(200);
          if (err) throw err;
          const list = data || [];
          const ids = [
            ...new Set(list.map((r) => r.ghl_contact_id).filter(Boolean)),
          ];
          const cMap = {};
          if (ids.length > 0) {
            const { data: cData, error: cErr } = await window.supabase
              .from("contacts")
              .select("ghl_contact_id, full_name, first_name, last_name, phone")
              .in("ghl_contact_id", ids);
            if (cErr) console.warn("contacts fetch failed:", cErr.message);
            (cData || []).forEach((c) => {
              cMap[c.ghl_contact_id] = c;
            });
          }
          setContactMap(cMap);
          setRows(list);
        }, [selectedLocationId]);

        const load = useCallback(async () => {
          setLoading(true);
          setError(null);
          try {
            await fetchAppts();
          } catch (e) {
            console.error("appointments fetch failed:", e);
            setError(
              e && e.message ? e.message : "Failed to load appointments",
            );
          } finally {
            setLoading(false);
          }
        }, [fetchAppts]);

        const triggerSync = useCallback(async () => {
          if (!selectedLocationId) return;
          setSyncing(true);
          try {
            const { data: session } = await window.supabase.auth.getSession();
            const jwt = session?.session?.access_token;
            if (!jwt) return;
            await fetch(
              "https://rgpfzactcqbvadthzsgx.supabase.co/functions/v1/sync-ghl-to-cache",
              {
                method: "POST",
                headers: {
                  Authorization: `Bearer ${jwt}`,
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({ ghl_location_id: selectedLocationId }),
              },
            );
            await fetchAppts();
          } catch (e) {
            console.error("sync trigger failed:", e);
          } finally {
            setSyncing(false);
          }
        }, [selectedLocationId, fetchAppts]);

        // Show cached immediately. The full sync-ghl-to-cache call was
        // previously triggered on every mount here — that turned tab

        // fix) into a silent sync-hammer and contributed to Supabase
        // quota burn + 504s. Users get fresh data via the explicit ↻
        // Refresh button above instead.
        useEffect(() => {
          load();

        const visible = rows.filter((r) => {
          if (r.appointment_status === "invalid") return false;

          return true;

        const grouped = [];
        const byKey = {};

      // ── Set Password Screen (invite acceptance + password recovery) ──
      // The user lands here after clicking a Supabase invite-email link or
      // a reset-password link. The session is already established via
      // detectSessionInUrl; this screen forces them to pick a password
      // before they can reach the rest of the app.
      function SetPasswordScreen({ session, flowType, onComplete }) {
        const [password, setPassword] = useState("");
        const [confirm, setConfirm] = useState("");
        const [submitting, setSubmitting] = useState(false);
        const [error, setError] = useState("");

        const email = session?.user?.email || "";
        const isInvite = flowType === "invite";
        const hasMinLen = password.length >= 8;
        const hasNumber = /\d/.test(password);
        const hasLetter = /[a-zA-Z]/.test(password);
        const matches = password.length > 0 && password === confirm;
        const canSubmit =
          hasMinLen && hasNumber && hasLetter && matches && !submitting;

        const submit = async (e) => {
          e.preventDefault();
          if (!canSubmit) return;
          setSubmitting(true);
          setError("");
          try {

      // ── Triage View (VP's weapon) ──
      const TRIAGE_RED = "#E24B4A";
      const TRIAGE_AMBER = "#F59E0B";
      const TRIAGE_GREEN = "#10B981";

      function formatCurrency(n) {
        return "$" + (Number(n) || 0).toLocaleString();
      }

      function splitDiagnosis(text) {
        if (!text) return { head: "", body: "" };
        const i = text.indexOf(".");
        if (i < 0) return { head: text, body: "" };
        return { head: text.slice(0, i + 1), body: text.slice(i + 1).trim() };
      }

      function TriageCard({ row, onOpen }) {
        const status = row.status_color;
        const isRed = status === "red";
        const isYellow = status === "yellow";
        const color = isRed
          ? TRIAGE_RED
          : isYellow
            ? TRIAGE_AMBER
            : TRIAGE_GREEN;
        const statusLabel = isRed
          ? "NEEDS ATTENTION"
          : isYellow
            ? "UNDER STANDARD"
            : "HEALTHY";
        const headline = isRed
          ? `${formatCurrency(row.floor_gap_dollars)} on the table`
          : isYellow
            ? `${formatCurrency(row.ceiling_upside_dollars)} upside`
            : null;
        const convPct = Math.round(Number(row.current_conversion_pct) || 0);
        const perfLine = `${row.ad_leads_count} ad leads → ${row.actual_sales} sales (${convPct}%). Should be ${row.floor_sales_target}+.`;
        const diag = splitDiagnosis(row.primary_diagnosis);

        return (
          <div
            className="surface-card"
            style={{
              borderLeft: `4px solid ${color}`,
              padding: 20,
              marginBottom: 12,
            }}
          >
            <div
              style={{
                display: "flex",
                alignItems: "center",
                gap: 8,
                marginBottom: 10,
              }}
            >
              <span
                style={{

                  height: 6,

                  background: color,

                }}
              />
              <span
                style={{
                  fontSize: 10,
                  fontWeight: 500,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  color: T.textMuted,
                }}
              >
                {statusLabel}
              </span>
            </div>
            <div
              style={{
                display: "flex",
                justifyContent: "space-between",
                alignItems: "baseline",
                gap: 12,
                marginBottom: 6,
              }}
            >
              <div
                style={{
                  fontSize: 16,
                  fontWeight: 500,
                  color: T.textHi,
                  fontFamily: "'Outfit',sans-serif",
                  letterSpacing: "-0.01em",
                  minWidth: 0,
                  overflow: "hidden",

                  whiteSpace: "nowrap",
                }}
              >
                {row.location_name}
              </div>
              {headline && (
                <div
                  style={{
                    fontFamily: "'Outfit',sans-serif",
                    letterSpacing: "-0.01em",
                    fontSize: 16,
                    fontWeight: 500,
                    color: T.textHi,
                    whiteSpace: "nowrap",
                    flexShrink: 0,

                  {headline}
                </div>
              )}

              <div
                style={{
                  fontSize: 10,
                  fontWeight: 500,
                  letterSpacing: "0.1em",

                  color: T.textMuted,
                  marginBottom: 10,
                  display: "inline-flex",
                  alignItems: "center",
                  gap: 6,
                }}
              >
                <span
                  style={{
                    width: 5,
                    height: 5,
                    borderRadius: "50%",
                    background: T.textDim,
                  }}

              </div>
            )}

                fontSize: 13,
                color: T.textMuted,

              style={{
                fontSize: 14,

                fontWeight: 400,
                lineHeight: 1.5,
                marginBottom: 14,

                {diag.head}
              </span>
              {diag.body && <> {diag.body}</>}

              <div
                style={{
                  fontSize: 12,

                  marginBottom: 10,

      function TriageView({
        rows,
        loading,
        error,
        onRefresh,
        onSelectLocation,
      }) {
        const [greenExpanded, setGreenExpanded] = useState(false);

        const reds = rows
          .filter((r) => r.status_color === "red")
          .sort(
            (a, b) =>
              (Number(b.floor_gap_dollars) || 0) -
              (Number(a.floor_gap_dollars) || 0),
          );
        const yellows = rows
          .filter((r) => r.status_color === "yellow")
          .sort(
            (a, b) =>
              (Number(b.ceiling_upside_dollars) || 0) -
              (Number(a.ceiling_upside_dollars) || 0),
          );
        const greens = rows.filter((r) => r.status_color === "green");
        const grays = rows.filter((r) => r.status_color === "gray");

        const totalRed = reds.reduce(
          (s, r) => s + (Number(r.floor_gap_dollars) || 0),
          0,
        );
        const totalYellow = yellows.reduce(
          (s, r) => s + (Number(r.ceiling_upside_dollars) || 0),
          0,
        );

        const monthLabel = new Date()
          .toLocaleDateString("en-US", { month: "long", year: "numeric" })
          .toUpperCase();

        const bannerColor =
          reds.length > 0
            ? TRIAGE_RED
            : yellows.length > 0
              ? TRIAGE_AMBER
              : TRIAGE_GREEN;
        const bannerEmoji =
          reds.length > 0 ? "🔴" : yellows.length > 0 ? "🟡" : "🟢";
        const bannerText =
          reds.length > 0
            ? `${reds.length} location${reds.length === 1 ? "" : "s"} need attention today · ${formatCurrency(totalRed)} on the table across your territory`
            : yellows.length > 0
              ? `${yellows.length} location${yellows.length === 1 ? "" : "s"} running under the Aira standard · ${formatCurrency(totalYellow)} ceiling upside available`

        return (
          <div className="fade-in" style={{ padding: "24px 20px 32px" }}>
            <div style={{ marginBottom: 20 }}>
              <div
                style={{
                  fontSize: 11,
                  fontWeight: 500,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  color: T.textMuted,
                }}
              >
                {monthLabel}
              </div>
              <div
                style={{
                  fontSize: 22,
                  fontWeight: 500,
                  color: T.textHi,
                  fontFamily: "'Outfit',sans-serif",
                  letterSpacing: "-0.01em",
                  marginTop: 4,
                }}
              >
                Triage
              </div>
            </div>

            {error && (
              <div
                className="surface-card"
                style={{
                  padding: "14px 16px",
                  marginBottom: 16,
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                  gap: 12,
                  borderLeft: `3px solid ${T.red}`,
                }}
              >
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span
                    style={{
                      width: 6,
                      height: 6,
                      borderRadius: "50%",
                      background: T.red,
                      flexShrink: 0,
                    }}

                  </div>

              </div>

            {/* Call-to-action banner */}
            {!loading && !error && (
              <div
                className="surface-card"
                style={{
                  padding: "16px 18px",
                  marginBottom: 18,
                  display: "flex",
                  alignItems: "center",
                  gap: 12,
                  borderLeft: `3px solid ${bannerColor}`,

              >
                <span
                  style={{
                    width: 8,
                    height: 8,
                    borderRadius: "50%",
                    background: bannerColor,
                    flexShrink: 0,
                  }}
                />
                <div
                  style={{
                    color: T.text,
                    fontSize: 13,
                    fontWeight: 500,
                    lineHeight: 1.5,
                  }}
                >
                  {bannerText}
                </div>
              </div>
            )}

            {loading && (
              <div
                style={{ display: "flex", flexDirection: "column", gap: 12 }}
              >
                {[0, 1].map((i) => (
                  <div
                    key={`skel-${i}`}
                    className="surface-card"
                    style={{
                      borderLeft: `4px solid ${T.border}`,
                      padding: 20,
                      display: "flex",
                      flexDirection: "column",
                      gap: 10,
                    }}
                  >
                    <div
                      style={{
                        display: "flex",
                        justifyContent: "space-between",
                        gap: 12,
                      }}

                      <SkelBar w={180} h={18} />
                      <SkelBar w={120} h={20} />
                    </div>
                    <SkelBar w={"80%"} h={12} />
                    <SkelBar w={"95%"} h={16} />
                    <SkelBar w={120} h={28} />
                  </div>

              </div>
            )}

            {/* Red cards */}
            {!loading &&
              reds.map((r) => (
                <TriageCard
                  key={r.ghl_location_id}
                  row={r}
                  onOpen={onSelectLocation}

              ))}

            {/* Yellow cards */}
            {!loading &&
              yellows.map((r) => (
                <TriageCard
                  key={r.ghl_location_id}
                  row={r}
                  onOpen={onSelectLocation}
                />
              ))}

            {/* Green (collapsed) */}
            {!loading && greens.length > 0 && (
              <div
                className="surface-card"
                style={{
                  borderLeft: `4px solid ${TRIAGE_GREEN}`,
                  marginBottom: 12,
                  overflow: "hidden",

              >
                <button
                  onClick={() => setGreenExpanded((v) => !v)}
                  style={{
                    width: "100%",
                    textAlign: "left",
                    padding: "16px 18px",
                    background: "transparent",
                    border: "none",
                    color: T.text,
                    cursor: "pointer",
                    display: "flex",
                    justifyContent: "space-between",
                    alignItems: "center",
                    fontFamily: "inherit",
                  }}
                >
                  <span
                    style={{
                      display: "inline-flex",
                      alignItems: "center",
                      gap: 8,
                      fontSize: 13,
                      fontWeight: 500,
                      color: T.text,
                    }}
                  >
                    <span
                      style={{
                        width: 6,
                        height: 6,
                        borderRadius: "50%",
                        background: TRIAGE_GREEN,

                    />

                    running healthy
                  </span>
                  <span style={{ fontSize: 12, color: T.textMuted }}>
                    {greenExpanded ? "Hide" : "Show"}

                </button>
                {greenExpanded && (
                  <div style={{ padding: "0 14px 14px" }}>
                    {greens.map((r) => (
                      <TriageCard
                        key={r.ghl_location_id}
                        row={r}
                        onOpen={onSelectLocation}
                      />
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* Gray (insufficient data) */}
            {!loading && grays.length > 0 && (
              <div style={{ marginTop: 10 }}>
                <div
                  style={{
                    fontSize: 10,
                    fontWeight: 500,
                    letterSpacing: "0.12em",
                    textTransform: "uppercase",
                    color: T.textMuted,
                    marginBottom: 10,
                  }}
                >
                  Insufficient data
                </div>
                {grays.map((r) => (
                  <div
                    key={r.ghl_location_id}
                    className="surface-card"
                    style={{
                      padding: "14px 18px",
                      marginBottom: 8,
                      display: "flex",
                      justifyContent: "space-between",
                      alignItems: "center",
                      gap: 12,
                    }}
                  >
                    <div style={{ minWidth: 0 }}>
                      <div
                        style={{
                          fontSize: 13,
                          fontWeight: 500,
                          color: T.textHi,
                          overflow: "hidden",
                          textOverflow: "ellipsis",
                          whiteSpace: "nowrap",
                        }}
                      >
                        {r.location_name}
                      </div>
                      <div
                        style={{
                          fontSize: 11,
                          color: T.textMuted,
                          marginTop: 2,
                        }}
                      >
                        Need 10+ ad leads to diagnose ({r.ad_leads_count} so
                        far)
                      </div>
                    </div>
                    <button
                      className="btn-ghost"

      // ── Territory Dashboard (multi-location overview) ──
      function LocStat({ label, value, status }) {
        let dotColor = null;
        if (status === "good") dotColor = T.green;
        else if (status === "warn") dotColor = T.amber;
        else if (status === "bad") dotColor = T.red;
        return (
          <div style={{ textAlign: "center", minWidth: 0 }}>
            <div
              style={{
                display: "inline-flex",
                alignItems: "center",
                justifyContent: "center",
                gap: 5,
                fontSize: 14,
                fontWeight: 500,
                color: T.textHi,
                fontFamily: "'Outfit',sans-serif",
                letterSpacing: "-0.01em",
                overflow: "hidden",
                textOverflow: "ellipsis",
                whiteSpace: "nowrap",
              }}
            >
              {dotColor && (
                <span
                  style={{
                    width: 5,
                    height: 5,
                    borderRadius: "50%",
                    background: dotColor,
                    flexShrink: 0,
                  }}
                />
              )}
              {value}
            </div>
            <div
              style={{
                fontSize: 9,
                color: T.textDim,
                letterSpacing: "0.1em",
                textTransform: "uppercase",
                marginTop: 3,
              }}
            >
              {label}
            </div>
          </div>
        );
      }

      function TerritoryDashboard({ accessibleLocations, onSelectLocation }) {
        const [rows, setRows] = useState([]);
        const [leaderboard, setLeaderboard] = useState([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);

        const load = useCallback(async () => {
          setLoading(true);
          setError(null);
          try {
            const ids = accessibleLocations.map((l) => l.ghl_location_id);
            const [kpiRes, lbRes] = await Promise.all([
              window.supabase.rpc("territory_kpis", {
                p_ghl_location_ids: ids,
              }),
              // Aggregated rep activity across the VP's whole territory.
              // The RPC returns one row per (rep × location); we fold
              // here so the leaderboard shows one row per rep with a
              // combined 📍 tag listing where their activity came from.
              window.supabase.rpc("rep_leaderboard", {
                p_ghl_location_ids: ids,
              }),
            ]);
            if (kpiRes.error) throw kpiRes.error;
            if (lbRes.error) throw lbRes.error;
            setRows(kpiRes.data || []);
            setLeaderboard(lbRes.data || []);
          } catch (e) {
            console.error("territory_kpis failed:", e);
            setError(
              e && e.message ? e.message : "Failed to load territory data",
            );
          } finally {
            setLoading(false);
          }
        }, [accessibleLocations]);

        useEffect(() => {
          load();
        }, [load]);

        const totals = rows.reduce(
          (acc, r) => ({
            leads: acc.leads + (Number(r.leads) || 0),
            booked_appts: acc.booked_appts + (Number(r.booked_appts) || 0),
            showed: acc.showed + (Number(r.showed) || 0),
            no_showed: acc.no_showed + (Number(r.no_showed) || 0),
            sales: acc.sales + (Number(r.sales) || 0),
            revenue: acc.revenue + (Number(r.revenue) || 0),
          }),
          {
            leads: 0,
            booked_appts: 0,
            showed: 0,
            no_showed: 0,
            sales: 0,
            revenue: 0,
          },
        );
        const showRate =
          totals.booked_appts > 0
            ? Math.round((totals.showed / totals.booked_appts) * 100)
            : 0;
        const closeRate =
          totals.leads > 0
            ? Math.round((totals.sales / totals.leads) * 100)
            : 0;
        const avgSale =
          totals.sales > 0 ? Math.round(totals.revenue / totals.sales) : 0;
        const emptyCache =
          !loading &&
          !error &&
          totals.leads === 0 &&
          totals.booked_appts === 0 &&
          totals.showed === 0 &&
          totals.no_showed === 0 &&
          totals.sales === 0 &&
          totals.revenue === 0;
        const monthLabel = new Date()
          .toLocaleDateString("en-US", { month: "long", year: "numeric" })
          .toUpperCase();

        return (
          <div className="fade-in" style={{ padding: "24px 20px 32px" }}>
            <div style={{ marginBottom: 24 }}>
              <div
                style={{
                  fontSize: 11,
                  fontWeight: 500,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  color: T.textMuted,
                }}
              >
                {monthLabel}
              </div>
              <div
                style={{
                  fontSize: 22,
                  fontWeight: 500,
                  color: T.textHi,
                  fontFamily: "'Outfit',sans-serif",
                  letterSpacing: "-0.01em",
                  marginTop: 4,
                }}
              >
                Territory Overview
              </div>
              <div style={{ fontSize: 12, color: T.textMuted, marginTop: 4 }}>
                {accessibleLocations.length} locations · aggregated
              </div>
            </div>

            {error && (
              <div
                className="surface-card"
                style={{
                  padding: "14px 16px",
                  marginBottom: 16,
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                  gap: 12,
                  borderLeft: `3px solid ${T.red}`,
                }}
              >
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span
                    style={{
                      width: 6,
                      height: 6,
                      borderRadius: "50%",
                      background: T.red,
                      flexShrink: 0,
                    }}
                  />
                  <div style={{ color: T.text, fontSize: 13, fontWeight: 500 }}>
                    Couldn't load territory data.
                  </div>
                </div>
                <button className="btn-ghost" onClick={load}>
                  Retry
                </button>
              </div>
            )}

            {emptyCache && (
              <div
                className="surface-card"
                style={{
                  padding: "14px 16px",
                  marginBottom: 16,
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                  gap: 12,
                }}
              >
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span
                    style={{
                      width: 6,
                      height: 6,
                      borderRadius: "50%",
                      background: T.airaBlue,
                      flexShrink: 0,
                    }}
                  />
                  <div style={{ color: T.text, fontSize: 13, fontWeight: 500 }}>
                    Syncing territory data… refresh in a minute.
                  </div>
                </div>
                <button className="btn-ghost" onClick={load}>
                  Refresh
                </button>
              </div>
            )}

            <div
              style={{
                display: "grid",
                gridTemplateColumns: "repeat(4, minmax(0, 1fr))",
                gap: 10,
                marginBottom: 10,
              }}
            >
              <KPI
                label="Leads"
                value={loading ? <SkelBar w={36} h={24} /> : totals.leads}
              />
              <KPI
                label="Booked"
                value={
                  loading ? <SkelBar w={36} h={24} /> : totals.booked_appts
                }
              />
              <KPI
                label="Showed"
                value={loading ? <SkelBar w={36} h={24} /> : totals.showed}
                sub={loading ? null : `${showRate}% show rate`}
              />
              <KPI
                label="No Showed"
                value={loading ? <SkelBar w={36} h={24} /> : totals.no_showed}
              />
            </div>

            <div
              style={{
                display: "grid",
                gridTemplateColumns: "repeat(4, minmax(0, 1fr))",
                gap: 10,
                marginBottom: 18,
              }}
            >
              <KPI
                label="Sales"
                value={loading ? <SkelBar w={36} h={24} /> : totals.sales}
                sub={loading ? null : `${closeRate}% close`}
              />
              <KPI
                label="Revenue"
                value={
                  loading ? (
                    <SkelBar w={60} h={24} />
                  ) : (
                    `$${totals.revenue.toLocaleString()}`

                sub={loading ? null : `$${avgSale.toLocaleString()} avg`}
              />
              <KPI label="Ad Spend" value="—" sub="(syncing)" />
              <KPI
                label="Locations"
                value={
                  loading ? (
                    <SkelBar w={36} h={24} />

                    accessibleLocations.length
