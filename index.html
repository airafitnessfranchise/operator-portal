      // ── Pending-call intent (sessionStorage) ──
      const PENDING_CALL_KEY = "aira_pending_call";
      const PENDING_CALL_MAX_AGE_MS = 30 * 60 * 1000;

      function markPendingCall({ contactId, contactName, ghl_location_id }) {
        try {
          sessionStorage.setItem(
            PENDING_CALL_KEY,
            JSON.stringify({
              contactId: String(contactId || ""),
              contactName: String(contactName || "this contact"),
              ghl_location_id: String(ghl_location_id || ""),
              calledAt: Date.now(),
            }),
          );
        } catch (e) {
          console.warn("markPendingCall failed:", e);
        }
      }

      function readPendingCall() {
        try {
          const raw = sessionStorage.getItem(PENDING_CALL_KEY);
          if (!raw) return null;
          const data = JSON.parse(raw);
          if (!data || typeof data.calledAt !== "number") return null;
          if (Date.now() - data.calledAt > PENDING_CALL_MAX_AGE_MS) {
            sessionStorage.removeItem(PENDING_CALL_KEY);
            return null;
          }
          return data;
        } catch {
          return null;
        }
      }

      function clearPendingCall() {
        try {
          sessionStorage.removeItem(PENDING_CALL_KEY);
        } catch {}
      }

      function ActionBtn({
        icon,
        label,
        href,
        onClick,
        color = T.accent,
        small,
      }) {
        const s = {
          display: "inline-flex",
          alignItems: "center",
          gap: 6,
          padding: small ? "8px 14px" : "10px 18px",
          borderRadius: 10,
          border: `1.5px solid ${color}33`,
          background: `${color}11`,
          color,
          fontSize: small ? 12 : 13,
          fontWeight: 600,
          cursor: "pointer",
          textDecoration: "none",
          transition: "all 0.15s",
          letterSpacing: "0.02em",
        };
        return href ? (
          <a href={href} onClick={onClick} style={s}>
            <span style={{ fontSize: small ? 14 : 16 }}>{icon}</span>
            {label}
          </a>
        ) : (
          <button onClick={onClick} style={s}>
            <span style={{ fontSize: small ? 14 : 16 }}>{icon}</span>
            {label}
          </button>
        );
      }

      // KPI card — Aira light-mode. White surface, hairline border, no shadow.
      // Hero number is always textHi (no decorative color). An optional `status`
      // prop ("good" | "warn" | "bad") renders a tiny colored dot next to the
      // label for genuinely-signaling cases only. The legacy `color` prop is
      // accepted for backwards compatibility — if it matches a semantic color
      // it's translated to a status dot; otherwise it's ignored.
      function KPI({ label, value, sub, status, color, icon }) {
        let dotColor = null;
        if (status === "good") dotColor = T.green;
        else if (status === "warn") dotColor = T.amber;
        else if (status === "bad") dotColor = T.red;
        else if (color === T.red || color === T.amber || color === T.green) {
          dotColor = color;
        }
        return (
          <div
            className="surface-card"
            style={{
              padding: "16px 14px",
              display: "flex",
              flexDirection: "column",
              gap: 10,
              minHeight: 96,
            }}

            <div
              style={{
                fontSize: 10,
                fontWeight: 500,
                letterSpacing: "0.1em",
                textTransform: "uppercase",
                color: T.textMuted,
                display: "flex",
                alignItems: "center",
                gap: 6,
              }}
            >
              {dotColor && (
                <span
                  style={{
                    width: 6,
                    height: 6,
                    borderRadius: "50%",
                    background: dotColor,
                    flexShrink: 0,
                  }}
                />
              )}
              {icon && !dotColor && (
                <span style={{ fontSize: 12, opacity: 0.7 }}>{icon}</span>
              )}
              <span
                style={{
                  overflow: "hidden",
                  textOverflow: "ellipsis",
                  whiteSpace: "nowrap",
                }}
              >
                {label}
              </span>
            </div>
            <div
              style={{
                fontSize: 30,
                fontWeight: 500,
                color: T.textHi,
                lineHeight: 1,
                fontFamily: "'Outfit',sans-serif",
                letterSpacing: "-0.02em",
                overflow: "hidden",
                textOverflow: "ellipsis",
                whiteSpace: "nowrap",
              }}

              {value}
            </div>
            {sub && (
              <div
                style={{
                  fontSize: 12,
                  color: T.textMuted,
                  lineHeight: 1.3,
                  overflow: "hidden",
                  textOverflow: "ellipsis",
                  whiteSpace: "nowrap",
                }}
              >
                {sub}
              </div>
            )}
          </div>
        );
      }

        return (role || "")
          .split("_")
          .map((w) => (w ? w[0].toUpperCase() + w.slice(1) : ""))

            if (lbRes.error) throw lbRes.error;

                    booked_appts: 0,

                    no_showed: 0,

      // ── Appointments Screen (real data) ──
      function dateGroupKey(date) {
        const now = new Date();
        const t0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const t1 = new Date(t0.getTime() + 86400000);
        const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        if (d.getTime() === t0.getTime()) return "Today";
        if (d.getTime() === t1.getTime()) return "Tomorrow";
        return date.toLocaleDateString("en-US", {
          weekday: "short",
          month: "short",
          day: "numeric",
        });
      }

      function formatApptTime(date) {
        return date
          .toLocaleTimeString("en-US", {
            hour: "numeric",
            minute: "2-digit",
          })
          .toLowerCase()
          .replace(" ", "");
      }

      function AppointmentsScreen({
        selectedLocationId,
        onBook,
        callLogVersion,
      }) {
        const [rows, setRows] = useState([]);
        const [contactMap, setContactMap] = useState({});
        const [loading, setLoading] = useState(true);
        const [syncing, setSyncing] = useState(false);
        const [error, setError] = useState(null);
        const [showCancelled, setShowCancelled] = useState(false);

        const fetchAppts = useCallback(async () => {
          if (!selectedLocationId) return;
          const sinceIso = new Date(
            Date.now() - 24 * 60 * 60 * 1000,
          ).toISOString();
          const { data, error: err } = await window.supabase
            .from("appointments")
            .select(
              "ghl_event_id, ghl_contact_id, title, start_time, end_time, appointment_status, assigned_to, portal_assigned_to",
            )
            .eq("ghl_location_id", selectedLocationId)
            .gte("start_time", sinceIso)
            .order("start_time", { ascending: true })
            .limit(200);
          if (err) throw err;
          const list = data || [];
          const ids = [
            ...new Set(list.map((r) => r.ghl_contact_id).filter(Boolean)),
          ];
          const cMap = {};
          if (ids.length > 0) {
            const { data: cData, error: cErr } = await window.supabase
              .from("contacts")
              .select("ghl_contact_id, full_name, first_name, last_name, phone")
              .in("ghl_contact_id", ids);
            if (cErr) console.warn("contacts fetch failed:", cErr.message);
            (cData || []).forEach((c) => {
              cMap[c.ghl_contact_id] = c;
            });
          }
          setContactMap(cMap);
          setRows(list);
        }, [selectedLocationId]);

        const load = useCallback(async () => {
          setLoading(true);
          setError(null);
          try {
            await fetchAppts();
          } catch (e) {
            console.error("appointments fetch failed:", e);
            setError(
              e && e.message ? e.message : "Failed to load appointments",
            );
          } finally {
            setLoading(false);
          }
        }, [fetchAppts]);

        const triggerSync = useCallback(async () => {
          if (!selectedLocationId) return;
          setSyncing(true);
          try {
            const { data: session } = await window.supabase.auth.getSession();
            const jwt = session?.session?.access_token;
            if (!jwt) return;
            await fetch(
              "https://rgpfzactcqbvadthzsgx.supabase.co/functions/v1/sync-ghl-to-cache",
              {
                method: "POST",
                headers: {
                  Authorization: `Bearer ${jwt}`,
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({ ghl_location_id: selectedLocationId }),
              },
            );
            await fetchAppts();
          } catch (e) {
            console.error("sync trigger failed:", e);
          } finally {
            setSyncing(false);
          }
        }, [selectedLocationId, fetchAppts]);

        // Initial load: show cached immediately, background-sync + refetch
        useEffect(() => {
          load();
          triggerSync();
          // eslint-disable-next-line
        }, [selectedLocationId, callLogVersion]);

        const visible = rows.filter((r) => {
          if (r.appointment_status === "invalid") return false;
          if (!showCancelled && r.appointment_status === "cancelled")
            return false;
          return true;
        });

        const grouped = [];
        const byKey = {};
        visible.forEach((a) => {
          const d = new Date(a.start_time);
          const key = dateGroupKey(d);
          if (!byKey[key]) {
            byKey[key] = { key, items: [] };
            grouped.push(byKey[key]);
          }
          byKey[key].items.push(a);
        });

        const statusStyles = {
          confirmed: { bg: T.accentDim, color: T.accent, label: "Confirmed" },
          showed: {
            bg: "rgba(16,185,129,0.15)",
            color: TRIAGE_GREEN,
            label: "Showed",
          },
          noshow: { bg: T.redDim, color: T.red, label: "No Show" },
          cancelled: { bg: T.redDim, color: T.red, label: "Cancelled" },
          invalid: {
            bg: "rgba(107,109,123,0.15)",
            color: T.muted,
            label: "Invalid",
          },
          new: { bg: T.blueDim, color: T.blue, label: "New" },
        };

        const cancelledCount = rows.filter(
          (r) => r.appointment_status === "cancelled",
        ).length;

        return (
          <div className="fade-in" style={{ padding: "20px 16px 24px" }}>
            <div
              style={{
                display: "flex",
                justifyContent: "space-between",
                alignItems: "flex-start",
                marginBottom: 4,
                gap: 8,
                flexWrap: "wrap",
              }}
            >
              <div
                style={{
                  fontSize: 22,
                  fontWeight: 800,
                  color: T.white,
                  fontFamily: "'Outfit',sans-serif",
                }}
              >
                Appointments
              </div>
              <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                <button
                  onClick={triggerSync}
                  disabled={syncing}
                  title="Refresh from GHL"
                  style={{
                    display: "inline-flex",
                    alignItems: "center",
                    gap: 4,
                    padding: "8px 10px",
                    borderRadius: 10,
                    border: `1px solid ${T.border}`,
                    background: "transparent",
                    color: T.text,
                    fontSize: 13,
                    fontWeight: 700,
                    cursor: syncing ? "wait" : "pointer",
                    fontFamily: "inherit",
                    opacity: syncing ? 0.6 : 1,
                  }}
                >
                  <span
                    style={{
                      display: "inline-block",
                      animation: syncing ? "spin 0.8s linear infinite" : "none",
                    }}
                  >
                    ↻
                  </span>
                  {syncing ? "Syncing" : "Refresh"}
                </button>
                {onBook && (
                  <button
                    onClick={onBook}
                    style={{
                      display: "inline-flex",
                      alignItems: "center",
                      gap: 6,
                      padding: "8px 14px",
                      borderRadius: 10,
                      border: `1px solid ${T.accent}44`,
                      background: T.accentDim,
                      color: T.accent,
                      fontSize: 13,
                      fontWeight: 700,
                      cursor: "pointer",
                      fontFamily: "inherit",
                      whiteSpace: "nowrap",
                    }}
                  >
                    + New Appointment
                  </button>
                )}
              </div>
            </div>
            <div
              style={{
                fontSize: 12,
                color: T.dim,
                marginBottom: 18,
                display: "flex",
                alignItems: "center",
                gap: 10,
              }}
            >
              <span>{visible.length} scheduled</span>
              {cancelledCount > 0 && (
                <button
                  onClick={() => setShowCancelled((v) => !v)}
                  style={{
                    background: "transparent",
                    border: "none",
                    color: T.dim,
                    fontSize: 11,

                    padding: 0,
                    textDecoration: "underline",
                  }}
                >
                  {showCancelled ? "hide" : "show"} {cancelledCount} cancelled
                </button>

      const TRIAGE_RED = "#ef4444";

      function formatCurrency(n) {
        return "$" + (Number(n) || 0).toLocaleString();
      }

      function splitDiagnosis(text) {
        if (!text) return { head: "", body: "" };
        const i = text.indexOf(".");
        if (i < 0) return { head: text, body: "" };
        return { head: text.slice(0, i + 1), body: text.slice(i + 1).trim() };
      }

      function TriageCard({ row, onOpen }) {
        const status = row.status_color;
        const isRed = status === "red";
        const isYellow = status === "yellow";
        const color = isRed
          ? TRIAGE_RED
          : isYellow
            ? TRIAGE_AMBER
            : TRIAGE_GREEN;
        const bgTint = isRed
          ? "rgba(239,68,68,0.07)"
          : isYellow
            ? "rgba(245,158,11,0.07)"
            : "rgba(16,185,129,0.05)";
        const pillLabel = isRed
          ? `${formatCurrency(row.floor_gap_dollars)} on the table`
          : isYellow
            ? `${formatCurrency(row.ceiling_upside_dollars)} upside`
            : null;
        const convPct = Math.round(Number(row.current_conversion_pct) || 0);
        const perfLine = `${row.ad_leads_count} ad leads → ${row.actual_sales} sales (${convPct}%). Should be ${row.floor_sales_target}+.`;

      function TriageView({
        rows,
        loading,
        error,
        onRefresh,
        onSelectLocation,
      }) {
        const [greenExpanded, setGreenExpanded] = useState(false);

        const reds = rows
          .filter((r) => r.status_color === "red")
          .sort(
            (a, b) =>
              (Number(b.floor_gap_dollars) || 0) -
              (Number(a.floor_gap_dollars) || 0),

        const yellows = rows

          setLoading(true);
          setError(null);
          try {
            const ids = accessibleLocations.map((l) => l.ghl_location_id);
            const { data, error: err } = await window.supabase.rpc(
              "territory_kpis",
              { p_ghl_location_ids: ids },
            );
            if (err) throw err;
            setRows(data || []);
          } catch (e) {
            console.error("territory_kpis failed:", e);
            setError(
              e && e.message ? e.message : "Failed to load territory data",
            );
          } finally {
            setLoading(false);
          }
        }, [accessibleLocations]);

        useEffect(() => {
          load();

        const totals = rows.reduce(
          (acc, r) => ({
            leads: acc.leads + (Number(r.leads) || 0),
            booked_appts: acc.booked_appts + (Number(r.booked_appts) || 0),
            showed: acc.showed + (Number(r.showed) || 0),
            no_showed: acc.no_showed + (Number(r.no_showed) || 0),

            revenue: acc.revenue + (Number(r.revenue) || 0),

            no_showed: 0,

      // ── Call Outcome Modal ──
      function CallOutcomeModal({ profile, onLogged }) {
        const [pending, setPending] = useState(() => readPendingCall());
        const [note, setNote] = useState("");
        const [submitting, setSubmitting] = useState(false);
        const [error, setError] = useState(null);

        useEffect(() => {
          const refresh = () => setPending(readPendingCall());
          refresh();
          const onFocus = () => refresh();
          const onVis = () => {
            if (document.visibilityState === "visible") refresh();
          };
          window.addEventListener("focus", onFocus);
          document.addEventListener("visibilitychange", onVis);
          return () => {
            window.removeEventListener("focus", onFocus);
            document.removeEventListener("visibilitychange", onVis);
          };
        }, []);

        if (!pending) return null;

        const submit = async (outcome) => {
          setSubmitting(true);
          setError(null);
          try {
            const { error: err } = await window.supabase
              .from("call_logs")
              .insert({
                ghl_location_id: pending.ghl_location_id,
                ghl_contact_id: pending.contactId,
                user_id: profile.id,
                outcome,
                notes: note.trim() ? note.trim() : null,
                called_at: new Date(pending.calledAt).toISOString(),
              });
            if (err) throw err;
            clearPendingCall();
            setPending(null);
            setNote("");
            setSubmitting(false);
            if (onLogged) onLogged();
          } catch (e) {
            console.error("call_logs insert failed:", e);
            setError(e && e.message ? e.message : "Failed to log call");
            setSubmitting(false);
          }
        };

        const outcomes = [
          {
            key: "connected_booked",
            icon: "📞",
            label: "Connected — booked appointment",
          },
          {
            key: "connected_not_booked",
            icon: "💬",
            label: "Connected — didn't book",
          },
          { key: "no_answer", icon: "📵", label: "No answer (no voicemail)" },
          { key: "left_voicemail", icon: "🎙️", label: "Left voicemail" },
          { key: "wrong_number", icon: "❌", label: "Wrong number" },
          { key: "skipped", icon: "↩️", label: "Skip / didn't actually call" },
        ];

        return (
          <div
            style={{
              position: "fixed",
              inset: 0,
              zIndex: 300,
              background: "rgba(0,0,0,0.75)",
              backdropFilter: "blur(6px)",
              WebkitBackdropFilter: "blur(6px)",
              display: "flex",
              alignItems: "flex-end",
              justifyContent: "center",
              padding: "20px 16px",
            }}
          >
            <div
              className="fade-in"
              style={{
                width: "100%",
                maxWidth: 448,
                background: T.surface,
                border: `1px solid ${T.border}`,
                borderRadius: 18,
                padding: 20,
                display: "flex",
                flexDirection: "column",
                gap: 10,
                maxHeight: "90vh",
                overflowY: "auto",
              }}
            >
              <div
                style={{
                  fontSize: 11,
                  fontWeight: 700,
                  letterSpacing: "0.1em",
                  textTransform: "uppercase",
                  color: T.dim,
                }}
              >
                Log your call
              </div>
              <div
                style={{
                  fontSize: 18,
                  fontWeight: 800,
                  color: T.white,
                  fontFamily: "'Outfit',sans-serif",
                  lineHeight: 1.3,
                  marginBottom: 4,

      // ── Book Appointment Modal ──
      function getTzOffsetString(dateStr, timeStr, tz) {
        const safeTz = tz || "America/Chicago";
        try {
          const sample = new Date(`${dateStr}T${timeStr}:00`);
          const dtf = new Intl.DateTimeFormat("en-US", {
            timeZone: safeTz,
            hour12: false,
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          });
          const parts = dtf.formatToParts(sample);
          const get = (t) => parts.find((p) => p.type === t)?.value;
          const naiveMs = Date.UTC(
            parseInt(get("year"), 10),
            parseInt(get("month"), 10) - 1,
            parseInt(get("day"), 10),
            parseInt(get("hour"), 10),
            parseInt(get("minute"), 10),
            parseInt(get("second"), 10),
          );
          const diffMin = Math.round((naiveMs - sample.getTime()) / 60000);
          const sign = diffMin >= 0 ? "+" : "-";
          const a = Math.abs(diffMin);
          return `${sign}${String(Math.floor(a / 60)).padStart(2, "0")}:${String(a % 60).padStart(2, "0")}`;
        } catch {
          return "-05:00";
        }
      }

      function defaultBookingSlot() {
        const d = new Date(Date.now() + 30 * 60 * 1000);
        const m = d.getMinutes();
        if (m !== 0) {
          if (m <= 30) d.setMinutes(30, 0, 0);
          else {
            d.setMinutes(0, 0, 0);
            d.setHours(d.getHours() + 1);
          }
        }
        const pad = (n) => String(n).padStart(2, "0");
        return {
          date: `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`,
          time: `${pad(d.getHours())}:${pad(d.getMinutes())}`,
        };
      }

      function BookAppointmentModal({
        profile,

        accessibleLocations,

        const [dateTime, setDateTime] = useState(() => defaultBookingSlot());

        const [team, setTeam] = useState([]);
        const [assignedUserId, setAssignedUserId] = useState(null);

        // Load team for assigned-to dropdown
        useEffect(() => {
          let mounted = true;
          (async () => {
            try {
              const { data } = await window.supabase.rpc("location_team_kpis", {
                p_ghl_location_id: selectedLocationId,
              });
              if (!mounted) return;
              setTeam(data || []);
              // Default assignment
              const myGhl = profile.ghl_user_id;
              if (myGhl) {
                setAssignedUserId(myGhl);
              } else {
                // fallback: first manager at this location with a ghl_user_id
                const mgr = (data || []).find(
                  (t) => t.role === "manager" && t.ghl_user_id,
                );
                if (mgr) setAssignedUserId(mgr.ghl_user_id);
                else {
                  const anyRep = (data || []).find((t) => t.ghl_user_id);
                  if (anyRep) setAssignedUserId(anyRep.ghl_user_id);
                }
              }
            } catch (e) {
              console.error("team fetch failed:", e);
            }
          })();
          return () => {
            mounted = false;
          };
        }, [selectedLocationId, profile.ghl_user_id]);

        // Debounced contact search (skip if already have contact selected)
        useEffect(() => {
          if (contact || !query || query.trim().length < 2) {
            setResults([]);
            return;
          }
          let cancelled = false;
          const t = setTimeout(async () => {
            setSearching(true);
            try {
              const q = query.trim();
              const { data, error: err } = await window.supabase
                .from("contacts")
                .select(
                  "ghl_contact_id, full_name, first_name, last_name, phone",
                )
                .eq("ghl_location_id", selectedLocationId)
                .ilike("full_name", `%${q}%`)
                .order("last_activity", { ascending: false, nullsFirst: false })
                .limit(15);
              if (cancelled) return;
              if (err) throw err;
              setResults(data || []);
            } catch (e) {
              console.error("contact search failed:", e);
              if (!cancelled) setResults([]);
            } finally {
              if (!cancelled) setSearching(false);
            }
          }, 300);
          return () => {
            cancelled = true;
            clearTimeout(t);
          };
        }, [query, selectedLocationId, contact]);

        const canSubmit =
          !!contact &&
          !!dateTime.date &&
          !!dateTime.time &&
          !!assignedUserId &&
          !submitting;

        const submit = async () => {
          setSubmitting(true);
          setError(null);
          try {
            const offset = getTzOffsetString(
              dateTime.date,
              dateTime.time,
              locTz,
            );
            const startIso = `${dateTime.date}T${dateTime.time}:00${offset}`;
            const startMs = new Date(startIso).getTime();
            const endMs = startMs + duration * 60000;
            const endIso = new Date(endMs).toISOString();

            const { data: session } = await window.supabase.auth.getSession();
            const jwt = session?.session?.access_token;
            if (!jwt) throw new Error("Not signed in");

            const res = await fetch(
              "https://rgpfzactcqbvadthzsgx.supabase.co/functions/v1/ghl-book-appointment",
              {
                method: "POST",
                headers: {
                  Authorization: `Bearer ${jwt}`,
                  "Content-Type": "application/json",

                body: JSON.stringify({
                  ghl_location_id: selectedLocationId,
                  ghl_contact_id: contact.ghl_contact_id,
                  start_time: startIso,
                  end_time: endIso,
                  assigned_user_id: assignedUserId,
                }),
              },
            );
            const body = await res.json().catch(() => ({}));
            if (!res.ok || !body.ok) {
              throw new Error(body?.error || `HTTP ${res.status}`);

            if (onBooked) {
              onBooked({
                event: body.event,
                contactName: contact.full_name,
                date: dateTime.date,
                time: dateTime.time,

                      {contact.phone && (

                    <button

                      style={{

              </div>

              <div style={{ display: "flex", gap: 10 }}>

                  <label style={fieldLabel}>Date</label>
                  <input

                      .filter((t) => t.ghl_user_id)

                      ? `linear-gradient(135deg,${T.accent},${T.blue})`
                      : T.muted,

                    letterSpacing: "0.04em",

                    fontFamily: "'Outfit',sans-serif",

                  {submitting ? "Booking…" : "Book Appointment"}
                </button>
              </div>
            </div>
          </div>
        );

      // ── Rep Personal Dashboard + Team Section ──
      const AIRA_STANDARDS = {
        minShows: 15,
        minSales: 15,
        minShowRate: 60,
        minCloseRate: 70,
      };

      function firstNameOf(fullName) {
        return (fullName || "").split(/\s+/)[0] || fullName || "";
      }

      function RepPersonalDashboard({
        userId,
        userName,
        isSelf,
        selectedLocationId,
        callLogVersion,
        onClose,
        onGoToLeads,
      }) {
        const [kpis, setKpis] = useState(null);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);

        const load = useCallback(async () => {
          if (!userId || !selectedLocationId) return;
          setLoading(true);
          setError(null);
          try {
            const { data, error: err } = await window.supabase.rpc(
              "rep_personal_kpis",
              {
                p_user_id: userId,
                p_ghl_location_id: selectedLocationId,
              },
            );
            if (err) throw err;
            setKpis(
              (data && data[0]) || {
                calls_today: 0,
                calls_today_connected: 0,
                calls_this_month: 0,
                calls_this_month_connected: 0,
                appointments: 0,
                showed: 0,
                no_showed: 0,
                cancelled: 0,
                sales: 0,
                revenue: 0,
                show_rate: 0,
                close_rate: 0,
              },
            );
          } catch (e) {
            console.error("rep_personal_kpis failed:", e);
            setError(e && e.message ? e.message : "Failed to load rep data");
          } finally {
            setLoading(false);
          }
          // eslint-disable-next-line
        }, [userId, selectedLocationId, callLogVersion]);

        useEffect(() => {
          load();
        }, [load]);

        const k = kpis || {};
        const callsToday = Number(k.calls_today) || 0;
        const callsTodayConnected = Number(k.calls_today_connected) || 0;
        const callsMonth = Number(k.calls_this_month) || 0;
        const appts = Number(k.appointments) || 0;
        const showed = Number(k.showed) || 0;
        const noShowed = Number(k.no_showed) || 0;
        const sales = Number(k.sales) || 0;
        const revenue = Number(k.revenue) || 0;
        const showRate = Number(k.show_rate) || 0;
        const closeRate = Number(k.close_rate) || 0;
        const monthLabel = new Date()
          .toLocaleDateString("en-US", { month: "long", year: "numeric" })
          .toUpperCase();
        const showRateColor =
          showRate >= AIRA_STANDARDS.minShowRate
            ? T.accent
            : showRate < 40
              ? T.red
              : T.yellow;
        const closeRateColor =
          closeRate >= AIRA_STANDARDS.minCloseRate
            ? T.accent
            : closeRate < 40
              ? T.red
              : T.yellow;
        const headingName = isSelf
          ? `${firstNameOf(userName)}'s Performance`
          : `${userName || "—"} · Rep Drill`;
        const isEmpty =
          !loading &&
          !error &&
          callsToday === 0 &&
          callsMonth === 0 &&
          appts === 0 &&
          showed === 0 &&
          sales === 0;

        return (

                  padding: "4px 0",

              <div

                  fontSize: 11,
                  fontWeight: 700,
                  letterSpacing: "0.1em",
                  textTransform: "uppercase",
                  color: T.dim,
                }}
              >
                {monthLabel}
              </div>
              <div
                style={{
                  fontSize: 22,
                  fontWeight: 800,
                  color: T.white,
                  fontFamily: "'Outfit',sans-serif",

                  borderRadius: 10,
                  background: T.redDim,

                    fontSize: 12,
                    fontWeight: 700,

      async function callEdgeFunction(path, body) {
        const { data: session } = await window.supabase.auth.getSession();
        const jwt = session?.session?.access_token;
        if (!jwt) throw new Error("Not signed in");
        const res = await fetch(
          `https://rgpfzactcqbvadthzsgx.supabase.co/functions/v1/${path}`,
          {
            method: "POST",
            headers: {
              Authorization: `Bearer ${jwt}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify(body || {}),
          },
        );
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          throw new Error(data.error || `HTTP ${res.status}`);
        }
        return data;
      }

      function AddEditLocationModal({ mode, location, onClose, onSaved }) {
        const isEdit = mode === "edit";
        const [name, setName] = useState(location?.name || "");
        const [ghlLocationId, setGhlLocationId] = useState(
          location?.ghl_location_id || "",
        );
        const [ghlApiKey, setGhlApiKey] = useState(location?.ghl_api_key || "");
        const [ghlCalendarId, setGhlCalendarId] = useState(
          location?.ghl_calendar_id || "",
        );
        const [timezone, setTimezone] = useState(
          location?.timezone || "America/Chicago",

        const [phone, setPhone] = useState(location?.phone || "");
        const [active, setActive] = useState(location?.active !== false);
        const [submitting, setSubmitting] = useState(false);
        const [error, setError] = useState(null);

        const canSubmit = name.trim() && ghlLocationId.trim() && !submitting;

        const submit = async () => {
          setSubmitting(true);
          setError(null);
          try {
            if (isEdit) {
              // Only include fields the admin actually changed. Blank optional
              // fields are treated as "keep existing" — sending an empty string
              // would NOT wipe the server value (the function strips empties),
              // but omitting them keeps the payload clean.
              const updates = { name: name.trim(), active };
              const maybe = {
                ghl_api_key: ghlApiKey.trim(),
                ghl_calendar_id: ghlCalendarId.trim(),
                timezone: timezone.trim(),
                phone: phone.trim(),
              };
              for (const [k, v] of Object.entries(maybe)) {
                if (v) updates[k] = v;
              }
              await callEdgeFunction("admin-update-location", {
                ghl_location_id: ghlLocationId.trim(),
                updates,
              });
            } else {
              await callEdgeFunction("admin-create-location", {
                ghl_location_id: ghlLocationId.trim(),
                name: name.trim(),
                ghl_api_key: ghlApiKey.trim() || undefined,
                ghl_calendar_id: ghlCalendarId.trim() || undefined,
                timezone: timezone.trim() || undefined,
                phone: phone.trim() || undefined,
                active,

      function AddEditPersonModal({
        mode,
        user,
        initialLocations,
        locations,
        staff,
        onClose,
        onSaved,
      }) {
        const isEdit = mode === "edit";
        const [email, setEmail] = useState(user?.email || "");
        const [fullName, setFullName] = useState(user?.full_name || "");
        const [role, setRole] = useState(user?.role || "sales_rep");
        const [active, setActive] = useState(
          isEdit ? user?.active !== false : true,
        );

        const initialSelected = useMemo(() => {
          if (!isEdit) return [];
          return (initialLocations || []).map((l) => l.ghl_location_id);
        }, [isEdit, initialLocations]);
        const initialPrimary = useMemo(() => {
          if (!isEdit) return "";
          const p = (initialLocations || []).find((l) => l.is_primary);
          return p ? p.ghl_location_id : "";
        }, [isEdit, initialLocations]);

        const [selectedLocs, setSelectedLocs] = useState(initialSelected);
        const [primaryLoc, setPrimaryLoc] = useState(initialPrimary);

        // Per-location ghl_staff link: { ghl_location_id: ghl_user_id | "" }
        const [links, setLinks] = useState({});

        // Initialize links when user/staff/email changes
        useEffect(() => {
          const next = {};
          selectedLocs.forEach((locId) => {
            // For edit: if user already has a ghl_user_id, prefill if that staff exists at this location
            if (isEdit && user?.ghl_user_id) {
              const hit = staff.find(
                (s) =>
                  s.ghl_location_id === locId &&
                  s.ghl_user_id === user.ghl_user_id,
              );
              if (hit) {
                next[locId] = hit.ghl_user_id;
                return;
              }
            }
            // Auto-match by email
            const emailLower = (email || "").trim().toLowerCase();
            if (emailLower) {
              const hit = staff.find(
                (s) =>
                  s.ghl_location_id === locId &&
                  (s.email || "").toLowerCase() === emailLower,
              );
              if (hit) {
                next[locId] = hit.ghl_user_id;
                return;
              }
            }
            next[locId] = "";
          });
          setLinks(next);
          // eslint-disable-next-line
        }, [selectedLocs.join("|"), email, isEdit, user?.ghl_user_id]);

        const toggleLoc = (ghlId) => {
          setSelectedLocs((prev) => {
            if (prev.includes(ghlId)) {
              const next = prev.filter((x) => x !== ghlId);
              if (primaryLoc === ghlId) setPrimaryLoc(next[0] || "");
              return next;
            }
            const next = [...prev, ghlId];
            if (!primaryLoc) setPrimaryLoc(ghlId);
            return next;
          });
        };

        const [submitting, setSubmitting] = useState(false);
        const [error, setError] = useState(null);

        const canSubmit =
          email.trim() &&
          fullName.trim() &&
          role &&
          selectedLocs.length > 0 &&
          primaryLoc &&
          !submitting;

        const submit = async () => {
          setSubmitting(true);
          setError(null);
          try {
            const linksPayload = {};
            Object.entries(links).forEach(([k, v]) => {
              if (v) linksPayload[k] = v;
            });
            if (isEdit) {
              // Resolve ghl_user_id from primary link (fall back to any link)
              let resolvedGhl = linksPayload[primaryLoc] || null;
              if (!resolvedGhl) {
                for (const l of selectedLocs) {
                  if (linksPayload[l]) {
                    resolvedGhl = linksPayload[l];
                    break;
                  }
                }
              }
              await callEdgeFunction("admin-update-user", {
                user_id: user.id,
                updates: {
                  full_name: fullName.trim(),
                  role,
                  active,
                  ghl_user_id: resolvedGhl,
                },
                location_ghl_ids: selectedLocs,
                primary_location_ghl_id: primaryLoc,
              });
            } else {
              await callEdgeFunction("admin-invite-user", {
                email: email.trim(),
                full_name: fullName.trim(),
                role,
                location_ghl_ids: selectedLocs,
                primary_location_ghl_id: primaryLoc,
                links: linksPayload,
                redirect_to: window.location.origin + window.location.pathname,

            onSaved();

        const staffByLoc = {};

              justifyContent: "center",
              padding: "20px 16px",

          >
            <div

              style={{
                width: "100%",
                maxWidth: 480,
                background: T.surface,
                border: `1px solid ${T.border}`,
                borderRadius: 18,
                padding: 20,

              <div

              >
                <div
                  style={{
                    fontSize: 18,
                    fontWeight: 800,
                    color: T.white,
                    fontFamily: "'Outfit',sans-serif",
                  }}
                >
                  {isEdit ? "Edit Person" : "Add Person"}
                </div>
                <button
                  onClick={onClose}
                  disabled={submitting}
                  style={{
                    background: "transparent",
                    border: "none",
                    color: T.dim,
                    fontSize: 22,
                    cursor: submitting ? "not-allowed" : "pointer",
                    padding: 0,

              <div>

              </div>
              <div>
                <label style={fieldLabel}>Full name</label>
                <input
                  value={fullName}

              </div>
              <div>
                <label style={fieldLabel}>Role</label>
                <select

              <div>

                  {locations.map((l) => {

                      No locations yet — add one on the Locations tab first.

              </div>

              {selectedLocs.length > 1 && (
                <div>
                  <label style={fieldLabel}>Primary location</label>
                  <select
                    value={primaryLoc}

                    style={{ ...fieldInput, marginTop: 6 }}

                    {selectedLocs.map((ghlId) => {
                      const loc = locations.find(

              {selectedLocs.length > 0 && (
                <div
                  style={{
                    padding: "12px 14px",

                    background: T.card,
                    border: `1px solid ${T.border}`,
                    display: "flex",
                    flexDirection: "column",
                    gap: 10,
                  }}
                >
                  <div
                    style={{
                      fontSize: 10,

                    }}

                  {selectedLocs.map((ghlId) => {

                          <strong style={{ color: T.text }}>
                            {loc?.name || ghlId}

                        </div>
                        <select
                          value={links[ghlId] || ""}
                          onChange={(e) =>
                            setLinks((prev) => ({

              {isEdit && (
                <label

                    cursor: "pointer",

              {error && (
                <div
                  style={{
                    padding: "10px 12px",

      function relativeTime(iso) {
        if (!iso) return "never";
        const diff = Date.now() - new Date(iso).getTime();
        if (diff < 0) return new Date(iso).toLocaleString();
        const mins = Math.round(diff / 60000);
        if (mins < 1) return "just now";
        if (mins < 60) return `${mins}m ago`;
        const hours = Math.round(mins / 60);
        if (hours < 24) return `${hours}h ago`;
        const days = Math.round(hours / 24);
        return `${days}d ago`;
      }

      function AdminHealthTab({ profile, onChanged }) {
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [syncingAll, setSyncingAll] = useState(false);
        const [syncReport, setSyncReport] = useState(null);
        const [snapshot, setSnapshot] = useState(null);

        const load = useCallback(async () => {
          setLoading(true);
          setError(null);
          try {
            const [
              locsRes,
              usersRes,
              staffRes,
              contactsCount,
              oppsCount,
              apptsCount,
              stagesCount,
              syncLogRes,
              userLocsRes,
            ] = await Promise.all([
              window.supabase
                .from("locations")
                .select(
                  "id, ghl_location_id, name, active, ghl_api_key, ghl_calendar_id, pipeline_id, last_synced_at",
                ),
              window.supabase
                .from("users")
                .select("id, role, ghl_user_id, active"),
              window.supabase.from("ghl_staff").select("ghl_user_id"),
              window.supabase
                .from("contacts")
                .select("*", { count: "exact", head: true }),
              window.supabase
                .from("opportunities")
                .select("*", { count: "exact", head: true }),
              window.supabase
                .from("appointments")
                .select("*", { count: "exact", head: true }),
              window.supabase
                .from("pipeline_stages")
                .select("*", { count: "exact", head: true }),
              window.supabase
                .from("sync_log")
                .select(
                  "id, sync_type, status, ghl_location_id, started_at, completed_at, error_message, metadata",
                )
                .order("started_at", { ascending: false, nullsFirst: false })
                .limit(20),
              window.supabase
                .from("user_locations")
                .select("user_id, location_id, is_primary"),
            ]);
            if (locsRes.error) throw locsRes.error;
            if (usersRes.error) throw usersRes.error;
            if (staffRes.error) throw staffRes.error;
            if (syncLogRes.error) throw syncLogRes.error;
            if (userLocsRes.error) throw userLocsRes.error;

            const locs = locsRes.data || [];
            const users = usersRes.data || [];
            const staff = staffRes.data || [];
            const userLocs = userLocsRes.data || [];

            // Data integrity checks
            const warnings = [];
            const staffIds = new Set(staff.map((s) => s.ghl_user_id));
            users
              .filter((u) => u.active && u.ghl_user_id)
              .forEach((u) => {
                if (!staffIds.has(u.ghl_user_id)) {
                  warnings.push({
                    severity: "error",
                    text: `User ${u.id.slice(0, 8)} has ghl_user_id "${u.ghl_user_id}" not found in ghl_staff cache`,
                  });
                }
              });
            locs
              .filter((l) => l.active)
              .forEach((l) => {
                if (!l.ghl_api_key) {
                  warnings.push({
                    severity: "error",
                    text: `${l.name}: missing ghl_api_key — syncs will skip this location`,
                  });
                }
                if (!l.ghl_calendar_id) {
                  warnings.push({
                    severity: "warning",
                    text: `${l.name}: no ghl_calendar_id — appointments sync disabled`,
                  });
                }
                if (!l.pipeline_id) {
                  warnings.push({
                    severity: "warning",
                    text: `${l.name}: no pipeline_id — opportunity KPIs will be zero until first sync`,
                  });
                }
              });
            const userLocUserIds = new Set(userLocs.map((ul) => ul.user_id));
            users
              .filter((u) => u.active && u.role !== "admin")
              .forEach((u) => {
                if (!userLocUserIds.has(u.id)) {
                  warnings.push({
                    severity: "warning",
                    text: `User ${u.id.slice(0, 8)} has no location assignments`,
                  });
                }
              });

            const roleCounts = users
              .filter((u) => u.active)
              .reduce((acc, u) => {
                acc[u.role] = (acc[u.role] || 0) + 1;
                return acc;
              }, {});
            const latestSync = locs
              .map((l) => l.last_synced_at)
              .filter(Boolean)
              .sort()
              .reverse()[0];

            setSnapshot({
              locations: {
                active: locs.filter((l) => l.active).length,
                total: locs.length,
                rows: locs,
              },
              users: {
                total: users.filter((u) => u.active).length,
                by_role: roleCounts,
              },
              staff_cached: staff.length,
              contacts: contactsCount.count || 0,
              opportunities: oppsCount.count || 0,
              appointments: apptsCount.count || 0,
              stages: stagesCount.count || 0,
              sync_log: syncLogRes.data || [],
              warnings,
              latestSync,
            });
          } catch (e) {
            setError(e && e.message ? e.message : "Failed to load health");
          } finally {
            setLoading(false);
          }
        }, []);

        useEffect(() => {
          load();
        }, [load]);

        const syncAll = async () => {
          setSyncingAll(true);
          setSyncReport(null);
          try {
            const data = await callEdgeFunction("sync-ghl-to-cache", {});
            setSyncReport(data);
            await load();
            if (onChanged) onChanged();
          } catch (e) {
            setSyncReport({
              ok: false,
              error: e && e.message ? e.message : "Sync failed",
            });
          } finally {
            setSyncingAll(false);
          }
        };

        if (loading) {
          return (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <SkelBar w={"100%"} h={80} />
              <SkelBar w={"100%"} h={80} />
              <SkelBar w={"100%"} h={160} />
            </div>
          );
        }
        if (error) {
          return (
            <div
              style={{
                padding: "10px 12px",
                borderRadius: 8,
                background: T.redDim,
                border: `1px solid ${T.red}33`,
                color: T.red,
                fontSize: 12,
                fontWeight: 600,
              }}
            >
              {error}
            </div>
          );
        }
        if (!snapshot) return null;

        const byRoleText = Object.entries(snapshot.users.by_role)
          .map(([r, n]) => `${n} ${ROLE_LABEL_BY_VALUE[r] || r}`)
          .join(" · ");

        const statusColorFor = (s) =>
          s === "success"
            ? TRIAGE_GREEN
            : s === "failed"
              ? T.red
              : s === "skipped"
                ? T.muted
                : T.blue;

        return (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <div
              style={{
                display: "flex",
                justifyContent: "space-between",
                alignItems: "center",
              }}
            >
              <div
                style={{
                  fontSize: 16,
                  fontWeight: 800,
                  color: T.white,
                  fontFamily: "'Outfit',sans-serif",
                }}
              >
                Health
              </div>
              <button
                onClick={syncAll}
                disabled={syncingAll}
                style={{
                  padding: "8px 14px",
                  borderRadius: 10,
                  border: `1px solid ${T.accent}44`,
                  background: T.accentDim,
                  color: T.accent,
                  fontSize: 13,
                  fontWeight: 700,

      // ── Coaching Scorecard (Phase 10) ──
      const COACHING_METRICS = [
        { value: "close_rate", label: "Close rate", unit: "%" },
        { value: "show_rate", label: "Show rate", unit: "%" },
        { value: "appointment_rate", label: "Appointments", unit: "%" },
        { value: "adps", label: "ADPS ($)", unit: "$" },
        { value: "other", label: "Other", unit: "" },
      ];
      const COACHING_METRIC_LABEL = Object.fromEntries(
        COACHING_METRICS.map((m) => [m.value, m.label]),
      );
      const COACHING_METRIC_UNIT = Object.fromEntries(
        COACHING_METRICS.map((m) => [m.value, m.unit]),
      );

      function formatCoachingMetric(value, metric) {
        if (value === null || value === undefined) return "—";
        const n = Number(value);
        if (!Number.isFinite(n)) return "—";
        const unit = COACHING_METRIC_UNIT[metric] || "";
        if (unit === "%") return `${Math.round(n)}%`;
        if (unit === "$") return `$${Math.round(n)}`;
        return String(Math.round(n));
      }

      const COACHING_VERDICT_STYLE = {
        metric_moved_dollars_up: {
          emoji: "✅",
          border: TRIAGE_GREEN,
          tint: "rgba(16,185,129,0.08)",
          color: TRIAGE_GREEN,
          headline: "Coaching worked",
        },
        metric_moved_dollars_flat: {
          emoji: "🟡",
          border: TRIAGE_AMBER,
          tint: "rgba(245,158,11,0.08)",
          color: TRIAGE_AMBER,
          headline: "Metric improved, dollars didn't",
        },
        metric_flat_dollars_up: {
          emoji: "🟡",
          border: TRIAGE_AMBER,
          tint: "rgba(245,158,11,0.08)",
          color: TRIAGE_AMBER,
          headline: "Dollars recovered, but not from what you coached",
        },
        no_change: {
          emoji: "⚪",
          border: T.borderLight,
          tint: "transparent",
          color: T.dim,
          headline: "No material change",
        },
        worse: {
          emoji: "🔴",
          border: TRIAGE_RED,
          tint: "rgba(239,68,68,0.08)",
          color: TRIAGE_RED,
          headline: "Got worse",
        },
      };

      function coachingReviewBody(result) {
        const metric = result.focus_metric;
        const metricLabel = COACHING_METRIC_LABEL[metric] || metric;
        const baseline = formatCoachingMetric(
          result.baseline_metric_value,
          metric,
        );
        const current = formatCoachingMetric(
          result.current_metric_value,
          metric,
        );
        const dollarsRecovered = Math.round(
          Number(result.dollars_recovered) || 0,
        );
        const currentDollars = Math.round(
          Number(result.current_dollars_on_table) || 0,
        );
        const recoveredStr = `$${Math.abs(dollarsRecovered).toLocaleString()}`;
        const onTableStr = `$${currentDollars.toLocaleString()}`;
        switch (result.verdict) {
          case "metric_moved_dollars_up":
            return `${metricLabel}: ${baseline} → ${current} · Dollars recovered: ${recoveredStr}`;
          case "metric_moved_dollars_flat":
            return `${metricLabel}: ${baseline} → ${current}, but dollars-on-the-table still ${onTableStr}. Something else is leaking — look at the next Rule-of-3 step.`;
          case "metric_flat_dollars_up":
            return `You coached ${metricLabel} (${baseline} → ${current}, flat). Dollars recovered ${recoveredStr} anyway — good outcome, wrong diagnosis.`;
          case "worse":
            return `${metricLabel}: ${baseline} → ${current}. Needs a different approach.`;
          case "no_change":
          default:
            return metric === "other"
              ? `Dollars-on-the-table: ${onTableStr}. No material change.`
              : `${metricLabel}: ${baseline} → ${current}. Try a different diagnosis?`;
        }
      }

      function CoachingSection({
        selectedLocationId,

        const [sessions, setSessions] = useState([]);
        const [results, setResults] = useState({});
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [modalOpen, setModalOpen] = useState(false);
        const [defaultMetric, setDefaultMetric] = useState("close_rate");
        const [defaultFranchiseeName, setDefaultFranchiseeName] = useState("");
        const [dismissingId, setDismissingId] = useState(null);
        const [version, setVersion] = useState(0);

        const location = accessibleLocations.find(
          (l) => l.ghl_location_id === selectedLocationId,
        );
        const locationName = location?.name || "";

        // Load all non-dismissed sessions for this location + this coach (or any, if admin)
        const load = useCallback(async () => {
          if (!selectedLocationId || !location?.id) return;
          setLoading(true);
          setError(null);
          try {
            const { data: sess, error: err } = await window.supabase
              .from("coaching_sessions")
              .select("*")
              .eq("location_id", location.id)
              .is("dismissed_at", null)
              .order("coached_on", { ascending: false });
            if (err) throw err;
            const list = sess || [];
            setSessions(list);
            // Fetch result for sessions whose review is due
            const dueSessions = list.filter(
              (s) => new Date(s.review_due_at).getTime() <= Date.now(),
            );
            const nextResults = {};
            await Promise.all(
              dueSessions.map(async (s) => {
                try {
                  const { data: r } = await window.supabase.rpc(
                    "coaching_session_result",
                    { p_session_id: s.id },
                  );
                  if (r && r[0]) nextResults[s.id] = r[0];
                } catch (e) {
                  console.warn("coaching_session_result failed:", e);
                }
              }),
            );
            setResults(nextResults);

            // Try to pre-fill franchisee name from the team
            try {
              const { data: team } = await window.supabase.rpc(
                "location_team_kpis",
                { p_ghl_location_id: selectedLocationId },
              );
              const franchisee = (team || []).find(
                (t) => t.role === "franchisee",
              );
              if (franchisee) {
                setDefaultFranchiseeName(franchisee.full_name || "");
              }
            } catch (e) {
              /* noop */
            }
          } catch (e) {
            setError(e && e.message ? e.message : "Failed to load coaching");
          } finally {
            setLoading(false);
          }
          // eslint-disable-next-line
        }, [selectedLocationId, location?.id, version]);

        useEffect(() => {
          load();
        }, [load]);

        const dismiss = async (sessionId) => {
          setDismissingId(sessionId);
          try {
            const { error: err } = await window.supabase
              .from("coaching_sessions")
              .update({ dismissed_at: new Date().toISOString() })
              .eq("id", sessionId);
            if (err) throw err;
            setVersion((v) => v + 1);
          } catch (e) {
            if (onToast) {
              onToast({
                kind: "error",
                text: `Dismiss failed: ${e.message || e}`,
              });
            }
          } finally {
            setDismissingId(null);
          }
        };

        const openLog = (prefillMetric) => {
          if (prefillMetric) setDefaultMetric(prefillMetric);
          setModalOpen(true);
        };

        const onLogged = (resp) => {
          if (onToast) {
            onToast({
              kind: "success",
              text: "Logged. Check back in 7 days to see if it worked.",
            });
          }
          setVersion((v) => v + 1);
        };

        const dueSessions = sessions.filter(
          (s) => new Date(s.review_due_at).getTime() <= Date.now(),
        );
        const upcoming = sessions.filter(
          (s) => new Date(s.review_due_at).getTime() > Date.now(),
        );

        const canLog = profile.role === "vp" || profile.role === "admin";
        if (!canLog) return null;

        return (
          <div style={{ padding: "20px 16px 0" }}>
            {error && (
              <div
                style={{
                  padding: "10px 12px",
                  borderRadius: 8,
                  background: T.redDim,
                  border: `1px solid ${T.red}33`,
                  color: T.red,
                  fontSize: 12,
                  fontWeight: 600,
                  marginBottom: 10,
                }}
              >
                {error}
              </div>
            )}
            {!loading &&
              dueSessions.map((s) => {
                const result = results[s.id];
                if (!result) return null;
                return (
                  <CoachingReviewCard
                    key={s.id}
                    session={s}
                    result={result}
                    franchiseeName={s.franchisee_name}
                    onDismiss={() => dismiss(s.id)}
                    onFollowUp={(metric) => openLog(metric)}
                    dismissing={dismissingId === s.id}
                  />
                );
              })}
            {upcoming.length > 0 && (
              <div
                style={{
                  padding: "10px 12px",
                  borderRadius: 10,
                  background: T.card,
                  border: `1px solid ${T.border}`,
                  color: T.dim,
                  fontSize: 11,
                  fontWeight: 600,
                  marginBottom: 10,
                  lineHeight: 1.4,
                }}
              >
                🕒 {upcoming.length} coaching session
                {upcoming.length === 1 ? "" : "s"} awaiting 7-day review.
              </div>
            )}
            <button
              onClick={() => openLog()}
              style={{
                width: "100%",
                padding: "14px 18px",
                borderRadius: 12,
                border: `1px solid ${T.accent}33`,
                background: T.accentDim,
                color: T.accent,
                fontSize: 14,
                fontWeight: 800,
                letterSpacing: "0.02em",
                cursor: "pointer",
                fontFamily: "inherit",
                marginBottom: 4,
              }}
            >
              📣 I coached this today
            </button>
            {modalOpen && (
              <LogCoachingModal
                selectedLocationId={selectedLocationId}
                locationName={locationName}
                defaultMetric={defaultMetric}
                defaultFranchiseeName={defaultFranchiseeName}
                onClose={() => setModalOpen(false)}
                onLogged={onLogged}
              />
            )}
          </div>
        );
      }

      // ── Authenticated App ──
      function AuthenticatedApp({
        profile,
        accessibleLocations,
        selectedLocationId,
        setSelectedLocationId,
        onLogout,
      }) {
        const [screen, setScreen] = useState("dashboard");
        const [selectedLead, setSelectedLead] = useState(null);
        const [settingsOpen, setSettingsOpen] = useState(false);
        const [adminOpen, setAdminOpen] = useState(false);
        const [coachingOpen, setCoachingOpen] = useState(false);
        const [pickerOpen, setPickerOpen] = useState(false);
        const [viewMode, setViewModeState] = useState(() => {
          if (accessibleLocations.length <= 1) return "location";
          const stored = localStorage.getItem("aira_view_mode");
          if (
            stored === "location" ||
            stored === "territory" ||
            stored === "triage"
          )
            return stored;
          return "territory";
        });
        const [previousViewMode, setPreviousViewMode] = useState(null);
        const setViewMode = useCallback((mode) => {
          localStorage.setItem("aira_view_mode", mode);
          setViewModeState(mode);
        }, []);

        // Call-log version: incremented whenever a call is logged, drives refetch
        const [callLogVersion, setCallLogVersion] = useState(0);
        const bumpCallLogVersion = useCallback(
          () => setCallLogVersion((v) => v + 1),
          [],
        );

        // Manager drill-down into a specific rep's personal dashboard
        const [drilledRep, setDrilledRep] = useState(null);
        const isSalesRep = profile.role === "sales_rep";

        // Booking modal
        const [bookingOpen, setBookingOpen] = useState(false);
        const [bookingContact, setBookingContact] = useState(null);
        const [bookingInitialQuery, setBookingInitialQuery] = useState("");
        const [toast, setToast] = useState(null);
        const openBooking = useCallback(({ contact, query } = {}) => {
          setBookingContact(contact || null);
          setBookingInitialQuery(query || "");
          setBookingOpen(true);
        }, []);
        const handleBooked = useCallback(
          ({ contactName, date, time }) => {
            setToast({
              kind: "success",
              text: `Appointment booked for ${contactName} on ${date} at ${time}`,
            });
            bumpCallLogVersion();
            setTimeout(() => setToast(null), 4500);
          },
          [bumpCallLogVersion],
        );

        // Triage data (multi-location only)
        const [triageRows, setTriageRows] = useState([]);
        const [triageLoading, setTriageLoading] = useState(
          accessibleLocations.length > 1,
        );
        const [triageError, setTriageError] = useState(null);
        const [triageReconciled, setTriageReconciled] = useState(false);

        const loadTriage = useCallback(async () => {
          if (accessibleLocations.length <= 1) {
            setTriageLoading(false);
            return;
          }
          setTriageLoading(true);
          setTriageError(null);
          try {
            const ids = accessibleLocations.map((l) => l.ghl_location_id);
            const { data: rows, error: err } = await window.supabase.rpc(
              "location_triage",
              { p_ghl_location_ids: ids },
            );
            if (err) throw err;
            setTriageRows(rows || []);
          } catch (e) {
            console.error("location_triage failed:", e);
            setTriageError(
              e && e.message ? e.message : "Failed to load triage data",
            );
          } finally {
            setTriageLoading(false);
          }
          // eslint-disable-next-line
        }, [accessibleLocations, callLogVersion]);

        useEffect(() => {
          loadTriage();
        }, [loadTriage]);

        const hasAnyRed = triageRows.some((r) => r.status_color === "red");

        // Reconcile stored viewMode with current red state once, after triage loads
        useEffect(() => {
          if (triageLoading || triageReconciled) return;
          if (accessibleLocations.length <= 1) {
            setTriageReconciled(true);
            return;
          }
          const stored = localStorage.getItem("aira_view_mode");
          let target;
          if (stored === "location") target = "location";
          else if (stored === "triage")
            target = hasAnyRed ? "triage" : "territory";
          else if (stored === "territory") target = "territory";
          else target = hasAnyRed ? "triage" : "territory";
          setViewModeState(target);
          localStorage.setItem("aira_view_mode", target);
          setTriageReconciled(true);
        }, [
          triageLoading,
          triageReconciled,
          hasAnyRed,
          accessibleLocations.length,
        ]);
        const data = getSeedData();
        const unreadCount = data.conversations.reduce(
          (s, c) => s + c.unread,
          0,
        );
        const hideLeaderboard = profile.role === "sales_rep";
        const firstName =
          (profile.full_name || profile.email || "User").split(/\s+/)[0] ||
          "User";
        const firstInitial = firstName[0] ? firstName[0].toUpperCase() : "?";
        const today = new Date().toLocaleDateString("en-US", {
          month: "long",
          day: "numeric",
          year: "numeric",
        });
        const currentLocation =
          accessibleLocations.find(
            (l) => l.ghl_location_id === selectedLocationId,
          ) || accessibleLocations[0];
        const shortLabel = currentLocation
          ? currentLocation.name.replace(/^Aira Fitness\s*/i, "") ||
            currentLocation.name
          : "—";
        const multi = accessibleLocations.length > 1;

        const openLocationFromOverview = (id) => {
          setPreviousViewMode(viewMode);
          setSelectedLocationId(id);
          setViewMode("location");
          setSelectedLead(null);
          setScreen("dashboard");
        };

        const renderScreen = () => {
          if (selectedLead)
            return (
              <LeadDetail
                lead={selectedLead}
                onBack={() => setSelectedLead(null)}
                selectedLocationId={selectedLocationId}
                onBook={() =>
                  openBooking({
                    query:
                      `${selectedLead.first || ""} ${selectedLead.last || ""}`.trim(),
                  })
                }
              />
            );
          let dashboardEl;
          if (isSalesRep) {
            dashboardEl = (
              <RepPersonalDashboard
                userId={profile.id}
                userName={profile.full_name || profile.email}
                isSelf={true}
                selectedLocationId={selectedLocationId}
                callLogVersion={callLogVersion}
                onGoToLeads={() => {
                  setScreen("leads");
                  setSelectedLead(null);
                }}
              />
            );
          } else if (viewMode === "triage" && multi) {
            dashboardEl = (
              <TriageView
                rows={triageRows}
                loading={triageLoading}
                error={triageError}
                onRefresh={loadTriage}
                onSelectLocation={openLocationFromOverview}
              />
            );
          } else if (viewMode === "territory" && multi) {
            dashboardEl = (
              <TerritoryDashboard
                accessibleLocations={accessibleLocations}
                onSelectLocation={openLocationFromOverview}
              />
            );
          } else {
            dashboardEl = (
              <>
                {(profile.role === "vp" || profile.role === "admin") && (
                  <CoachingSection
                    selectedLocationId={selectedLocationId}
                    profile={profile}
                    accessibleLocations={accessibleLocations}
                    callLogVersion={callLogVersion}
                    onToast={(t) => {
                      setToast(t);
                      setTimeout(() => setToast(null), 4500);
                    }}
                  />
                )}
                <DashboardScreen
                  hideLeaderboard={hideLeaderboard}
                  selectedLocationId={selectedLocationId}
                  callLogVersion={callLogVersion}
                />
                <div style={{ padding: "0 16px 24px" }}>
                  <TeamSection
                    selectedLocationId={selectedLocationId}
                    callLogVersion={callLogVersion}

          switch (screen) {

                  <div style={{ minWidth: 0, flex: 1 }}>
                    <div

                        color: T.white,

                      }}

                    </div>
                    <div
                      style={{
                        fontSize: 10,
                        color:

                        letterSpacing:
                          viewMode === "triage" || viewMode === "territory"

                        fontWeight:
                          viewMode === "triage" || viewMode === "territory"

                        textTransform:
                          viewMode === "triage" || viewMode === "territory"

                        gap: 4,

                      <span

                      {multi && viewMode === "location" && (
                        <span style={{ fontSize: 8, color: T.accent }}>▾</span>

                  </div>
                </button>
                <button
                  onClick={() => setSettingsOpen(true)}
                  style={{
                    display: "flex",
                    flexDirection: "column",
                    alignItems: "flex-end",
                    background: "transparent",
                    border: "none",

                    padding: 0,
                    gap: 3,
                    flexShrink: 0,
                  }}
                >
                  <div
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: 6,
                      padding: "4px 10px",
                      borderRadius: 8,
                      background: T.accentDim,
                      border: `1px solid ${T.accent}33`,
                    }}
                  >
                    <div
                      style={{
                        width: 16,
                        height: 16,
                        borderRadius: "50%",
                        background: T.accent,
                        color: T.bg,
                        fontSize: 9,
                        fontWeight: 800,
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                      }}
                    >
                      {firstInitial}
                    </div>
                    <span
                      style={{ fontSize: 12, fontWeight: 700, color: T.accent }}
