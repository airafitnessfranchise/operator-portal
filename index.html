          Booked: { bg: T.accentDim, text: T.accent },
          Confirmed: { bg: T.accentDim, text: T.accent },

          Sold: { bg: T.orangeDim, text: T.orange },

          "7DP Not Converted": { bg: T.redDim, text: T.red },
          Cancelled: { bg: T.redDim, text: T.red },
        };
        const c = colors[status] || { bg: T.muted, text: T.dim };
        return (
          <span
            style={{
              display: "inline-block",
              padding: "3px 10px",
              borderRadius: 6,

              fontWeight: 700,
              letterSpacing: "0.03em",
              background: c.bg,
              color: c.text,
            }}
          >

          </span>

      function ActionBtn({
        icon,
        label,
        href,
        onClick,
        color = T.accent,
        small,
      }) {
        const s = {
          display: "inline-flex",
          alignItems: "center",
          gap: 6,
          padding: small ? "8px 14px" : "10px 18px",
          borderRadius: 10,
          border: `1.5px solid ${color}33`,
          background: `${color}11`,
          color,
          fontSize: small ? 12 : 13,
          fontWeight: 600,
          cursor: "pointer",
          textDecoration: "none",
          transition: "all 0.15s",
          letterSpacing: "0.02em",
        };
        return href ? (
          <a href={href} style={s}>
            <span style={{ fontSize: small ? 14 : 16 }}>{icon}</span>
            {label}
          </a>
        ) : (
          <button onClick={onClick} style={s}>
            <span style={{ fontSize: small ? 14 : 16 }}>{icon}</span>
            {label}
          </button>
        );

      // ── Login Screen ──
      function LoginScreen() {
        const [email, setEmail] = useState("");
        const [password, setPassword] = useState("");
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState("");
        const [info, setInfo] = useState("");

        const handleLogin = async (e) => {
          e.preventDefault();
          if (!email || !password) return;
          setLoading(true);
          setError("");
          setInfo("");
          const { error: err } = await window.supabase.auth.signInWithPassword({
            email: email.trim(),
            password,
          });
          if (err) {
            setError("Invalid email or password");
            setLoading(false);
            return;
          }
          // success: leave loading true — onAuthStateChange will switch screens
        };

        const handleReset = async () => {
          if (!email) {
            setError("Enter your email first, then tap Forgot password.");
            return;
          }
          setLoading(true);
          setError("");
          setInfo("");
          const redirectTo = window.location.origin + window.location.pathname;
          const { error: err } =
            await window.supabase.auth.resetPasswordForEmail(email.trim(), {
              redirectTo,
            });
          setLoading(false);
          if (err) {
            setError(err.message || "Unable to send reset email.");
            return;
          }
          setInfo("Check your email for a reset link.");
        };

        return (
          <div
            style={{
              maxWidth: 480,
              margin: "0 auto",
              minHeight: "100vh",
              background: T.bg,
              padding: "60px 24px 40px",

              <input

              >

              <input

              {error && (

              )}
              {info && (

                type="submit"

                style={{
                  marginTop: 8,

                  border: "none",
                  background:

        const [pickerOpen, setPickerOpen] = useState(false);

          (s, c) => s + c.unread,
          0,
        );
        const hideLeaderboard = profile.role === "sales_rep";
        const firstName =
          (profile.full_name || profile.email || "User").split(/\s+/)[0] ||
          "User";
        const firstInitial = firstName[0] ? firstName[0].toUpperCase() : "?";
        const today = new Date().toLocaleDateString("en-US", {
          month: "long",
          day: "numeric",
          year: "numeric",
        });
        const currentLocation =
          accessibleLocations.find(
            (l) => l.ghl_location_id === selectedLocationId,
          ) || accessibleLocations[0];
        const shortLabel = currentLocation
          ? currentLocation.name.replace(/^Aira Fitness\s*/i, "") ||
            currentLocation.name
          : "—";

        const renderScreen = () => {
          if (selectedLead)
            return (
              <LeadDetail
                lead={selectedLead}
                onBack={() => setSelectedLead(null)}
              />
            );
          switch (screen) {
            case "dashboard":
              return (
                <DashboardScreen
                  data={data}
                  hideLeaderboard={hideLeaderboard}
                />
              );
            case "leads":
              return (
                <LeadsScreen data={data} onSelect={(l) => setSelectedLead(l)} />
              );
            case "conversations":
              return <ConversationsScreen data={data} />;
            case "appointments":
              return <AppointmentsScreen data={data} />;
            default:
              return (
                <DashboardScreen
                  data={data}
                  hideLeaderboard={hideLeaderboard}
                />
              );
          }

                onClose={() => setSettingsOpen(false)}
                onLogout={onLogout}
              />
            )}
          </div>
        );
      }

      // ── Root App with auth gate ──
      function App() {
        const [state, setState] = useState({ status: "loading" });

        const loadProfile = useCallback(async (session) => {
          try {
            const [
              { data: userRow, error: uerr },
              { data: ghlIds, error: rerr },
            ] = await Promise.all([
              window.supabase
                .from("users")
                .select("*")
                .eq("auth_user_id", session.user.id)
                .maybeSingle(),
              window.supabase.rpc("current_user_ghl_location_ids"),
            ]);
            if (uerr) console.error("users fetch error:", uerr);
            if (!userRow || !userRow.active) {
              setState({ status: "pending", email: session.user.email });
              return;
            }
            if (rerr) console.error("ghl ids rpc error:", rerr);
            const ids = ghlIds || [];
            if (ids.length === 0) {
              setState({ status: "no-locations", profile: userRow });
              return;
            }
            const { data: locs, error: lerr } = await window.supabase
              .from("locations")
              .select("id, ghl_location_id, name")
              .in("ghl_location_id", ids)
              .eq("active", true)
              .order("name");
            if (lerr) console.error("locations fetch error:", lerr);
            const locations = locs || [];
            if (locations.length === 0) {
              setState({ status: "no-locations", profile: userRow });
              return;
            }
            const stored = localStorage.getItem("aira_selected_location_id");
            const validStored =
              stored && locations.some((l) => l.ghl_location_id === stored);
            const selectedId = validStored
              ? stored
              : locations[0].ghl_location_id;
            localStorage.setItem("aira_selected_location_id", selectedId);
            setState({
              status: "ready",
              profile: userRow,
              locations,
              selectedLocationId: selectedId,
            });
          } catch (e) {
            console.error("loadProfile failed:", e);
            setState({ status: "login" });
          }
        }, []);

        useEffect(() => {
          let mounted = true;
          let unsub = () => {};
          const start = async () => {
            let tries = 0;
            while (!window.supabase && tries < 150) {
              await new Promise((r) => setTimeout(r, 30));
              tries++;
            }
            if (!mounted) return;
            if (!window.supabase) {
              setState({ status: "login" });
              return;
            }
            const {
              data: { session },
            } = await window.supabase.auth.getSession();
            if (!mounted) return;
            if (!session) setState({ status: "login" });
            else await loadProfile(session);
            const sub = window.supabase.auth.onAuthStateChange(
              (event, sess) => {
                if (!mounted) return;
                if (event === "SIGNED_OUT") {
                  localStorage.removeItem("aira_selected_location_id");
                  setState({ status: "login" });
                  return;
                }
                if (event === "SIGNED_IN" && sess) {
                  setState({ status: "loading" });
                  loadProfile(sess);
                }
              },
            );
            unsub = () => sub.data.subscription.unsubscribe();
          };
          start();
          return () => {
            mounted = false;
            unsub();
          };
        }, [loadProfile]);

        const handleLogout = async () => {
          localStorage.removeItem("aira_selected_location_id");
          try {
            await window.supabase.auth.signOut();
          } catch (e) {
            console.error(e);
          }
          setState({ status: "login" });
        };

        const setSelectedLocationId = (id) => {
          localStorage.setItem("aira_selected_location_id", id);
          setState((s) => ({ ...s, selectedLocationId: id }));
        };

        switch (state.status) {
          case "loading":
            return <Splash />;
          case "login":
            return <LoginScreen />;
          case "pending":
            return (
              <GateScreen
                title="Access Pending"
                body={`Your account (${state.email}) isn't set up yet. Contact your administrator to get access.`}
                onLogout={handleLogout}
              />
            );
          case "no-locations":
            return (
              <GateScreen
                title="No Locations Assigned"
                body="Your account isn't linked to any active locations yet. Contact your administrator."
                onLogout={handleLogout}
              />
            );
          case "ready":
            return (
              <AuthenticatedApp
                profile={state.profile}
                accessibleLocations={state.locations}
                selectedLocationId={state.selectedLocationId}
                setSelectedLocationId={setSelectedLocationId}
                onLogout={handleLogout}
              />
            );
          default:
            return <Splash />;
        }
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
