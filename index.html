      function AddEditPersonModal({
        mode,
        user,
        initialLocations,
        locations,
        staff,
        onClose,
        onSaved,
        onToast,
      }) {
        const isEdit = mode === "edit";
        const [email, setEmail] = useState(user?.email || "");
        const [fullName, setFullName] = useState(user?.full_name || "");
        const [role, setRole] = useState(user?.role || "sales_rep");
        const [active, setActive] = useState(
          isEdit ? user?.active !== false : true,
        );

        const initialSelected = useMemo(() => {
          if (!isEdit) return [];
          return (initialLocations || []).map((l) => l.ghl_location_id);
        }, [isEdit, initialLocations]);
        const initialPrimary = useMemo(() => {
          if (!isEdit) return "";
          const p = (initialLocations || []).find((l) => l.is_primary);
          return p ? p.ghl_location_id : "";
        }, [isEdit, initialLocations]);

        const [selectedLocs, setSelectedLocs] = useState(initialSelected);
        const [primaryLoc, setPrimaryLoc] = useState(initialPrimary);

        // Per-location ghl_staff link: { ghl_location_id: ghl_user_id | "" }
        const [links, setLinks] = useState({});

        // Initialize links when user/staff/email changes
        useEffect(() => {
          const next = {};
          selectedLocs.forEach((locId) => {
            // For edit: if user already has a ghl_user_id, prefill if that staff exists at this location
            if (isEdit && user?.ghl_user_id) {
              const hit = staff.find(
                (s) =>
                  s.ghl_location_id === locId &&
                  s.ghl_user_id === user.ghl_user_id,
              );
              if (hit) {
                next[locId] = hit.ghl_user_id;
                return;
              }
            }
            // Auto-match by email
            const emailLower = (email || "").trim().toLowerCase();
            if (emailLower) {
              const hit = staff.find(
                (s) =>
                  s.ghl_location_id === locId &&
                  (s.email || "").toLowerCase() === emailLower,
              );
              if (hit) {
                next[locId] = hit.ghl_user_id;
                return;
              }
            }
            next[locId] = "";
          });
          setLinks(next);
          // eslint-disable-next-line
        }, [selectedLocs.join("|"), email, isEdit, user?.ghl_user_id]);

        const toggleLoc = (ghlId) => {
          setSelectedLocs((prev) => {
            if (prev.includes(ghlId)) {
              const next = prev.filter((x) => x !== ghlId);
              if (primaryLoc === ghlId) setPrimaryLoc(next[0] || "");
              return next;
            }
            const next = [...prev, ghlId];
            if (!primaryLoc) setPrimaryLoc(ghlId);
            return next;
          });
        };

        const [submitting, setSubmitting] = useState(false);
        const [error, setError] = useState(null);

        const canSubmit =
          email.trim() &&
          fullName.trim() &&
          role &&
          selectedLocs.length > 0 &&
          primaryLoc &&
          !submitting;

        const submit = async () => {
          setSubmitting(true);
          setError(null);
          try {
            const linksPayload = {};
            Object.entries(links).forEach(([k, v]) => {
              if (v) linksPayload[k] = v;
            });
            if (isEdit) {
              // Resolve ghl_user_id from primary link (fall back to any link)
              let resolvedGhl = linksPayload[primaryLoc] || null;
              if (!resolvedGhl) {
                for (const l of selectedLocs) {
                  if (linksPayload[l]) {
                    resolvedGhl = linksPayload[l];
                    break;
                  }
                }
              }
              await callEdgeFunction("admin-update-user", {
                user_id: user.id,
                updates: {
                  full_name: fullName.trim(),
                  role,
                  active,
                  ghl_user_id: resolvedGhl,
                },
                location_ghl_ids: selectedLocs,
                primary_location_ghl_id: primaryLoc,
              });
              onSaved();
            } else {
              const resp = await callEdgeFunction("admin-invite-user", {
                email: email.trim(),
                full_name: fullName.trim(),
                role,
                location_ghl_ids: selectedLocs,
                primary_location_ghl_id: primaryLoc,
                links: linksPayload,
                redirect_to: window.location.origin + window.location.pathname,
              });
              if (resp?.relinked && onToast) {
                // Distinct "info" tone — this wasn't a fresh invite. The
                // admin needs to understand the auth record preexisted
                // and the user got a reset link, not a welcome invite.
                onToast({
                  kind: "info",
                  text: `Relinked existing account for ${email.trim()}. They'll receive a password reset email.`,
                });
              }
              onSaved();
            }
          } catch (e) {
            // Branch A from admin-invite-user: email belongs to a fully-
            // seated portal user. Keep the modal open so the admin can
            // fix the email or cancel, and surface the guidance as a
            // toast instead of an inline error banner.
            if (e && e.code === "already_portal_user") {
              if (onToast) {
                onToast({
                  kind: "info",
                  text: `${email.trim()} is already a portal user. Edit their row from the People list instead.`,
                });
              }
              setError(null);
              setSubmitting(false);
              return;
            }
            setError(e && e.message ? e.message : "Save failed");
            setSubmitting(false);
          }
        };

        const fieldLabel = {
          fontSize: 10,
          fontWeight: 500,
          letterSpacing: "0.12em",
          textTransform: "uppercase",
          color: T.textMuted,
        };
        const fieldInput = {
          padding: "12px 14px",
          borderRadius: 10,
          border: `0.5px solid ${T.border}`,
          background: T.surface,
          color: T.text,
          fontSize: 14,
          outline: "none",
          fontFamily: "inherit",
          width: "100%",
          boxSizing: "border-box",
        };

        const staffByLoc = {};
        staff.forEach((s) => {
          if (!staffByLoc[s.ghl_location_id])
            staffByLoc[s.ghl_location_id] = [];
          staffByLoc[s.ghl_location_id].push(s);
        });

        return (
          <div style={{ ...MODAL_BACKDROP, zIndex: 340 }}>
            <div className="fade-in" style={{ ...MODAL_CARD, maxWidth: 480 }}>
              <div
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                }}
              >
                <div style={MODAL_TITLE}>
                  {isEdit ? "Edit Person" : "Add Person"}
                </div>
                <button
                  onClick={onClose}
                  disabled={submitting}
                  style={MODAL_CLOSE(submitting)}
                >
                  ×
                </button>
              </div>

              <div>
                <label style={fieldLabel}>Email</label>
                <input
                  type="email"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  disabled={isEdit}
                  autoCapitalize="none"
                  autoCorrect="off"
                  placeholder="person@example.com"
                  style={{
                    ...fieldInput,
                    marginTop: 6,
                    opacity: isEdit ? 0.6 : 1,
                  }}
                />
              </div>
              <div>
                <label style={fieldLabel}>Full name</label>
                <input
                  value={fullName}
                  onChange={(e) => setFullName(e.target.value)}
                  placeholder="First Last"
                  style={{ ...fieldInput, marginTop: 6 }}
                />
              </div>
              <div>
                <label style={fieldLabel}>Role</label>
                <select
                  value={role}
                  onChange={(e) => setRole(e.target.value)}
                  style={{ ...fieldInput, marginTop: 6 }}
                >
                  {ROLE_OPTIONS.map((r) => (
                    <option key={r.value} value={r.value}>
                      {r.label}
                    </option>
                  ))}
                </select>
              </div>

              <div>
                <label style={fieldLabel}>Locations</label>
                <div
                  style={{
                    marginTop: 6,
                    display: "flex",
                    flexWrap: "wrap",
                    gap: 6,
                  }}
                >
                  {locations.map((l) => {
                    const on = selectedLocs.includes(l.ghl_location_id);
                    return (
                      <button
                        key={l.ghl_location_id}
                        onClick={() => toggleLoc(l.ghl_location_id)}
                        style={{
                          padding: "8px 12px",
                          borderRadius: 999,
                          border: `0.5px solid ${on ? T.airaBlue : T.border}`,
                          background: on ? T.airaBlueDim : T.surface,
                          color: on ? T.airaBlueDark : T.text,
                          fontSize: 12,
                          fontWeight: 500,
                          cursor: "pointer",
                          fontFamily: "inherit",
                          transition: "all 160ms ease",
                        }}
                      >
                        {on ? "✓ " : ""}
                        {l.name}
                      </button>
                    );
                  })}
                  {locations.length === 0 && (
                    <div style={{ fontSize: 12, color: T.textMuted }}>
                      No locations yet — add one on the Locations tab first.
                    </div>
                  )}
                </div>
              </div>

              {selectedLocs.length > 1 && (
                <div>
                  <label style={fieldLabel}>Primary location</label>
                  <select
                    value={primaryLoc}
                    onChange={(e) => setPrimaryLoc(e.target.value)}
                    style={{ ...fieldInput, marginTop: 6 }}
                  >
                    {selectedLocs.map((ghlId) => {
                      const loc = locations.find(
                        (l) => l.ghl_location_id === ghlId,
                      );
                      return (
                        <option key={ghlId} value={ghlId}>
                          {loc?.name || ghlId}
                        </option>
                      );
                    })}
                  </select>
                </div>
              )}

              {selectedLocs.length > 0 && (
                <div
                  className="surface-card"
                  style={{
                    padding: "12px 14px",
                    display: "flex",
                    flexDirection: "column",
                    gap: 10,
                    background: T.surfaceAlt,
                  }}
                >
                  <div
                    style={{
                      fontSize: 10,
                      fontWeight: 500,
                      letterSpacing: "0.12em",
                      textTransform: "uppercase",
                      color: T.textMuted,
                    }}
                  >
                    Link to existing GHL staff (optional)
                  </div>
                  {selectedLocs.map((ghlId) => {
                    const loc = locations.find(
                      (l) => l.ghl_location_id === ghlId,
                    );
                    const locStaff = staffByLoc[ghlId] || [];
                    return (
                      <div key={ghlId}>
                        <div
                          style={{
                            fontSize: 11,
                            color: T.textMuted,
                            marginBottom: 4,
                          }}
                        >
                          At{" "}
                          <strong style={{ color: T.text, fontWeight: 500 }}>
                            {loc?.name || ghlId}
                          </strong>
                        </div>
                        <select
                          value={links[ghlId] || ""}
                          onChange={(e) =>
                            setLinks((prev) => ({
                              ...prev,
                              [ghlId]: e.target.value,
                            }))
                          }
                          style={fieldInput}
                        >
                          <option value="">
                            (not linked — track via portal only)
                          </option>
                          {locStaff.map((s) => (
                            <option key={s.ghl_user_id} value={s.ghl_user_id}>
                              {s.full_name || "(no name)"} ·{" "}
                              {s.email || "(no email)"}
                            </option>
                          ))}
                        </select>
                      </div>
                    );
                  })}
                </div>
              )}

              {isEdit && (
                <label
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: 8,
                    fontSize: 13,
                    color: T.text,
                    cursor: "pointer",
                  }}
                >
                  <input
                    type="checkbox"
                    checked={active}
                    onChange={(e) => setActive(e.target.checked)}
                  />
                  Active (can log in)
                </label>
              )}

              {error && <ModalErrorBanner message={error} />}

              <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
                <button
                  onClick={onClose}
                  disabled={submitting}
                  className="btn-secondary"
                  style={{ flex: 1, padding: "12px" }}
                >
                  Cancel
                </button>
                <button
                  onClick={submit}
                  disabled={!canSubmit}
                  className="btn-primary"
                  style={{ flex: 2, padding: "12px" }}
                >
                  {submitting
                    ? "Saving…"
                    : isEdit
                      ? "Save Changes"
                      : "Add Person"}
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ── Admin Health Tab ──
      function HealthStatCard({ label, value, sub, status }) {
        let dotColor = null;
        if (status === "good") dotColor = T.green;
        else if (status === "warn") dotColor = T.amber;
        else if (status === "bad") dotColor = T.red;
        return (
          <div
            className="surface-card"
            style={{
              padding: "14px 16px",
              minHeight: 82,
              display: "flex",
              flexDirection: "column",
              gap: 8,
            }}
          >
            <div
              style={{
                fontSize: 10,
                fontWeight: 500,
                letterSpacing: "0.1em",
                textTransform: "uppercase",
                color: T.textMuted,
                display: "flex",
                alignItems: "center",
                gap: 6,
              }}
            >
              {dotColor && (
                <span
                  style={{
                    width: 6,
                    height: 6,
                    borderRadius: "50%",
                    background: dotColor,
                    flexShrink: 0,
                  }}
                />
              )}
              {label}
            </div>
            <div
              style={{
                fontSize: 24,
                fontWeight: 500,
                color: T.textHi,
                fontFamily: "'Outfit',sans-serif",
                lineHeight: 1.1,
                letterSpacing: "-0.02em",
              }}
            >
              {value}
            </div>
            {sub && (
              <div style={{ fontSize: 11, color: T.textMuted, marginTop: 2 }}>
                {sub}
              </div>
            )}
          </div>
        );
      }

      function relativeTime(iso) {
        if (!iso) return "never";
        const diff = Date.now() - new Date(iso).getTime();
        if (diff < 0) return new Date(iso).toLocaleString();
        const mins = Math.round(diff / 60000);
        if (mins < 1) return "just now";
        if (mins < 60) return `${mins}m ago`;
        const hours = Math.round(mins / 60);
        if (hours < 24) return `${hours}h ago`;
        const days = Math.round(hours / 24);
        return `${days}d ago`;
      }

      function AdminHealthTab({ profile, onChanged }) {
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [syncingAll, setSyncingAll] = useState(false);
        const [syncReport, setSyncReport] = useState(null);
        const [snapshot, setSnapshot] = useState(null);

        const load = useCallback(async () => {
          setLoading(true);
          setError(null);
          try {
            const [
              locsRes,
              usersRes,
              staffRes,
              contactsCount,
              oppsCount,
              apptsCount,
              stagesCount,
              syncLogRes,
              userLocsRes,
            ] = await Promise.all([
              window.supabase
                .from("locations")
                .select(
                  "id, ghl_location_id, name, active, ghl_api_key, ghl_calendar_id, pipeline_id, last_synced_at",
                ),
              window.supabase
                .from("users")
                .select("id, role, ghl_user_id, active"),
              window.supabase.from("ghl_staff").select("ghl_user_id"),
              window.supabase
                .from("contacts")
                .select("*", { count: "exact", head: true }),
              window.supabase
                .from("opportunities")
                .select("*", { count: "exact", head: true }),
              window.supabase
                .from("appointments")
                .select("*", { count: "exact", head: true }),
              window.supabase
                .from("pipeline_stages")
                .select("*", { count: "exact", head: true }),
              window.supabase
                .from("sync_log")
                .select(
                  "id, sync_type, status, ghl_location_id, started_at, completed_at, error_message, metadata",
                )
                .order("started_at", { ascending: false, nullsFirst: false })
                .limit(20),
              window.supabase
                .from("user_locations")
                .select("user_id, location_id, is_primary"),
            ]);
            if (locsRes.error) throw locsRes.error;
            if (usersRes.error) throw usersRes.error;
            if (staffRes.error) throw staffRes.error;
            if (syncLogRes.error) throw syncLogRes.error;
            if (userLocsRes.error) throw userLocsRes.error;

            const locs = locsRes.data || [];
            const users = usersRes.data || [];
            const staff = staffRes.data || [];
            const userLocs = userLocsRes.data || [];

            // Data integrity checks
            const warnings = [];
            const staffIds = new Set(staff.map((s) => s.ghl_user_id));
            users
              .filter((u) => u.active && u.ghl_user_id)
              .forEach((u) => {
                if (!staffIds.has(u.ghl_user_id)) {
                  warnings.push({
                    severity: "error",
                    text: `User ${u.id.slice(0, 8)} has ghl_user_id "${u.ghl_user_id}" not found in ghl_staff cache`,
                  });
                }
              });
            locs
              .filter((l) => l.active)
              .forEach((l) => {
                if (!l.ghl_api_key) {
                  warnings.push({
                    severity: "error",
                    text: `${l.name}: missing ghl_api_key — syncs will skip this location`,
                  });
                }
                if (!l.ghl_calendar_id) {
                  warnings.push({
                    severity: "warning",
                    text: `${l.name}: no ghl_calendar_id — appointments sync disabled`,
                  });
                }
                if (!l.pipeline_id) {
                  warnings.push({
                    severity: "warning",
                    text: `${l.name}: no pipeline_id — opportunity KPIs will be zero until first sync`,
                  });
                }
              });
            const userLocUserIds = new Set(userLocs.map((ul) => ul.user_id));
            users
              .filter((u) => u.active && u.role !== "admin")
              .forEach((u) => {
                if (!userLocUserIds.has(u.id)) {
                  warnings.push({
                    severity: "warning",
                    text: `User ${u.id.slice(0, 8)} has no location assignments`,
                  });
                }
              });

            const roleCounts = users
              .filter((u) => u.active)
              .reduce((acc, u) => {
                acc[u.role] = (acc[u.role] || 0) + 1;
                return acc;
              }, {});
            const latestSync = locs
              .map((l) => l.last_synced_at)
              .filter(Boolean)
              .sort()
              .reverse()[0];

            setSnapshot({
              locations: {
                active: locs.filter((l) => l.active).length,
                total: locs.length,
                rows: locs,
              },
              users: {
                total: users.filter((u) => u.active).length,
                by_role: roleCounts,
              },
              staff_cached: staff.length,
              contacts: contactsCount.count || 0,
              opportunities: oppsCount.count || 0,
              appointments: apptsCount.count || 0,
              stages: stagesCount.count || 0,
              sync_log: syncLogRes.data || [],
              warnings,
              latestSync,
            });
          } catch (e) {
            setError(e && e.message ? e.message : "Failed to load health");
          } finally {
            setLoading(false);
          }
        }, []);

        useEffect(() => {
          load();
        }, [load]);

        const syncAll = async () => {
          setSyncingAll(true);
          setSyncReport(null);
          try {
            const data = await callEdgeFunction("sync-ghl-to-cache", {});
            setSyncReport(data);
            await load();
            if (onChanged) onChanged();
          } catch (e) {
            setSyncReport({
              ok: false,
              error: e && e.message ? e.message : "Sync failed",
            });
          } finally {
            setSyncingAll(false);
          }
        };

        if (loading) {
          return (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <SkelBar w={"100%"} h={80} />
              <SkelBar w={"100%"} h={80} />
              <SkelBar w={"100%"} h={160} />
            </div>
          );
        }
        if (error) {
          return <ModalErrorBanner message={error} />;
        }
        if (!snapshot) return null;

        const byRoleText = Object.entries(snapshot.users.by_role)
          .map(([r, n]) => `${n} ${ROLE_LABEL_BY_VALUE[r] || r}`)
          .join(" · ");

        const statusDotFor = (s) =>
          s === "success"
            ? T.green
            : s === "failed"
              ? T.red
              : s === "skipped"
                ? T.textDim
                : T.airaBlue;

        return (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <div
              style={{
                display: "flex",
                justifyContent: "space-between",
                alignItems: "center",
              }}
            >
              <div
                style={{
                  fontSize: 16,
                  fontWeight: 500,
                  color: T.textHi,
                  fontFamily: "'Outfit',sans-serif",
                  letterSpacing: "-0.005em",
                }}
              >
                Health
              </div>
              <button
                className="btn-primary"
                onClick={syncAll}
                disabled={syncingAll}
                style={{
                  padding: "8px 14px",
                  fontSize: 13,
                  cursor: syncingAll ? "wait" : "pointer",
                  opacity: syncingAll ? 0.7 : 1,
                }}
              >
                {syncingAll ? "↻ Syncing all…" : "↻ Sync all locations"}
              </button>
            </div>

            <div
              style={{
                display: "grid",
                gridTemplateColumns: "repeat(4, minmax(0, 1fr))",
                gap: 8,
              }}
            >
              <HealthStatCard
                label="Locations"
                value={snapshot.locations.active}
                sub={`of ${snapshot.locations.total} total`}
              />
              <HealthStatCard
                label="Portal users"
                value={snapshot.users.total}
                sub={byRoleText || "none"}
              />
              <HealthStatCard
                label="GHL staff"
                value={snapshot.staff_cached}
                sub="cached"
              />
              <HealthStatCard
                label="Last sync"
                value={relativeTime(snapshot.latestSync)}
                sub={
                  snapshot.latestSync
                    ? new Date(snapshot.latestSync).toLocaleDateString()
                    : "never"
                }
              />
            </div>

            <div
              style={{
                display: "grid",
                gridTemplateColumns: "repeat(4, minmax(0, 1fr))",
                gap: 8,
              }}
            >
              <HealthStatCard
                label="Contacts"
                value={snapshot.contacts.toLocaleString()}
                sub="cached"
              />
              <HealthStatCard
                label="Opportunities"
                value={snapshot.opportunities.toLocaleString()}
                sub="cached"
              />
              <HealthStatCard
                label="Appointments"
                value={snapshot.appointments.toLocaleString()}
                sub="cached"
              />
              <HealthStatCard
                label="Stages"
                value={snapshot.stages.toLocaleString()}
                sub="pipeline"
              />
            </div>

            {syncReport && (
              <div
                className="surface-card"
                style={{
                  padding: "12px 14px",
                  borderLeft: `3px solid ${syncReport.ok ? T.green : T.red}`,
                  display: "flex",
                  alignItems: "center",
                  gap: 10,
                }}
              >

      // ── Coaching Scorecard (Phase 10) ──
      const COACHING_METRICS = [
        { value: "close_rate", label: "Close rate", unit: "%" },
        { value: "show_rate", label: "Show rate", unit: "%" },
        { value: "appointment_rate", label: "Appointments", unit: "%" },
        { value: "adps", label: "ADPS ($)", unit: "$" },
        { value: "other", label: "Other", unit: "" },
      ];
      const COACHING_METRIC_LABEL = Object.fromEntries(
        COACHING_METRICS.map((m) => [m.value, m.label]),
      );
      const COACHING_METRIC_UNIT = Object.fromEntries(
        COACHING_METRICS.map((m) => [m.value, m.unit]),
      );

      function formatCoachingMetric(value, metric) {
        if (value === null || value === undefined) return "—";
        const n = Number(value);
        if (!Number.isFinite(n)) return "—";
        const unit = COACHING_METRIC_UNIT[metric] || "";
        if (unit === "%") return `${Math.round(n)}%`;
        if (unit === "$") return `$${Math.round(n)}`;
        return String(Math.round(n));
      }

      const COACHING_VERDICT_STYLE = {
        metric_moved_dollars_up: {
          border: TRIAGE_GREEN,
          dot: TRIAGE_GREEN,
          label: "COACHING WORKED",
          headline: "Coaching worked",
        },
        metric_moved_dollars_flat: {
          border: TRIAGE_AMBER,
          dot: TRIAGE_AMBER,
          label: "PARTIAL",
          headline: "Metric improved, dollars didn't",
        },
        metric_flat_dollars_up: {
          border: TRIAGE_AMBER,
          dot: TRIAGE_AMBER,
          label: "PARTIAL",
          headline: "Dollars recovered, but not from what you coached",
        },
        no_change: {
          border: "rgba(10,14,26,0.14)",
          dot: "#9CA3AF",
          label: "NO CHANGE",
          headline: "No material change",
        },
        worse: {
          border: TRIAGE_RED,
          dot: TRIAGE_RED,
          label: "GOT WORSE",
          headline: "Got worse",
        },
      };

      function coachingReviewBody(result) {
        const metric = result.focus_metric;
        const metricLabel = COACHING_METRIC_LABEL[metric] || metric;
        const baseline = formatCoachingMetric(
          result.baseline_metric_value,
          metric,
        );
        const current = formatCoachingMetric(
          result.current_metric_value,
          metric,
        );
        const dollarsRecovered = Math.round(
          Number(result.dollars_recovered) || 0,
        );
        const currentDollars = Math.round(
          Number(result.current_dollars_on_table) || 0,
        );
        const recoveredStr = `$${Math.abs(dollarsRecovered).toLocaleString()}`;
        const onTableStr = `$${currentDollars.toLocaleString()}`;
        switch (result.verdict) {
          case "metric_moved_dollars_up":
            return `${metricLabel}: ${baseline} → ${current} · Dollars recovered: ${recoveredStr}`;
          case "metric_moved_dollars_flat":
            return `${metricLabel}: ${baseline} → ${current}, but dollars-on-the-table still ${onTableStr}. Something else is leaking — look at the next Rule-of-3 step.`;
          case "metric_flat_dollars_up":
            return `You coached ${metricLabel} (${baseline} → ${current}, flat). Dollars recovered ${recoveredStr} anyway — good outcome, wrong diagnosis.`;
          case "worse":
            return `${metricLabel}: ${baseline} → ${current}. Needs a different approach.`;
          case "no_change":
          default:
            return metric === "other"
              ? `Dollars-on-the-table: ${onTableStr}. No material change.`
              : `${metricLabel}: ${baseline} → ${current}. Try a different diagnosis?`;
        }
      }

            <div style={{ fontSize: 13, color: T.text, lineHeight: 1.5 }}>

            <div style={{ display: "flex", gap: 8, marginTop: 2 }}>

      function CoachingSection({
        selectedLocationId,
        profile,
        accessibleLocations,
        callLogVersion,
        onToast,
      }) {
        const [sessions, setSessions] = useState([]);
        const [results, setResults] = useState({});
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [modalOpen, setModalOpen] = useState(false);
        const [defaultMetric, setDefaultMetric] = useState("close_rate");
        const [defaultFranchiseeName, setDefaultFranchiseeName] = useState("");
        const [dismissingId, setDismissingId] = useState(null);
        const [version, setVersion] = useState(0);

        const location = accessibleLocations.find(
          (l) => l.ghl_location_id === selectedLocationId,
        );
        const locationName = location?.name || "";

        // Load all non-dismissed sessions for this location + this coach (or any, if admin)
        const load = useCallback(async () => {
          if (!selectedLocationId || !location?.id) return;
          setLoading(true);
          setError(null);
          try {
            const { data: sess, error: err } = await window.supabase
              .from("coaching_sessions")
              .select("*")
              .eq("location_id", location.id)
              .is("dismissed_at", null)
              .order("coached_on", { ascending: false });
            if (err) throw err;
            const list = sess || [];
            setSessions(list);
            // Fetch result for sessions whose review is due
            const dueSessions = list.filter(
              (s) => new Date(s.review_due_at).getTime() <= Date.now(),
            );
            const nextResults = {};
            await Promise.all(
              dueSessions.map(async (s) => {
                try {
                  const { data: r } = await window.supabase.rpc(
                    "coaching_session_result",
                    { p_session_id: s.id },
                  );
                  if (r && r[0]) nextResults[s.id] = r[0];
                } catch (e) {
                  console.warn("coaching_session_result failed:", e);
                }
              }),
            );
            setResults(nextResults);

            // Try to pre-fill franchisee name from the team
            try {
              const { data: team } = await window.supabase.rpc(
                "location_team_kpis",
                { p_ghl_location_id: selectedLocationId },
              );
              const franchisee = (team || []).find(
                (t) => t.role === "franchisee",
              );
              if (franchisee) {
                setDefaultFranchiseeName(franchisee.full_name || "");
              }
            } catch (e) {
              /* noop */
            }
          } catch (e) {
            setError(e && e.message ? e.message : "Failed to load coaching");
          } finally {
            setLoading(false);
          }
          // eslint-disable-next-line
        }, [selectedLocationId, location?.id, version]);

        useEffect(() => {
          load();
        }, [load]);

        const dismiss = async (sessionId) => {
          setDismissingId(sessionId);
          try {
            const { error: err } = await window.supabase
              .from("coaching_sessions")
              .update({ dismissed_at: new Date().toISOString() })
              .eq("id", sessionId);
            if (err) throw err;
            setVersion((v) => v + 1);
          } catch (e) {
            if (onToast) {
              onToast({
                kind: "error",
                text: `Dismiss failed: ${e.message || e}`,
              });
            }
          } finally {
            setDismissingId(null);
          }
        };

        const openLog = (prefillMetric) => {
          if (prefillMetric) setDefaultMetric(prefillMetric);
          setModalOpen(true);
        };

        const onLogged = (resp) => {
          if (onToast) {
            onToast({
              kind: "success",
              text: "Logged. Check back in 7 days to see if it worked.",
            });
          }
          setVersion((v) => v + 1);
        };

        const dueSessions = sessions.filter(
          (s) => new Date(s.review_due_at).getTime() <= Date.now(),
        );
        const upcoming = sessions.filter(
          (s) => new Date(s.review_due_at).getTime() > Date.now(),
        );

        const canLog = profile.role === "vp" || profile.role === "admin";
        if (!canLog) return null;

        return (
          <div style={{ padding: "24px 20px 0" }}>
            {error && (
              <div style={{ marginBottom: 10 }}>
                <ModalErrorBanner message={error} />
              </div>
            )}
            {!loading &&
              dueSessions.map((s) => {
                const result = results[s.id];
                if (!result) return null;
                return (
                  <CoachingReviewCard
                    key={s.id}
                    session={s}
                    result={result}
                    franchiseeName={s.franchisee_name}
                    onDismiss={() => dismiss(s.id)}
                    onFollowUp={(metric) => openLog(metric)}
                    dismissing={dismissingId === s.id}
                  />
                );
              })}
            {upcoming.length > 0 && (
              <div
                className="surface-card"
                style={{
                  padding: "12px 14px",
                  display: "flex",
                  alignItems: "center",
                  gap: 10,
                  marginBottom: 10,
                }}
              >
                <span
                  style={{
                    width: 6,
                    height: 6,
                    borderRadius: "50%",
                    background: T.textDim,
                    flexShrink: 0,
                  }}
                />
                <span style={{ color: T.text, fontSize: 13, fontWeight: 500 }}>
                  {upcoming.length} coaching session
                  {upcoming.length === 1 ? "" : "s"} awaiting 7-day review.
                </span>
              </div>
            )}
            <button
              className="btn-primary"
              onClick={() => openLog()}
              style={{ width: "100%", padding: "14px 18px", marginBottom: 4 }}
            >
              I coached this today
            </button>
            {modalOpen && (
              <LogCoachingModal
                selectedLocationId={selectedLocationId}
                locationName={locationName}
                defaultMetric={defaultMetric}
                defaultFranchiseeName={defaultFranchiseeName}
                onClose={() => setModalOpen(false)}
                onLogged={onLogged}
              />
            )}
          </div>
        );
      }

        const locById = {};
        accessibleLocations.forEach((l) => {
          locById[l.id] = l;

        const load = useCallback(async () => {

            const { data, error: err } = await window.supabase
              .from("coaching_sessions")

      // ── Authenticated App ──
      function AuthenticatedApp({
        profile,
        accessibleLocations,
        selectedLocationId,
        setSelectedLocationId,
        onLogout,
      }) {
        // Restore nav state from sessionStorage so tab-switches and Cmd+R
        // don't kick the user back to their default landing. NAV_KEY is
        // cleared on explicit sign-out (handleLogout), not on token
        // refresh. See NAV_KEY definition above App.
        const restoredNav = (() => {
          try {
            const raw = sessionStorage.getItem(NAV_KEY);
            if (!raw) return null;
            const p = JSON.parse(raw);
            return p && typeof p === "object" ? p : null;
          } catch {
            return null;
          }
        })();

        const [screen, setScreen] = useState(
          () => restoredNav?.screen || "dashboard",
        );
        const [selectedLead, setSelectedLead] = useState(
          () => restoredNav?.selectedLead || null,
        );
        const [settingsOpen, setSettingsOpen] = useState(false);
        const [adminOpen, setAdminOpen] = useState(false);
        const [coachingOpen, setCoachingOpen] = useState(false);
        const [pickerOpen, setPickerOpen] = useState(false);
        const [viewMode, setViewModeState] = useState(() => {
          if (accessibleLocations.length <= 1) return "location";
          const stored = localStorage.getItem("aira_view_mode");
          if (
            stored === "location" ||
            stored === "territory" ||
            stored === "triage"
          )
            return stored;
          return "territory";
        });
        const [previousViewMode, setPreviousViewMode] = useState(null);
        const setViewMode = useCallback((mode) => {
          localStorage.setItem("aira_view_mode", mode);
          setViewModeState(mode);
        }, []);

        // Call-log version: incremented whenever a call is logged, drives refetch
        const [callLogVersion, setCallLogVersion] = useState(0);
        const bumpCallLogVersion = useCallback(
          () => setCallLogVersion((v) => v + 1),
          [],
        );

        // Manager drill-down into a specific rep's personal dashboard
        const [drilledRep, setDrilledRep] = useState(
          () => restoredNav?.drilledRep || null,
        );
        const isSalesRep = profile.role === "sales_rep";
        // Ephemeral "open this contact's conversation on next render of
        // ConversationsScreen" hint. Set when LeadDetail → Text send
        // succeeds; consumed (cleared) by ConversationsScreen once it's
        // picked the matching row. Not persisted in nav sessionStorage.
        const [pendingConversationContact, setPendingConversationContact] =
          useState(null);

        // Persist the navigation cursor on every change so a token refresh
        // (which no longer remounts us thanks to the App listener fix, but
        // is still a safety net) or a Cmd+R reload keeps the user where
        // they were.
        useEffect(() => {
          try {
            sessionStorage.setItem(
              NAV_KEY,
              JSON.stringify({ screen, selectedLead, drilledRep }),
            );
          } catch {
            /* sessionStorage can fail in private-mode Safari — best effort */
          }
        }, [screen, selectedLead, drilledRep]);

        // Booking modal
        const [bookingOpen, setBookingOpen] = useState(false);
        const [bookingContact, setBookingContact] = useState(null);
        const [bookingInitialQuery, setBookingInitialQuery] = useState("");
        const [toast, setToast] = useState(null);
        const openBooking = useCallback(({ contact, query } = {}) => {
          setBookingContact(contact || null);
          setBookingInitialQuery(query || "");
          setBookingOpen(true);
        }, []);
        const handleBooked = useCallback(
          ({ contactName, date, time }) => {
            setToast({
              kind: "success",
              text: `Appointment booked for ${contactName} on ${date} at ${time}`,
            });
            bumpCallLogVersion();
            setTimeout(() => setToast(null), 4500);
          },
          [bumpCallLogVersion],
        );

        // Triage data (multi-location only)
        const [triageRows, setTriageRows] = useState([]);
        const [triageLoading, setTriageLoading] = useState(
          accessibleLocations.length > 1,
        );
        const [triageError, setTriageError] = useState(null);
        const [triageReconciled, setTriageReconciled] = useState(false);

        const loadTriage = useCallback(async () => {
          if (accessibleLocations.length <= 1) {
            setTriageLoading(false);
            return;
          }
          setTriageLoading(true);
          setTriageError(null);
          try {
            const ids = accessibleLocations.map((l) => l.ghl_location_id);
            const { data: rows, error: err } = await window.supabase.rpc(
              "location_triage",
              { p_ghl_location_ids: ids },
            );
            if (err) throw err;
            setTriageRows(rows || []);
          } catch (e) {
            console.error("location_triage failed:", e);
            setTriageError(
              e && e.message ? e.message : "Failed to load triage data",
            );
          } finally {
            setTriageLoading(false);
          }
          // eslint-disable-next-line
        }, [accessibleLocations, callLogVersion]);

        useEffect(() => {
          loadTriage();
        }, [loadTriage]);

        const hasAnyRed = triageRows.some((r) => r.status_color === "red");

        // Reconcile stored viewMode with current red state once, after triage loads
        useEffect(() => {
          if (triageLoading || triageReconciled) return;
          if (accessibleLocations.length <= 1) {
            setTriageReconciled(true);
            return;
          }
          const stored = localStorage.getItem("aira_view_mode");
          let target;
          if (stored === "location") target = "location";
          else if (stored === "triage")
            target = hasAnyRed ? "triage" : "territory";
          else if (stored === "territory") target = "territory";
          else target = hasAnyRed ? "triage" : "territory";
          setViewModeState(target);
          localStorage.setItem("aira_view_mode", target);
          setTriageReconciled(true);
        }, [
          triageLoading,
          triageReconciled,
          hasAnyRed,
          accessibleLocations.length,
        ]);
        const data = getSeedData();
        const unreadCount = data.conversations.reduce(
          (s, c) => s + c.unread,
          0,
        );
        const hideLeaderboard = profile.role === "sales_rep";
        const firstName =
          (profile.full_name || profile.email || "User").split(/\s+/)[0] ||
          "User";
        const firstInitial = firstName[0] ? firstName[0].toUpperCase() : "?";
        const today = new Date().toLocaleDateString("en-US", {
          month: "long",
          day: "numeric",
          year: "numeric",
        });
        const currentLocation =
          accessibleLocations.find(
            (l) => l.ghl_location_id === selectedLocationId,
          ) || accessibleLocations[0];
        const shortLabel = currentLocation
          ? currentLocation.name.replace(/^Aira Fitness\s*/i, "") ||
            currentLocation.name
          : "—";
        const multi = accessibleLocations.length > 1;

        const openLocationFromOverview = (id) => {
          setPreviousViewMode(viewMode);
          setSelectedLocationId(id);
          setViewMode("location");
          setSelectedLead(null);
          setScreen("dashboard");
        };

        // Leads + Messages follow the view mode: location view → scoped to
        // the drilled-in gym; territory/triage view (multi-location) →
        // aggregated across the VP's accessible locations.
        const aggregateLists = multi && viewMode !== "location";
        const showToast = (t) => {
          setToast(t);
          setTimeout(() => setToast(null), 4500);
        };

        const renderScreen = () => {
          if (selectedLead)
            return (
              <LeadDetail
                lead={selectedLead}
                profile={profile}
                onBack={() => setSelectedLead(null)}
                onBook={() =>
                  openBooking({
                    contact: selectedLead.contact_id
                      ? {
                          ghl_contact_id: selectedLead.contact_id,
                          full_name: selectedLead.full_name,
                          phone: selectedLead.phone,
                        }
                      : null,
                    query: selectedLead.full_name || "",
                  })
                }
                onToast={showToast}
                onChanged={bumpCallLogVersion}
                onOpenConversation={(contactId) => {
                  setPendingConversationContact(contactId);
                  setSelectedLead(null);
                  setScreen("conversations");
                }}
              />
            );
          let dashboardEl;
          if (isSalesRep) {
            dashboardEl = (
              <RepPersonalDashboard
                userId={profile.id}
                userName={profile.full_name || profile.email}
                isSelf={true}
                selectedLocationId={selectedLocationId}
                callLogVersion={callLogVersion}
                onGoToLeads={() => {
                  setScreen("leads");
                  setSelectedLead(null);
                }}
              />
            );
          } else if (viewMode === "triage" && multi) {
            dashboardEl = (
              <TriageView
                rows={triageRows}
                loading={triageLoading}
                error={triageError}
                onRefresh={loadTriage}
                onSelectLocation={openLocationFromOverview}
              />
            );
          } else if (viewMode === "territory" && multi) {
            dashboardEl = (
              <TerritoryDashboard
                accessibleLocations={accessibleLocations}
                onSelectLocation={openLocationFromOverview}
              />
            );
          } else {
            dashboardEl = (
              <>
                {(profile.role === "vp" || profile.role === "admin") && (
                  <CoachingSection
                    selectedLocationId={selectedLocationId}
                    profile={profile}
                    accessibleLocations={accessibleLocations}
                    callLogVersion={callLogVersion}
                    onToast={(t) => {
                      setToast(t);
                      setTimeout(() => setToast(null), 4500);
                    }}
                  />
                )}
                <DashboardScreen
                  hideLeaderboard={hideLeaderboard}
                  selectedLocationId={selectedLocationId}
                  callLogVersion={callLogVersion}
                  onSelectRep={setDrilledRep}
                />
              </>
            );
          }
          switch (screen) {
            case "dashboard":
              return dashboardEl;
            case "leads":
              return (
                <LeadsScreen
                  selectedLocationId={selectedLocationId}
                  accessibleLocations={accessibleLocations}
                  aggregate={aggregateLists}
                  onSelect={(l) => setSelectedLead(l)}
                  onToast={showToast}
                  onOpenConversation={(contactId) => {
                    setPendingConversationContact(contactId);
                    setSelectedLead(null);
                    setScreen("conversations");
                  }}
                />
              );
            case "conversations":
              return (
                <ConversationsScreen
                  selectedLocationId={selectedLocationId}
                  accessibleLocations={accessibleLocations}
                  aggregate={aggregateLists}
                  profile={profile}
                  onToast={showToast}
                  initialContactId={pendingConversationContact}
                  onInitialConsumed={() => setPendingConversationContact(null)}
                />
              );
            case "appointments":
              return (
                <AppointmentsScreen
                  selectedLocationId={selectedLocationId}
                  onBook={() => openBooking()}
                  callLogVersion={callLogVersion}
                />
              );
            default:
              return dashboardEl;
          }
        };

        return (
          <div
            style={{
              maxWidth: 480,
              margin: "0 auto",
              minHeight: "100vh",
              background: T.bg,
              color: T.text,
              position: "relative",
            }}
          >
            {/* Header */}
            <div
              style={{
                padding: "14px 20px 12px",
                background: T.surface,
                borderBottom: `0.5px solid ${T.border}`,
                position: "sticky",
                top: 0,
                zIndex: 50,
              }}
            >
              <div
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "flex-start",
                  gap: 12,
                }}
              >
                <button
                  onClick={() =>
                    multi && viewMode === "location" && setPickerOpen((v) => !v)
                  }
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: 10,
                    background: "transparent",
                    border: "none",
                    padding: 0,
                    cursor:
                      multi && viewMode === "location" ? "pointer" : "default",
                    textAlign: "left",
                    minWidth: 0,
                    flex: 1,
                  }}
                >
                  <div
                    style={{
                      width: 30,
                      height: 30,
                      borderRadius: 8,
                      background: T.airaBlue,
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      fontSize: 14,
                      fontWeight: 500,
                      color: "#ffffff",
                      flexShrink: 0,
                      fontFamily: "'Outfit',sans-serif",
                      letterSpacing: "-0.01em",
                    }}
                  >
                    A
                  </div>
                  <div style={{ minWidth: 0, flex: 1 }}>
                    <div
                      style={{
                        fontSize: 14,
                        fontWeight: 500,
                        color: T.textHi,

                      }}

                    </div>
                    <div
                      style={{
                        fontSize: 10,

                          viewMode === "triage"

                            : viewMode === "territory"
                              ? T.airaBlue
                              : T.textMuted,
                        letterSpacing:
                          viewMode === "triage" || viewMode === "territory"
                            ? "0.12em"
                            : "0.04em",
                        fontWeight: 500,
                        textTransform:
                          viewMode === "triage" || viewMode === "territory"

                </button>
                <button
                  onClick={() => setSettingsOpen(true)}

                >
                  <div
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: 6,
                      padding: "4px 10px 4px 4px",
                      borderRadius: 999,
                      background: T.airaBlueDim,
                    }}
                  >
                    <div
                      style={{
                        width: 20,
                        height: 20,
                        borderRadius: "50%",
                        background: T.airaBlue,

                      }}
                    >

                    </div>
                    <span

                  </div>
                  <div style={{ fontSize: 10, color: T.textDim }}>{today}</div>
                </button>
              </div>
              {multi &&
                viewMode === "location" &&
                (() => {
                  const target =
                    previousViewMode === "triage" && hasAnyRed
                      ? "triage"

                  const label =
                    target === "triage"

                  return (
                    <button
                      onClick={() => {
                        setViewMode(target);

                      style={{
                        marginTop: 12,
                        padding: "6px 12px",
                        borderRadius: 8,

                        fontFamily: "inherit",
                      }}

                      {label}
                    </button>
                  );
                })()}
              {pickerOpen && multi && viewMode === "location" && (
                <div
                  className="surface-card"
                  style={{
                    marginTop: 10,
                    padding: 6,
                    display: "flex",
                    flexDirection: "column",
                    gap: 2,
                  }}
                >
                  {accessibleLocations.map((loc) => {
                    const active = loc.ghl_location_id === selectedLocationId;
                    return (
                      <button
                        key={loc.id}

                          setPickerOpen(false);

                        style={{
                          textAlign: "left",
                          padding: "10px 12px",
                          borderRadius: 8,
                          border: "none",
                          background: active ? T.airaBlueDim : "transparent",
                          color: active ? T.airaBlueDark : T.text,

                          fontWeight: 500,
                          cursor: "pointer",
                          fontFamily: "inherit",
                        }}
                      >
                        {loc.name}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>

            <div style={{ paddingBottom: 72 }}>
              {multi &&
                hasAnyRed &&
                (viewMode === "triage" || viewMode === "territory") &&
                screen === "dashboard" &&
                !selectedLead && (
                  <div
                    style={{
                      display: "flex",
                      gap: 6,
                      padding: "14px 16px 0",
                    }}
                  >
                    {[
                      { key: "triage", label: "Triage" },
                      { key: "territory", label: "Overview" },
                    ].map((t) => {
                      const active = viewMode === t.key;
                      return (
                        <button
                          key={t.key}
                          onClick={() => setViewMode(t.key)}
                          style={{
                            padding: "6px 14px",
                            borderRadius: 999,
                            border: "none",
                            background: active ? T.airaBlue : T.airaBlueSubtle,
                            color: active ? "#ffffff" : T.textMuted,
                            fontSize: 12,
                            fontWeight: 500,
                            cursor: "pointer",
                            fontFamily: "inherit",
                            transition: "background 160ms ease",
                          }}
                        >
                          {t.label}
                        </button>
                      );
                    })}
                  </div>
                )}
              {renderScreen()}
            </div>

            {/* Bottom Nav */}
            <div
              style={{
                position: "fixed",
                bottom: 0,
                left: "50%",
                transform: "translateX(-50%)",
                width: "100%",
                maxWidth: 480,
                display: "flex",
                justifyContent: "space-around",
                padding: "8px 0 env(safe-area-inset-bottom, 12px)",
                background: "rgba(255,255,255,0.94)",
                backdropFilter: "blur(20px)",
                WebkitBackdropFilter: "blur(20px)",
                borderTop: `0.5px solid ${T.border}`,
                zIndex: 100,
              }}
            >
              <NavItem
                icon="📊"
                label="Dashboard"
                active={screen === "dashboard" && !selectedLead}
                onClick={() => {
                  setScreen("dashboard");
                  setSelectedLead(null);
                }}
              />
              <NavItem
                icon="👥"
                label={aggregateLists ? "All Leads" : "Leads"}
                active={screen === "leads" || !!selectedLead}
                onClick={() => {
                  setScreen("leads");
                  setSelectedLead(null);
                }}
              />
              <NavItem
                icon="💬"
                label="Messages"
                active={screen === "conversations"}
                onClick={() => {
                  setScreen("conversations");
                  setSelectedLead(null);
                }}
              />
              <NavItem
                icon="📅"
                label="Appts"
                active={screen === "appointments"}
                onClick={() => {
                  setScreen("appointments");
                  setSelectedLead(null);
                }}
                count={
                  data.appointments.filter((a) => a.date === "Today").length
                }
              />
            </div>

            {settingsOpen && (
              <SettingsDrawer
                profile={profile}
                onClose={() => setSettingsOpen(false)}
                onLogout={onLogout}
                onOpenAdmin={() => {
                  setSettingsOpen(false);
                  setAdminOpen(true);
                }}
                onOpenCoaching={() => {
                  setSettingsOpen(false);
                  setCoachingOpen(true);
                }}
              />
            )}

            {adminOpen && profile.role === "admin" && (
              <AdminOnboardingOverlay
                profile={profile}
                onClose={() => setAdminOpen(false)}
                onRefresh={bumpCallLogVersion}
                onToast={(t) => {
                  setToast(t);
                  setTimeout(() => setToast(null), 4500);
                }}
              />
            )}

            {coachingOpen &&
              (profile.role === "vp" || profile.role === "admin") && (
                <MyCoachingOverlay
                  profile={profile}
                  accessibleLocations={accessibleLocations}
                  onClose={() => setCoachingOpen(false)}
                  onOpenLocation={(ghlId) => {
                    setSelectedLocationId(ghlId);
                    setViewMode("location");
                    setScreen("dashboard");
                  }}
                />
              )}

            <CallOutcomeModal profile={profile} onLogged={bumpCallLogVersion} />

            {bookingOpen && (
              <BookAppointmentModal
                profile={profile}
                selectedLocationId={selectedLocationId}
                accessibleLocations={accessibleLocations}
                initialContact={bookingContact}
                initialContactQuery={bookingInitialQuery}
                onClose={() => {
                  setBookingOpen(false);
                  setBookingContact(null);
                  setBookingInitialQuery("");
                }}
                onBooked={handleBooked}
              />
            )}

            {toast &&
              (() => {
                const accent =
                  toast.kind === "success"
                    ? T.green
                    : toast.kind === "error"
                      ? T.red
                      : toast.kind === "info"
                        ? T.amber
                        : T.airaBlue;
                return (
                  <div
                    className="fade-in"
                    style={{
                      position: "fixed",
                      bottom: 88,
                      left: "50%",
                      transform: "translateX(-50%)",
                      width: "calc(100% - 32px)",
                      maxWidth: 448,
                      padding: "12px 16px",
                      borderRadius: 12,
                      background: T.surface,
                      border: `0.5px solid ${T.border}`,
                      borderLeft: `3px solid ${accent}`,
                      display: "flex",
                      alignItems: "center",
                      gap: 10,
                      zIndex: 320,
                      boxShadow:
                        "0 2px 6px rgba(10,14,26,0.06), 0 8px 24px rgba(10,14,26,0.08)",
                    }}
                  >
                    <span
                      style={{
                        width: 6,
                        height: 6,
                        borderRadius: "50%",
                        background: accent,
                        flexShrink: 0,
                      }}
                    />
                    <span
                      style={{
                        color: T.text,
                        fontSize: 13,
                        fontWeight: 500,
                        lineHeight: 1.4,
                      }}
                    >
                      {toast.text}
                    </span>
                  </div>
                );
              })()}

            {drilledRep && (
              <div
                style={{
                  position: "fixed",
                  inset: 0,
                  zIndex: 220,
                  background: T.bg,
                  overflowY: "auto",
                  maxWidth: 480,
                  left: "50%",
                  transform: "translateX(-50%)",
                  width: "100%",
                }}
              >
                <RepPersonalDashboard
                  userId={drilledRep.user_id}
                  userName={drilledRep.full_name}
                  isSelf={false}
                  selectedLocationId={selectedLocationId}
                  callLogVersion={callLogVersion}
                  onClose={() => setDrilledRep(null)}
                />
              </div>
            )}
          </div>
        );
      }

      // Parse the URL hash exactly once on boot, before anything else.
      // Supabase-js v2 auto-consumes the hash when detectSessionInUrl is true,
      // so we have to snapshot it synchronously or lose the flow type.
      //
      // We also check sessionStorage in case the user refreshes mid-flow: the
      // token has already been exchanged into a persisted session at that
      // point, so the hash is gone, but we want to keep them on SetPassword
      // until they actually submit.
      const PENDING_FLOW_KEY = "aira_pending_password_flow";
      // AuthenticatedApp persists its current view (screen / open lead /
      // open rep drill) here so tab-switches, token refreshes, and Cmd+R
      // don't dump the user back to their default landing. Cleared on
      // explicit sign-out; dies naturally when the tab closes.
      const NAV_KEY = "aira_nav_state";
      function consumeInviteHash() {
        const raw = window.location.hash || "";
        const hash = raw.startsWith("#") ? raw.slice(1) : raw;
        let hashType = null;
        let hashError = null;
        let hashErrorDescription = null;
        if (hash) {
          const params = new URLSearchParams(hash);
          hashType = params.get("type");
          hashError = params.get("error") || params.get("error_code");
          hashErrorDescription = params.get("error_description");
          window.history.replaceState(
            null,
            "",
            window.location.pathname + window.location.search,
          );
        }
        if (hashType === "invite" || hashType === "recovery") {
          sessionStorage.setItem(PENDING_FLOW_KEY, hashType);
        }
        const pending = sessionStorage.getItem(PENDING_FLOW_KEY);
        return {
          flowType:
            hashType === "invite" || hashType === "recovery"
              ? hashType
              : pending,
          hashError,
          hashErrorDescription,
        };
      }

      // ── Root App with auth gate ──
      function App() {
        const [state, setState] = useState({ status: "loading" });

        const loadProfile = useCallback(async (session) => {
          try {
            const [
              { data: userRow, error: uerr },
              { data: ghlIds, error: rerr },
            ] = await Promise.all([
              window.supabase
                .from("users")
                .select("*")
                .eq("auth_user_id", session.user.id)
                .maybeSingle(),
              window.supabase.rpc("current_user_ghl_location_ids"),
            ]);
            if (uerr) console.error("users fetch error:", uerr);
            if (!userRow || !userRow.active) {
              setState({ status: "pending", email: session.user.email });
              return;
            }
            if (rerr) console.error("ghl ids rpc error:", rerr);
            const ids = ghlIds || [];
            if (ids.length === 0) {
              setState({ status: "no-locations", profile: userRow });
              return;
            }
            const { data: locs, error: lerr } = await window.supabase
              .from("locations")
              .select("id, ghl_location_id, name, timezone")
              .in("ghl_location_id", ids)
              .eq("active", true)
              .order("name");
            if (lerr) console.error("locations fetch error:", lerr);
            const locations = locs || [];
            if (locations.length === 0) {
              setState({ status: "no-locations", profile: userRow });
              return;
            }
            const stored = localStorage.getItem("aira_selected_location_id");
            const validStored =
              stored && locations.some((l) => l.ghl_location_id === stored);
            const selectedId = validStored
              ? stored
              : locations[0].ghl_location_id;
            localStorage.setItem("aira_selected_location_id", selectedId);
            setState({
              status: "ready",
              profile: userRow,
              locations,
              selectedLocationId: selectedId,
            });
          } catch (e) {
            console.error("loadProfile failed:", e);
            setState({ status: "login" });
          }
        }, []);

        useEffect(() => {
          let mounted = true;
          let unsub = () => {};
          // Snapshot the hash BEFORE any async work — Supabase-js will
          // swallow it as soon as the client is available.
          const inviteCtx = consumeInviteHash();

          // Track which auth user we've already processed. Supabase-js
          // re-broadcasts SIGNED_IN / TOKEN_REFRESHED / INITIAL_SESSION
          // whenever the tab regains focus and the JWT is rotated;
          // without this guard the root re-set status to "loading",
          // which unmounted AuthenticatedApp and wiped every child
          // screen (open lead, open conversation, etc.). We only route
          // on genuine transitions: null → user (fresh login) or
          // user → null (sign-out).
          let knownUserId = null;

          const start = async () => {
            // Expired / access_denied invite → dedicated screen, skip the
            // usual session flow so the user isn't bounced to a login they
            // can't pass.
            if (inviteCtx.hashError) {
              sessionStorage.removeItem(PENDING_FLOW_KEY);
              setState({
                status: "invite-expired",
                description: inviteCtx.hashErrorDescription || "",
              });
              return;
            }

            let tries = 0;
            while (!window.supabase && tries < 150) {
              await new Promise((r) => setTimeout(r, 30));
              tries++;
            }
            if (!mounted) return;
            if (!window.supabase) {
              setState({ status: "login" });
              return;
            }
            const {
              data: { session },
            } = await window.supabase.auth.getSession();
            if (!mounted) return;
            if (session?.user?.id) knownUserId = session.user.id;

            // Invite / recovery: hold them on SetPasswordScreen until they
            // pick a password. Skip loadProfile entirely — the normal
            // dashboard shouldn't be reachable until the password is set.
            if (session && inviteCtx.flowType) {
              setState({
                status: "set-password",
                session,
                flowType: inviteCtx.flowType,
              });
            } else if (!session) {
              setState({ status: "login" });
            } else {
              await loadProfile(session);
            }

            const sub = window.supabase.auth.onAuthStateChange(
              (event, sess) => {
                if (!mounted) return;
                if (event === "SIGNED_OUT") {
                  knownUserId = null;
                  localStorage.removeItem("aira_selected_location_id");
                  sessionStorage.removeItem(PENDING_FLOW_KEY);
                  sessionStorage.removeItem(NAV_KEY);
                  setState({ status: "login" });
                  return;
                }

                const newUserId = sess?.user?.id || null;
                // Same user as before → this is just a token refresh or
                // a re-broadcast on tab focus. Never re-route.
                if (newUserId && newUserId === knownUserId) return;
                // Passive events we never route on, even on first fire.
                if (
                  event === "TOKEN_REFRESHED" ||
                  event === "USER_UPDATED" ||
                  event === "INITIAL_SESSION"
                ) {
                  if (newUserId) knownUserId = newUserId;
                  return;
                }
                if (event === "SIGNED_IN" && sess) {
                  knownUserId = newUserId;
                  // Belt-and-suspenders: wipe any nav cursor from a
                  // prior session so a fresh login never inherits the
                  // previous user's view (OS-killed tabs can leave
                  // NAV_KEY behind after handleLogout never ran).
                  sessionStorage.removeItem(NAV_KEY);
                  const pending =
                    sessionStorage.getItem(PENDING_FLOW_KEY) ||
                    inviteCtx.flowType;
                  if (pending) {
                    setState({
                      status: "set-password",
                      session: sess,
                      flowType: pending,
                    });
                    return;
                  }
                  setState({ status: "loading" });
                  loadProfile(sess);
                }
              },
            );
            unsub = () => sub.data.subscription.unsubscribe();
          };
          start();
          return () => {
            mounted = false;
            unsub();
          };
        }, [loadProfile]);

        const handleLogout = async () => {
          localStorage.removeItem("aira_selected_location_id");
          sessionStorage.removeItem(NAV_KEY);
          try {
            await window.supabase.auth.signOut();
          } catch (e) {
            console.error(e);
          }
          setState({ status: "login" });
        };

        const setSelectedLocationId = (id) => {
          localStorage.setItem("aira_selected_location_id", id);
          setState((s) => ({ ...s, selectedLocationId: id }));
        };

        switch (state.status) {
          case "loading":
            return <Splash />;
          case "login":
            return <LoginScreen />;
          case "set-password":
            return (
              <SetPasswordScreen
                session={state.session}
                flowType={state.flowType}
                onComplete={() => {
                  setState({ status: "loading" });
                  (async () => {
                    const {
                      data: { session },
                    } = await window.supabase.auth.getSession();
                    if (session) await loadProfile(session);
                    else setState({ status: "login" });
                  })();
                }}
              />
            );
          case "invite-expired":
            return (
              <GateScreen
                title="Invite link expired"
                body="This invite link has expired. Ask your admin to resend."
                onLogout={() => setState({ status: "login" })}
                buttonLabel="Back to sign in"
              />
            );
          case "pending":
            return (
              <GateScreen
                title="Access Pending"
                body={`Your account (${state.email}) isn't set up yet. Contact your administrator to get access.`}
                onLogout={handleLogout}
              />
            );
          case "no-locations":
            return (
              <GateScreen
                title="No Locations Assigned"
                body="Your account isn't linked to any active locations yet. Contact your administrator."
                onLogout={handleLogout}
              />
            );
          case "ready":
            return (
              <AuthenticatedApp
                profile={state.profile}
                accessibleLocations={state.locations}
                selectedLocationId={state.selectedLocationId}
                setSelectedLocationId={setSelectedLocationId}
                onLogout={handleLogout}
              />
            );
          default:
            return <Splash />;
        }
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
